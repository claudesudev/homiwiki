<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#cc785c">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>호미위키 Homiwiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;500;800&amp;family=Do+Hyeon&amp;display=swap" rel="stylesheet">
<script>
(function() {
  var theme = 'light';
  var fontSize = 'm';
  try {
    var oldTheme = localStorage.getItem('aiwiki:theme');
    if (oldTheme !== null) {
      if (localStorage.getItem('homi:theme') === null) localStorage.setItem('homi:theme', oldTheme);
      localStorage.removeItem('aiwiki:theme');
    }
    var oldFont = localStorage.getItem('aiwiki:fontSize');
    if (oldFont !== null) {
      if (localStorage.getItem('homi:fontSize') === null) localStorage.setItem('homi:fontSize', oldFont);
      localStorage.removeItem('aiwiki:fontSize');
    }
    var savedTheme = localStorage.getItem('homi:theme');
    if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
    var savedFont = localStorage.getItem('homi:fontSize');
    if (['s','m','l','xl','xxl'].indexOf(savedFont) !== -1) fontSize = savedFont;
  } catch (e) { }
  document.documentElement.setAttribute('data-theme', theme);
  document.documentElement.setAttribute('data-font-size', fontSize);
})();
</script>
<style>
/* ==============================================================================
   ⚠ 호버(:hover) 금지 규약

   이 스타일시트는 의도적으로 :hover 의사클래스를 사용하지 않습니다.
   - 이유 1: 이 앱은 모바일 우선 UX. 터치 디바이스에는 호버 개념이 없음
     (탭 = 즉시 클릭 동작). 호버 스타일이 있어도 작동할 '틈'이 없음.
   - 이유 2: 모바일 브라우저에서 터치 후 호버 스타일이 '잔상'처럼 남는
     버그의 주원인 (Android Chrome / iOS Safari 모두 관찰됨).
   - 이유 3: 데스크톱 사용자에게도 호버 피드백 없이 통일된 UX 제공이
     본 프로젝트 설계 방향.

   허용되는 포인터 상호작용:
   - :active  → 탭 다운 피드백 (배경/투명도 변화만 사용; 찌부러지는 transform: scale 효과는 제거됨).
   - :focus-visible → 키보드 탭 네비게이션 포커스링. 접근성 필수.

   호버는 패치 도중 무의식적으로 증식하는 경향이 있으니,
   이 파일을 수정할 때 :hover 규칙을 새로 추가하지 말 것.
   ============================================================================== */

:root {
  --font-scale: 1.07;
  --root-font-scale: 1.07;
  --bg-primary: #faf9f7;
  --bg-secondary: #f2f0ec;
  --bg-tertiary: #ffffff;
  --bg-elevated: #ffffff;
  --bg-accent-soft: #f0ebe4;
  --bg-accent-arrive: #e8dfd2;
  --text-primary: #1a1a1a;
  --text-secondary: #3a3a3a;
  --text-tertiary: #6b6b6b;
  --text-muted: #9a9a9a;
  --accent: #cc785c;
  --accent-light: #e8a590;
  --accent-text: #ffffff;
  --link: #2b6cb0;
  --link-flash-bg: #d6e6f5;
  --select-blue: #7dd3fc;
  --border: #e3e0da;
  --border-light: #ebe8e2;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10);
  --code-bg: #f0ece6;
}

[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #232323;
  --bg-tertiary: #2a2a2a;
  --bg-elevated: #323232;
  --bg-accent-soft: #2d2825;
  --bg-accent-arrive: #3a3128;
  --text-primary: #f5f5f3;
  --text-secondary: #d4d4d2;
  --text-tertiary: #a3a3a1;
  --text-muted: #9a9a98;
  --accent: #e8a590;
  --accent-light: #cc785c;
  --accent-text: #1a1a1a;
  --link: #7ab0e0;
  --link-flash-bg: #2a4a6b;
  --select-blue: #0ea5e9;
  --border: #3a3a3a;
  --border-light: #303030;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
  --code-bg: #252525;
}

html[data-font-size="s"]   { --font-scale: 0.87; --root-font-scale: 0.87; }
html[data-font-size="m"]   { --font-scale: 1.07; --root-font-scale: 1.07; }
html[data-font-size="l"]   { --font-scale: 1.27; --root-font-scale: 1.27; }
html[data-font-size="xl"]  { --font-scale: 1.47; --root-font-scale: 1.47; }
html[data-font-size="xxl"] { --font-scale: 1.67; --root-font-scale: 1.67; }

.top-header, .top-header *,
.bottom-toolbar, .bottom-toolbar * {
  --font-scale: 1.07;
}

html.theme-swap,
html.theme-swap *,
html.theme-swap *::before,
html.theme-swap *::after {
  transition-property: none !important;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  overflow-x: hidden;
  max-width: 100vw;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  line-height: 1.5;
  font-size: calc(15px * var(--font-scale));
  letter-spacing: 0;
  transition: background-color 0.3s ease, color 0.3s ease;
  min-height: 100vh;
  overflow-x: hidden;
  max-width: 100vw;
  position: relative;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.app-container {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg-primary);
  position: relative;
  box-shadow: var(--shadow-lg);
  padding-bottom: 72px;
  padding-top: 60px;
  overflow-x: hidden;
  width: 100%;
}

.top-header {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: 60px;
  background: #cc785c;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-width: 56px;
  height: 38px;
  padding: 0 4px;
  color: #ffffff;
  font-family: 'Do Hyeon', system-ui, -apple-system, sans-serif;
  font-size: calc(22px * var(--font-scale));
  font-weight: 400;
  letter-spacing: -0.3px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s ease;
}
.logo .logo-icon {
  height: calc(24.948px * var(--font-scale));
  width: auto;
  flex-shrink: 0;
  display: block;
  transform: rotate(0deg);
  transform-origin: center;
  color: inherit;
}
.logo span {
  transform: translateY(2px);
}
.logo:active {
  opacity: 0.7;
}

[data-theme="dark"] .logo {
  color: #ffffff;
}

.search-container {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

.search-input {
  width: 100%;
  height: 44px;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 0 38px 0 16px;
  background: #ffffff;
  color: #1a1a1a;
  font-size: calc(16px * var(--font-scale));
  font-family: inherit;
  transition: box-shadow 0.15s ease;
  outline: none;
}

.search-input::placeholder {
  color: #9a9a9a;
}

.search-icon {
  position: absolute;
  right: 14px;
  color: #a85a42;
  pointer-events: none;
}

.theme-toggle {
  display: none !important;
  flex-shrink: 0;
  margin-left: auto;
  width: 56px;
  height: 28px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.25);
  box-shadow: inset 0 1px 1.5px rgba(0, 0, 0, 0.18);
  border: none;
  position: relative;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  box-sizing: border-box;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s ease;
}

[data-theme="dark"] .theme-toggle {
  background: rgba(0, 0, 0, 0.55);
}

.theme-toggle svg {
  width: 13px;
  height: 13px;
  color: rgba(255, 255, 255, 0.5);
  position: relative;
  z-index: 0;
  flex-shrink: 0;
  transition: color 0.2s ease;
}

.theme-toggle #sunIcon  { color: rgba(255, 255, 255, 0.22); }
.theme-toggle #moonIcon { color: rgba(255, 255, 255, 0.5); }
[data-theme="dark"] .theme-toggle #sunIcon  { color: rgba(255, 255, 255, 0.5); }
[data-theme="dark"] .theme-toggle #moonIcon { color: rgba(255, 255, 255, 0.22); }

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 1.5px 3px rgba(0, 0, 0, 0.22);
  z-index: 1;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] .theme-toggle::before {
  transform: translateX(28px);
}

.search-suggestions {
  position: absolute;
  top: 48px;
  left: 0;
  right: 0;
  background: #ffffff;
  border: 1px solid #e3e0da;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  overflow: hidden;
  max-height: min(500px, 70vh);
  overflow-y: auto;
  display: none;
  z-index: 200;
}

.search-suggestions.active {
  display: block;
}

.suggestion-item {
  padding: 12px 14px;
  cursor: pointer;
  font-size: calc(16px * var(--font-scale));
  font-weight: 400;
  color: #1a1a1a;
  border-bottom: 1px solid #ebe8e2;
  transition: background 0.15s;
}

.suggestion-item:last-child {
  border-bottom: none;
}

.suggestion-item:active {
  background: #f5f0e8;
}

.suggestion-item .sub {
  margin-left: 6px;
  color: #9a9a9a;
}

.suggestion-item .ad-tag {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  background: #111;
  color: #fff;
  border-radius: 4px;
  font-size: calc(9.5px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0.05em;
  vertical-align: middle;
}

.page-content {
  padding: 16px 16px 24px;
  min-width: 0;
  max-width: 100%;
}

.doc-title {
  font-size: calc(28px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  min-width: 0;
}

.doc-ad-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #111;
  color: #fff;
  border-radius: 999px;
  font-size: calc(11px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.doc-ad-notice {
  margin: 12px 0 16px;
  padding: 12px 14px;
  background: transparent;
  border: 1px solid #b08a55;
  border-radius: 10px;
  font-size: calc(12.5px * var(--font-scale));
  line-height: 1.55;
  color: #8a6a3a;
}
.doc-ad-notice strong {
  color: #6a4a1a;
  font-weight: 700;
}

.doc-meta {
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.doc-meta-info {
  flex: 1;
  min-width: 0;
}

.doc-copy-url-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.doc-copy-url-btn:active {
  background: var(--bg-secondary);
}

.doc-copy-url-btn.copied {
  color: var(--accent);
  border-color: var(--accent);
}

.doc-copy-url-btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  stroke: currentColor;
}

.doc-actions {
  margin-top: 32px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* 문서 하단 광고 슬롯 (placeholder) */
.doc-ad-slot {
  margin-top: 12px;
  margin-bottom: 16px;
  width: 100%;
  min-height: 90px;
  border: 1px dashed var(--border);
  border-radius: 10px;
  background: var(--bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: calc(11px * var(--font-scale));
  letter-spacing: 0.15em;
  color: var(--text-muted);
  user-select: none;
}
.doc-ad-slot:last-child {
  margin-bottom: 24px;
}
.doc-ad-slot::before {
  content: 'AD';
}

.doc-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 8px;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 10px;
  font-family: inherit;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, color 0.15s;
  text-align: center;
  line-height: 1.35;
  word-break: keep-all;
  min-height: 60px;
}

.doc-action-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  flex-shrink: 0;
}

.doc-action-btn:active {
  background: var(--bg-accent-soft);
  color: var(--text-secondary);
}

.doc-action-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.contrib-popup-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.contrib-popup-item:last-child { border-bottom: none; }
.contrib-popup-nick {
  font-size: calc(13.5px * var(--font-scale));
  font-weight: 500;
  color: var(--text-primary);
}
.contrib-popup-role {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
}
.contrib-popup-empty {
  text-align: center;
  padding: 12px 0;
  font-size: calc(13px * var(--font-scale));
  color: var(--text-tertiary);
}
.contrib-popup-more {
  text-align: center;
  padding: 8px 0 4px;
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  font-style: italic;
}

.app-toast {
  position: fixed;
  left: 50%;
  bottom: 84px;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg-elevated);
  color: var(--text-primary);
  padding: 11px 18px;
  border-radius: 22px;
  font-size: calc(13.5px * var(--font-scale));
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  opacity: 0;
  pointer-events: none;
  z-index: 300;
  transition: opacity 0.18s ease, transform 0.18s ease;
  max-width: calc(100% - 32px);
  text-align: center;
  white-space: nowrap;
}
.app-toast.is-show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.contrib-popup-modal {
  position: fixed;
  inset: 0;
  z-index: 250;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.contrib-popup-modal.is-show {
  display: flex;
}
.contrib-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}
.contrib-popup-box {
  position: relative;
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 360px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.contrib-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
}
.contrib-popup-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
}
.contrib-popup-close {
  background: transparent;
  border: none;
  font-size: calc(22px * var(--font-scale));
  line-height: 1;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 0 4px;
}
.contrib-popup-close:active {
  color: var(--text-primary);
}
.contrib-popup-body {
  padding: 6px 18px 18px;
  overflow-y: auto;
}

.doc-categories {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
}

.doc-categories strong {
  color: var(--text-secondary);
  font-weight: 500;
}

.doc-categories .cat-link {
  color: var(--link);
  cursor: pointer;
}

.infobox {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  max-width: 100%;
}

.infobox-header {
  background: var(--accent);
  color: #fff;
  padding: 14px;
  text-align: center;
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-subheader {
  background: var(--bg-accent-soft);
  padding: 10px;
  text-align: center;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-image {
  padding: 20px;
  text-align: center;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  min-height: calc(100% * 9 / 16);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  aspect-ratio: 16 / 9;
  box-sizing: border-box;
}

.infobox-image.has-photo {
  padding: 0;
  aspect-ratio: auto;
  min-height: 0;
  display: block;
}

.infobox-image-photo {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--bg-secondary);
  overflow: hidden;
  display: block;
}

.infobox-image-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.infobox-image-emoji {
  font-size: calc(56px * var(--font-scale));
  line-height: 1;
}

.infobox-image-text {
  font-size: calc(26px * var(--font-scale));
  font-weight: 700;
  color: var(--accent);
  margin-top: 6px;
  letter-spacing: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-table {
  width: 100%;
  border-collapse: collapse;
  font-size: calc(12.5px * var(--font-scale));
  line-height: 1.4;
  table-layout: fixed;
}

.infobox-table tr {
  border-bottom: 1px solid var(--border-light);
}

.infobox-table tr:last-child {
  border-bottom: none;
}

.infobox-table th {
  background: var(--bg-accent-soft);
  color: var(--text-primary);
  font-weight: 600;
  padding: 7px 12px;
  text-align: left;
  width: 90px;
  vertical-align: top;
  border-right: 1px solid var(--border-light);
  font-size: calc(12.5px * var(--font-scale));
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-table td {
  padding: 7px 12px;
  color: var(--text-secondary);
  vertical-align: top;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.version-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: calc(10px * var(--font-scale));
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 4px;
  font-family: 'JetBrains Mono', monospace;
}

.section {
  margin-bottom: 24px;
  scroll-margin-top: 70px;
  min-width: 0;
  max-width: 100%;
}

.section-title {
  font-weight: 700;
  color: var(--text-primary);
  padding-bottom: 6px;
  margin-bottom: 12px;
  display: flex;
  align-items: baseline;
  gap: 8px;
  letter-spacing: 0;
  font-size: calc(17px * var(--font-scale));
  flex-wrap: wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  min-width: 0;
}

.section-title.h2 {
  border-bottom: 1px solid var(--border);
}

.section-title.h3 {
  border-bottom: 1px solid var(--border);
}

.section-title .num {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
}

.section p {
  margin-bottom: 15px;
  color: var(--text-secondary);
  font-size: calc(14px * var(--font-scale));
  line-height: 1.65;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.wiki-link {
  color: var(--link);
  cursor: pointer;
  text-decoration: none;
  font-weight: normal;
  transition: color 0.15s, background-color 0.15s, box-shadow 0.15s;
  border-radius: 3px;
}

.wiki-link.is-clicking,
.wiki-link:active {
  background-color: var(--link-flash-bg);
  text-decoration: underline;
  text-decoration-color: var(--link);
  text-decoration-thickness: 1.5px;
  text-underline-offset: 2px;
  box-shadow: 0 0 0 2px var(--link-flash-bg);
}

.wiki-link.redlink {
  color: #c44545;
}

[data-theme="dark"] .wiki-link.redlink {
  color: #ff8080;
}

.quote-box {
  background: var(--bg-accent-soft);
  border-left: 3px solid var(--accent);
  padding: 12px 14px;
  margin: 14px 0;
  border-radius: 0 8px 8px 0;
  font-size: calc(14px * var(--font-scale));
  color: var(--text-secondary);
  font-style: italic;
}

.info-callout {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 14px 0;
  font-size: calc(13.5px * var(--font-scale));
}

.info-callout-title {
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
  font-size: calc(13px * var(--font-scale));
  display: flex;
  align-items: center;
  gap: 6px;
}

.section ul, .section ol {
  margin: 10px 0 14px 22px;
  color: var(--text-secondary);
  font-size: calc(14px * var(--font-scale));
}

.section li {
  margin-bottom: 6px;
  line-height: 1.65;
}

.section li::marker {
  color: var(--accent);
}

.wiki-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: calc(13px * var(--font-scale));
  background: var(--bg-tertiary);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  table-layout: fixed;
}

.wiki-table th {
  background: var(--bg-accent-soft);
  color: var(--text-primary);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  font-size: calc(12.5px * var(--font-scale));
  overflow-wrap: anywhere;
  word-break: break-word;
}

.wiki-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
  overflow-wrap: anywhere;
  word-break: break-word;
}

.wiki-table tr:last-child td {
  border-bottom: none;
}

code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88em;
  color: var(--accent);
}

.topic-marquee {
  position: relative;
  overflow: hidden;
  margin-left: -16px;
  margin-right: -16px;
  margin-bottom: 18px;
  padding: 14px 0;
}

.topic-marquee-track {
  display: flex;
  gap: 10px;
  width: max-content;
  animation: marquee-scroll 40s linear infinite;
  will-change: transform;
}

@keyframes marquee-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.topic-marquee-item {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  letter-spacing: 0;
  white-space: nowrap;
  padding: 10px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 999px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, background 0.15s ease;
}

.topic-marquee-item:active,
.topic-marquee-item.is-clicking {
  background: var(--bg-accent-soft);
}

.search-demo-stage {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  margin-bottom: -12px;
  overflow: hidden;
  margin-top: 40px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.search-demo-stage:active {
  opacity: 0.85;
}
.search-demo-stage:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
  border-radius: 8px;
}

.search-demo-stage::before {
  content: none;
}

.search-demo-headline {
  position: absolute;
  top: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: calc(19px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  z-index: 5;
}

.search-demo-input-wrap {
  position: absolute;
  top: 64px;
  left: 15.6%;
  right: 15.6%;
  z-index: 4;
}

.search-demo-input {
  width: 100%;
  height: 52px;
  background: var(--bg-tertiary);
  border: 1.5px solid var(--accent);
  border-radius: 999px;
  display: flex;
  align-items: center;
  padding: 0 52px 0 20px;
  font-size: calc(17.5px * var(--font-scale));
  color: var(--text-primary);
  position: relative;
  box-shadow: 0 2px 8px rgba(204, 120, 92, 0.08);
}

.search-demo-input-text {
  white-space: nowrap;
  overflow: hidden;
  font-weight: 500;
}

.search-demo-input-caret {
  display: inline-block;
  width: 2px;
  height: 20px;
  background: var(--accent);
  margin-left: 1px;
  vertical-align: middle;
  animation: search-demo-caret 0.7s steps(2, start) infinite;
}

@keyframes search-demo-caret {
  0%, 50%   { opacity: 1; }
  51%, 100% { opacity: 0; }
}

.search-demo-input-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  color: var(--accent);
}

.search-demo-autocomplete {
  position: absolute;
  top: 126px;
  left: 15.6%;
  right: 15.6%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(-6px);
  z-index: 3;
  overflow: hidden;
  pointer-events: none;
  transition: opacity 0.275s ease, transform 0.275s ease;
}

.search-demo-autocomplete.is-open {
  opacity: 1;
  transform: translateY(0);
}

.search-demo-autocomplete-item {
  padding: 13px 20px;
  font-size: calc(16px * var(--font-scale));
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-light);
}

.search-demo-autocomplete-item:last-child {
  border-bottom: none;
}

.search-demo-autocomplete-item.is-highlighted {
  background: var(--bg-accent-soft);
}

.search-demo-autocomplete-title {
  font-weight: 600;
  color: var(--text-primary);
}

.search-demo-autocomplete-sub {
  font-size: calc(14px * var(--font-scale));
  color: var(--text-tertiary);
}

.search-demo-cursor {
  position: absolute;
  width: 40px;
  height: 40px;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  margin-left: -16px;
  margin-top: -5px;
  transform-origin: 16px 5px;
  transition: opacity 0.2s ease, left 0.77s cubic-bezier(0.45, 0, 0.2, 1), top 0.77s cubic-bezier(0.45, 0, 0.2, 1), transform 0.165s ease;
  filter:
    drop-shadow( 0.6px  0    0 var(--cursor-outline, #fff))
    drop-shadow(-0.6px  0    0 var(--cursor-outline, #fff))
    drop-shadow( 0     0.6px 0 var(--cursor-outline, #fff))
    drop-shadow( 0    -0.6px 0 var(--cursor-outline, #fff))
    drop-shadow( 0     1.5px 2px rgba(0,0,0,0.18));
  color: #1a1a1a;
  --cursor-outline: #fff;
  --cursor-fill: #fff;
}
[data-theme="dark"] .search-demo-cursor {
  color: #fff;
  --cursor-outline: #1a1a1a;
  --cursor-fill: #1a1a1a;
}

.search-demo-cursor.is-visible { opacity: 1; }
.search-demo-cursor.is-tapping { transform: scale(0.85); }

.search-demo-result {
  position: absolute;
  top: 145px;
  left: 4%;
  right: 4%;
  bottom: 16px;
  padding: 0;
  opacity: 0;
  transform: translateY(8px);
  z-index: 5;
  overflow: hidden;
  transition: opacity 0.385s ease, transform 0.385s ease;
  display: flex;
  flex-direction: column;
}

.search-demo-result.is-shown {
  opacity: 1;
  transform: translateY(0);
}

.search-demo-result-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 7px;
  margin-bottom: 7px;
}

.search-demo-result-title {
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
}

.search-demo-result-sub {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
}

.search-demo-result-meta {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  margin-bottom: 5px;
}

.search-demo-result-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 7px;
}

.search-demo-result-tag {
  font-size: calc(11px * var(--font-scale));
  background: var(--bg-accent-soft);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 500;
}

.search-demo-result-body {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  position: relative;
}

.search-demo-result-body::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 24px;
  background: linear-gradient(180deg, transparent 0%, var(--bg-primary) 100%);
  pointer-events: none;
}

.home-section-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-secondary);
  margin: 24px 0 10px;
  letter-spacing: 0;
}

.home-section-title-clickable {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s ease, transform 0.15s ease;
  user-select: none;
}
.home-section-title-clickable:active,
.home-section-title-clickable.is-clicking {
  color: var(--text-primary);
  transform: translateX(1px);
}
.home-section-chevron {
  width: 14px;
  height: 14px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  margin-top: 1px;
}

.page-content > .home-section-title:first-child {
  margin-top: 0;
}

.home-curation {
  list-style: none;
  padding: 0;
  margin: 0 0 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.home-curation-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.home-curation-card:active,
.home-curation-card.is-clicking {
  background: rgba(0, 0, 0, 0.025);
  box-shadow: var(--shadow-sm);
}
[data-theme="dark"] .home-curation-card:active,
[data-theme="dark"] .home-curation-card.is-clicking {
  background: rgba(255, 255, 255, 0.04);
}

.home-curation-icon {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.home-curation-icon svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
}
.home-curation-card.tone-1 .home-curation-icon { background: #fbeae3; color: #c75a3c; }
.home-curation-card.tone-2 .home-curation-icon { background: #efeae0; color: #8a7a5e; }
.home-curation-card.tone-3 .home-curation-icon { background: #fbeae3; color: #c75a3c; }
[data-theme="dark"] .home-curation-card.tone-1 .home-curation-icon { background: #3a2920; color: #e8a590; }
[data-theme="dark"] .home-curation-card.tone-2 .home-curation-icon { background: #2e2a23; color: #c2b294; }
[data-theme="dark"] .home-curation-card.tone-3 .home-curation-icon { background: #3a2920; color: #e8a590; }

.home-curation-body {
  flex: 1;
  min-width: 0;
}

.home-curation-titlerow {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}
.home-curation-title {
  flex: 1;
  min-width: 0;
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.home-curation-views {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0;
  font-feature-settings: "tnum";
}

.home-curation-desc {
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.home-topics-hero {
  position: relative;
  aspect-ratio: 5 / 1;
  border-radius: 10px;
  overflow: hidden;
  margin: 0 0 4px;
  cursor: pointer;
  background: #cc785c;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s ease;
}
.home-topics-hero:active,
.home-topics-hero.is-clicking {
  animation: heroArriveBump 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
[data-theme="dark"] .home-topics-hero:active,
[data-theme="dark"] .home-topics-hero.is-clicking {
  animation: heroArriveBump 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes heroArriveBump {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}
[data-theme="dark"] .home-topics-hero {
  background: #a85f48;
}

.home-topics-hero-overlay {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 40%;
  background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.4));
  z-index: 1;
  pointer-events: none;
}

.home-topics-hero-content {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  color: white;
  max-width: 70%;
}
.home-topics-hero-badge {
  display: inline-block;
  font-size: calc(9px * var(--font-scale));
  font-weight: 600;
  color: white;
  background: rgba(255, 255, 255, 0.25);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.06em;
}
.home-topics-hero-title {
  font-size: calc(16px * var(--font-scale));
  font-weight: 700;
  color: white;
  line-height: 1.2;
  letter-spacing: 0;
  margin-top: 4px;
}
.home-topics-hero-meta {
  font-size: calc(10px * var(--font-scale));
  color: rgba(255, 255, 255, 0.85);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

@keyframes home-topics-spark-draw {
  0%   { stroke-dashoffset: 100; }
  60%, 100%  { stroke-dashoffset: 0; }
}
@keyframes home-topics-spark-area-reveal {
  0%   { clip-path: inset(0 100% 0 0); }
  60%, 100%  { clip-path: inset(0 0 0 0); }
}
.home-topics-hero-spark {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 22px;
  z-index: 2;
  pointer-events: none;
}
.home-topics-hero-spark .area {
  fill: white;
  opacity: 0.22;
  clip-path: inset(0 100% 0 0);
  animation: home-topics-spark-area-reveal 3.2s ease-out infinite;
}
.home-topics-hero-spark .line {
  stroke: white;
  stroke-width: 2.4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  animation: home-topics-spark-draw 3.2s ease-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .home-topics-hero-spark .line,
  .home-topics-hero-spark .area { animation: none; }
  .home-topics-hero-spark .line { stroke-dashoffset: 0; }
  .home-topics-hero-spark .area { clip-path: inset(0 0 0 0); }
}

html[data-font-size="l"] .home-topics-hero {
  aspect-ratio: 4.4 / 1;
}

html[data-font-size="xl"] .home-topics-hero,
html[data-font-size="xxl"] .home-topics-hero {
  aspect-ratio: auto;
  min-height: 76px;
  padding: 12px 14px;
}

html[data-font-size="xl"] .home-topics-hero-content,
html[data-font-size="xxl"] .home-topics-hero-content {
  position: static;
  transform: none;
  max-width: 100%;
}

html[data-font-size="xl"] .home-topics-hero-meta,
html[data-font-size="xxl"] .home-topics-hero-meta {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  line-height: 1.35;
}

html[data-font-size="xl"] .home-topics-hero-spark,
html[data-font-size="xxl"] .home-topics-hero-spark {
  display: none;
}

html[data-font-size="xl"] .home-topics-hero-overlay,
html[data-font-size="xxl"] .home-topics-hero-overlay {
  display: none;
}

.home-topics-rest {
  list-style: none;
  padding: 0;
  margin: 8px 0 0;
}
.home-topics-rest-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 4px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--border-light);
  border-radius: 6px;
  transition: background 0.15s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.home-topics-rest-row:last-child {
  border-bottom: none;
}
.home-topics-rest-row:active,
.home-topics-rest-row.is-clicking {
  background: rgba(0, 0, 0, 0.025);
}
[data-theme="dark"] .home-topics-rest-row:active,
[data-theme="dark"] .home-topics-rest-row.is-clicking {
  background: rgba(255, 255, 255, 0.04);
}
.home-topics-rest-rank {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  width: 22px;
  flex-shrink: 0;
  font-feature-settings: 'tnum';
}
.home-topics-rest-name {
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.home-topics-rest-spark {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 2.5px;
  height: 18px;
  width: 44px;
}
.home-topics-rest-spark span {
  flex: 1;
  background: var(--accent);
  border-radius: 1.5px;
  min-height: 3px;
  transform-origin: bottom;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
  --spark-op-high: 0.55;
  --spark-op-low: 0.3;

  background: var(--bg-primary);
  z-index: 5;
}
.settings-title {
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--text-primary);
}

.settings-section {
  margin-top: 24px;
}
.settings-section:first-child {
  margin-top: 0;
}
.settings-head + .settings-section {
  margin-top: 16px;
}
.settings-section-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 2px;
  letter-spacing: 0;
}

.settings-list {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  overflow: hidden;
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  background: var(--bg-elevated);
  transition: background 0.15s ease;
}
.settings-row + .settings-row,
.settings-expand + .settings-row {
  border-top: 1px solid var(--border-light);
}

.settings-row-l {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  flex: 1;
}
.settings-row-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--bg-secondary);
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.settings-row-icon svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.settings-row-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.settings-row-label {
  font-size: calc(13px * var(--font-scale));
  color: var(--text-primary);
  line-height: 1.3;
}
.settings-row-value {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-tertiary);
  margin-top: 2px;
  line-height: 1.3;
}

.settings-row-r {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.settings-row-chevron {
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease, color 0.2s ease;
}
.settings-row-chevron svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.settings-row.is-expandable .settings-row-chevron {
  transform: rotate(0deg);
}
.settings-row.is-expandable.is-open .settings-row-chevron {
  transform: rotate(180deg);
  color: var(--accent);
}

.settings-expand {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  background: var(--bg-secondary);
  transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.settings-expand.is-open {
  max-height: 480px;
  opacity: 1;
  border-top: 1px solid var(--border-light);
}
.settings-expand-inner {
  padding: 14px;
}

.settings-expand-inner .font-size-section,
.settings-expand-inner .theme-card-section {
  margin: 0;
  padding: 0;
  background: transparent;
  border: none;
}

.contribute-flow {
  display: flex;
  flex-direction: column;
  padding: 6px 0 4px;
}
.contribute-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.contribute-step:not(:last-child) {
  padding-bottom: 18px;
}
.contribute-step-marker {
  position: relative;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  align-self: stretch;
}
.contribute-step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-size: calc(11px * var(--font-scale));
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  z-index: 1;
}
.contribute-step-line {
  flex: 1;
  width: 1.5px;
  background: var(--border);
  margin-top: 2px;
}
.contribute-step-body {
  flex: 1;
  padding-top: 1px;
  min-width: 0;
}
.contribute-step-title {
  font-size: calc(13px * var(--font-scale));
  font-weight: 600;
  color: var(--text-primary);
  margin: 0 0 2px;
  line-height: 1.4;
}
.contribute-step-sub {
  font-size: calc(11.5px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0;
  line-height: 1.5;
}
.contribute-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin: 18px 0 0;
  height: 48px;
  padding: 0 14px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: var(--accent-text);
  font-size: calc(14px * var(--font-scale));
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0;
  line-height: 1;
  word-break: keep-all;
  transition: opacity 0.15s ease, transform 0.1s ease;
  -webkit-tap-highlight-color: transparent;
}
.contribute-cta:active {
  opacity: 0.88;
}

.appinfo-content {
  padding: 4px 0 6px;
}
.appinfo-identity {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin: 0 0 2px;
}
.appinfo-name {
  font-size: calc(14px * var(--font-scale));
  color: var(--text-primary);
  font-weight: 600;
  line-height: 1.3;
}
.appinfo-version {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  font-weight: 400;
  line-height: 1.3;
}
.appinfo-tagline {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0 0 14px;
  line-height: 1.5;
}
.appinfo-block {
  margin: 0 0 10px;
}
.appinfo-block:last-child {
  margin-bottom: 0;
}
.appinfo-block-body {
  font-size: calc(11.5px * var(--font-scale));
  color: var(--text-primary);
  margin: 0;
  line-height: 1.55;
}
.appinfo-block-body + .appinfo-block-body {
  margin-top: 4px;
}

.settings-footer {
  text-align: center;
  color: var(--text-muted);
  font-size: calc(12px * var(--font-scale));
  margin-top: 28px;
  padding: 14px 8px;
  line-height: 1.6;
}

/* === 갤러리: 스마트폰 갤러리식 2열 그리드 === */
.gallery-feed {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.gallery-card {
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
}

.gallery-card.is-expanded {
  grid-column: 1 / -1;
  background: var(--bg-tertiary);
  border-radius: 14px;
  padding: 8px 8px 12px;
  box-shadow: 0 2px 12px rgba(204, 120, 92, 0.18);
  border: 0.5px solid var(--border);
  margin: 4px 0;
}

.gallery-card-image {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: linear-gradient(135deg, var(--bg-secondary), var(--border));
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
  -webkit-touch-callout: default;
  transition: opacity 0.12s ease;
}
.gallery-card.is-expanded .gallery-card-image {
  cursor: default;
  border-radius: 10px;
}
.gallery-card:not(.is-expanded) .gallery-card-image:active {
  opacity: 0.85;
}

.gallery-card-image svg,
.gallery-card-image img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
  -webkit-touch-callout: default;
  -webkit-user-select: auto;
  user-select: auto;
}

/* 그리드 썸네일 우하단 좋아요 미니 알약 */
.gallery-like-mini {
  position: absolute;
  bottom: 6px;
  right: 6px;
  height: 22px;
  padding: 0 8px 0 6px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  border: none;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: inherit;
  font-size: calc(10.5px * var(--font-scale));
  font-weight: 500;
  cursor: pointer;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  transition: background 0.15s ease;
}
.gallery-like-mini:active {
  background: rgba(0, 0, 0, 0.75);
}
.gallery-like-mini svg {
  width: 11px;
  height: 11px;
  flex-shrink: 0;
  transition: transform 0.18s ease;
}
.gallery-like-mini.is-liked svg {
  fill: #ff3b5c;
  stroke: #ff3b5c;
  transform: scale(1.05);
}

/* 상세뷰: 닫기 버튼 (우상단) */
.gallery-close-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border: none;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  transition: background 0.15s ease;
}
.gallery-close-btn:active {
  background: rgba(0, 0, 0, 0.75);
}
.gallery-close-btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* 상세뷰: 우하단 액션 알약 (좋아요+다운로드) */
.gallery-action-row {
  position: absolute;
  bottom: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
}

.gallery-action-pill {
  height: 30px;
  padding: 0 11px 0 9px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  border: none;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  font-size: calc(11.5px * var(--font-scale));
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  transition: background 0.15s ease;
}
.gallery-action-pill:active {
  background: rgba(0, 0, 0, 0.75);
}
.gallery-action-pill svg {
  width: 13px;
  height: 13px;
  flex-shrink: 0;
  transition: transform 0.18s ease;
}
.gallery-action-pill.gallery-like-pill.is-liked svg {
  fill: #ff3b5c;
  stroke: #ff3b5c;
  transform: scale(1.08);
}

/* 그리드 썸네일 아래 1줄 프롬프트 미리보기 */
.gallery-card-thumb-prompt {
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 5px 2px 0;
  font-size: calc(11.5px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.35;
  word-break: break-all;
}

.gallery-card-caption {
  display: block;
  padding: 10px 4px 2px;
  color: var(--text-primary);
  word-break: keep-all;
}

.gallery-card-meta {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-muted);
  line-height: 1.4;
  margin-bottom: 4px;
}
.gallery-card-meta-sep {
  color: var(--text-muted);
  opacity: 0.6;
}

.gallery-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: calc(13px * var(--font-scale));
}

.gallery-empty-icon {
  font-size: calc(40px * var(--font-scale));
  opacity: 0.5;
  margin-bottom: 12px;
}

.gallery-pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  margin: 20px 0 14px;
  flex-wrap: wrap;
}

.gallery-page-btn {
  min-width: 32px;
  height: 32px;
  padding: 0 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: calc(13px * var(--font-scale));
  font-family: 'JetBrains Mono', monospace;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.gallery-page-btn:active {
  background: var(--bg-secondary);
}

.gallery-page-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-text);
  font-weight: 600;
}

.gallery-page-ellipsis {
  color: var(--text-muted);
  font-size: calc(13px * var(--font-scale));
  padding: 0 4px;
}

.gallery-tabs {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  margin: -16px -16px 0 -16px;
  padding: 17px 16px 12px 16px;
  position: sticky;
  top: 0;
  background: var(--bg-primary);
  z-index: 5;
}

.gallery-tabs-title {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-shrink: 0;
}
.gallery-tabs-title-main {
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.gallery-contribute-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  height: 48px;
  padding: 0 14px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: var(--accent-text);
  font-size: calc(14px * var(--font-scale));
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0;
  line-height: 1;
  word-break: keep-all;
  margin: 8px 0 4px;
  transition: opacity 0.15s ease, transform 0.1s ease;
  -webkit-tap-highlight-color: transparent;
}
.gallery-contribute-cta:active {
  opacity: 0.88;
}
.gallery-contribute-cta svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.topics-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 10px;
  margin: -16px -16px 0 -16px;
  padding: 17px 16px 12px 16px;
  position: sticky;
  top: 0;
  background: var(--bg-primary);
  z-index: 5;
}
.topics-title {
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--text-primary);
  flex-shrink: 0;
}

.topics-hero {
  position: relative;
  aspect-ratio: 4 / 1;
  border-radius: 12px;
  overflow: hidden;
  margin: 14px 0 22px;
  cursor: pointer;
  background: #cc785c;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s ease;
}

[data-theme="dark"] .topics-hero {
  background: #a85f48;
}

.topics-hero-overlay {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 45%;
  background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.45));
  z-index: 1;
  pointer-events: none;
}

.topics-hero-content {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  color: white;
  max-width: 70%;
}
.topics-hero-badge {
  display: inline-block;
  font-size: calc(10px * var(--font-scale));
  font-weight: 600;
  color: white;
  background: rgba(255, 255, 255, 0.22);
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.06em;
}
.topics-hero-title {
  font-size: calc(16px * var(--font-scale));
  font-weight: 700;
  color: white;
  line-height: 1.2;
  letter-spacing: 0;
  margin-top: 6px;
}
.topics-hero-meta {
  font-size: calc(11px * var(--font-scale));
  color: rgba(255, 255, 255, 0.85);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

@keyframes topics-spark-draw {
  0%   { stroke-dashoffset: 120; }
  60%, 100%  { stroke-dashoffset: 0; }
}
@keyframes topics-spark-area-reveal {
  0%   { clip-path: inset(0 100% 0 0); }
  60%, 100%  { clip-path: inset(0 0 0 0); }
}
.topics-hero-spark {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 70px;
  height: 28px;
  z-index: 2;
  pointer-events: none;
}
.topics-hero-spark .area {
  fill: white;
  opacity: 0.22;
  clip-path: inset(0 100% 0 0);
  animation: topics-spark-area-reveal 3.2s ease-out infinite;
}
.topics-hero-spark .line {
  stroke: white;
  stroke-width: 2.6;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 120;
  stroke-dashoffset: 120;
  animation: topics-spark-draw 3.2s ease-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .topics-hero-spark .line,
  .topics-hero-spark .area { animation: none; }
  .topics-hero-spark .line { stroke-dashoffset: 0; }
  .topics-hero-spark .area { clip-path: inset(0 0 0 0); }
}

html[data-font-size="l"] .topics-hero {
  aspect-ratio: 3.6 / 1;
}

html[data-font-size="xl"] .topics-hero,
html[data-font-size="xxl"] .topics-hero {
  aspect-ratio: auto;
  min-height: 96px;
  padding: 14px 16px;
}

html[data-font-size="xl"] .topics-hero-content,
html[data-font-size="xxl"] .topics-hero-content {
  position: static;
  transform: none;
  max-width: 100%;
}

html[data-font-size="xl"] .topics-hero-meta,
html[data-font-size="xxl"] .topics-hero-meta {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  line-height: 1.4;
}

html[data-font-size="xl"] .topics-hero-spark,
html[data-font-size="xxl"] .topics-hero-spark {
  display: none;
}

html[data-font-size="xl"] .topics-hero-overlay,
html[data-font-size="xxl"] .topics-hero-overlay {
  display: none;
}

.topics-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.topics-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  cursor: pointer;
  padding: 4px 0;
  border-radius: 6px;
  transition: background 0.15s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.topics-row:active {
  background: var(--bg-accent-soft);
}

.topics-row::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 6px;
  bottom: 6px;
  width: 4px;
  background: var(--accent);
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
}

@keyframes topics-arrive-row {
  0%   { background: rgba(0, 0, 0, 0.055); }
  41%  { background: rgba(0, 0, 0, 0.055); }
  100% { background: transparent; }
}
@keyframes topics-arrive-hero {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}
[data-theme="dark"] .topics-row.topics-just-arrived {
  animation: topics-arrive-row-dark 1.7s ease-out forwards;
}
@keyframes topics-arrive-row-dark {
  0%   { background: rgba(255, 255, 255, 0.09); }
  41%  { background: rgba(255, 255, 255, 0.09); }
  100% { background: transparent; }
}
[data-theme="dark"] .topics-hero.topics-just-arrived {
  animation: topics-arrive-hero 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.topics-row.topics-just-arrived {
  animation: topics-arrive-row 1.7s ease-out forwards;
}
.topics-hero.topics-just-arrived {
  animation: topics-arrive-hero 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@media (prefers-reduced-motion: reduce) {
  .topics-row.topics-just-arrived,
  .topics-hero.topics-just-arrived {
    animation: none;
  }
}
.topics-rank {
  font-size: calc(13px * var(--font-scale));
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1.4;
  letter-spacing: 0;
  font-feature-settings: 'tnum';
  min-width: 28px;
  flex-shrink: 0;
  padding-top: 2px;
  word-break: keep-all;
}
.topics-row-body {
  flex: 1;
  min-width: 0;
}
.topics-row-name {
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
  letter-spacing: 0;
}
.topics-row-name-inner {
  display: inline;
  border-radius: 3px;
  transition: color 0.15s, background-color 0.15s, box-shadow 0.15s;
}
.topics-row-name-inner.is-clicking {
  background-color: transparent;

  line-height: 1.5;

.contrib-summary-value .strong {

}
.contrib-summary-value .muted {
  color: var(--text-secondary);
}
.contrib-summary-value.clamp {

  -webkit-box-orient: vertical;
  overflow: hidden;
}
.contrib-summary-edit {
  background: transparent;
  border: none;
  padding: 4px 8px;
  font-size: calc(12px * var(--font-scale));
  color: var(--accent);

  font-family: inherit;
  flex-shrink: 0;
}

.contrib-captcha-intro {
  font-size: calc(13px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0 0 12px;
  line-height: 1.6;
}
.contrib-captcha-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 20px;
}
.contrib-captcha-display {
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 76px;
  box-sizing: border-box;
}
.contrib-captcha-chars {
  display: flex;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(20px * var(--font-scale));
  letter-spacing: 1px;
}
.contrib-captcha-chars .pick {
  color: #000;
  font-weight: 800;
}
.contrib-captcha-chars .other {
  color: #b5b5b5;
  font-weight: 200;
  opacity: 0.6;
}
[data-theme="dark"] .contrib-captcha-chars .pick {
  color: #fff;
}
[data-theme="dark"] .contrib-captcha-chars .other {
  color: #8a8a8a;
  opacity: 0.85;
}
.contrib-captcha-hint {
  font-size: calc(10px * var(--font-scale));
  color: var(--text-secondary);
  white-space: nowrap;
  text-align: center;
}
.contrib-captcha-hint .pick-label {
  color: var(--text-primary);
  font-weight: 800;
}

.contrib-captcha-input-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.contrib-captcha-input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: calc(14px * var(--font-scale));
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-tertiary);
  text-align: center;
  letter-spacing: 4px;
  color: var(--text-primary);
}
.contrib-captcha-input.error {
  border-color: #dc2626;
  background-color: #fef2f2;
  box-shadow: 0 0 0 1px #dc2626;
}
[data-theme="dark"] .contrib-captcha-input.error {
  border-color: #f87171;
  background-color: rgba(220, 38, 38, 0.12);
  box-shadow: 0 0 0 1px #f87171;
}
.contrib-captcha-input.success {
  border-color: #0284c7;
  background-color: #eff6fc;
  box-shadow: 0 0 0 1px #0284c7;
}
[data-theme="dark"] .contrib-captcha-input.success {
  border-color: #38bdf8;
  background-color: rgba(56, 189, 248, 0.10);
  box-shadow: 0 0 0 1px #38bdf8;
}
.contrib-captcha-feedback {
  display: flex;
  align-items: center;
  gap: 4px;
  padding-left: 2px;
  min-height: 14px;
}
.contrib-captcha-feedback .icon {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}
.contrib-captcha-feedback .text {
  font-size: calc(11px * var(--font-scale));
  font-weight: 600;
}
.contrib-captcha-feedback.error .icon { stroke: #dc2626; }
.contrib-captcha-feedback.error .text { color: #dc2626; }
[data-theme="dark"] .contrib-captcha-feedback.error .icon { stroke: #f87171; }
[data-theme="dark"] .contrib-captcha-feedback.error .text { color: #f87171; }
.contrib-captcha-feedback.success .icon { stroke: #0284c7; }
.contrib-captcha-feedback.success .text { color: #0284c7; }
[data-theme="dark"] .contrib-captcha-feedback.success .icon { stroke: #38bdf8; }
[data-theme="dark"] .contrib-captcha-feedback.success .text { color: #38bdf8; }

.contrib-done-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}
.contrib-done-modal.open {
  display: flex;
}
.contrib-done-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}
.contrib-done-card {
  position: relative;
  width: 100%;
  max-width: 380px;
  background: var(--bg-elevated);
  border-radius: 12px;
  border: 0.5px solid var(--border);
  padding: 36px 24px 28px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  max-height: calc(100vh - 32px);
  overflow-y: auto;
}
.contrib-done-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.contrib-done-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.contrib-done-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--accent);
  stroke-width: 2.5;
}
[data-theme="dark"] .contrib-done-icon {
  background: rgba(56, 189, 248, 0.15);
}
[data-theme="dark"] .contrib-done-icon svg {
  stroke: #38bdf8;
}
.contrib-done-title {
  font-size: calc(20px * var(--font-scale));
  font-weight: 600;
  margin: 0 0 2px;
  line-height: 1.3;
  letter-spacing: 0;
  color: var(--text-primary);
}
[data-theme="dark"] .contrib-done-title {
  color: #ffffff;
}
.contrib-done-subtitle {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0;
}
.contrib-done-eyebrow {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  margin: 0 0 16px;
  letter-spacing: 0.3px;
}
.contrib-done-timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 28px;
}
.contrib-done-step {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.contrib-done-step-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.contrib-done-step-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  border: 1.5px solid var(--text-tertiary);
  color: var(--text-tertiary);
  font-size: calc(12px * var(--font-scale));
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}
.contrib-done-step-dot.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-text);
}
.contrib-done-step-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  min-height: 32px;
  border-radius: 1px;
}
[data-theme="dark"] .contrib-done-step-line {
  background: #4a4a4a;
}
.contrib-done-step-body {
  flex: 1;
  padding-bottom: 16px;
}
.contrib-done-step:last-child .contrib-done-step-body {
  padding-bottom: 0;
}
.contrib-done-step-title {
  font-size: calc(14px * var(--font-scale));
  font-weight: 500;
  line-height: 1.4;
  color: var(--text-primary);
}
.contrib-done-step.upcoming .contrib-done-step-title {
  color: var(--text-secondary);
}
.contrib-done-step-meta {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  margin-top: 2px;
}
.contrib-done-step.upcoming .contrib-done-step-meta {
  color: var(--text-tertiary);
}
.contrib-done-step-condition {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.contrib-done-step-condition + .contrib-done-step-condition {
  margin-top: 4px;
}
.contrib-done-step-condition .icon {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}
.contrib-done-step-condition .icon.ok { stroke: #1D9E75; }
.contrib-done-step-condition .icon.no { stroke: #A32D2D; }
[data-theme="dark"] .contrib-done-step-condition .icon.ok { stroke: #34d399; }
[data-theme="dark"] .contrib-done-step-condition .icon.no { stroke: #f87171; }
.contrib-done-step-condition .text {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
}
.contrib-done-step-note {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  margin-top: 6px;
  padding-left: 18px;
}
.contrib-done-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.not-found {
  text-align: center;
  padding: 40px 20px;
}

.not-found-icon {
  font-size: calc(56px * var(--font-scale));
  margin-bottom: 14px;
}

.not-found-title {
  font-size: calc(22px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: 0;
}

.not-found-desc {
  font-size: calc(13px * var(--font-scale));
  color: var(--text-tertiary);
  margin-bottom: 20px;
}

.btn-primary {
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: calc(13px * var(--font-scale));
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

[data-theme="dark"] .gallery-card-image {
  background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
}
.gallery-card.is-expanded .gallery-card-image {
  background: var(--bg-secondary);
}
.gallery-card:not(.is-expanded):nth-child(7n+1) .gallery-card-image { background: linear-gradient(135deg, #cc785c, #8b4a3a); }

.gallery-card:not(.is-expanded):nth-child(7n+4) .gallery-card-image { background: linear-gradient(135deg, #4a6fa5, #2c4670); }
.gallery-card:not(.is-expanded):nth-child(7n+5) .gallery-card-image { background: linear-gradient(135deg, #5a72b8, #2e3d75); }
.gallery-card:not(.is-expanded):nth-child(7n+6) .gallery-card-image { background: linear-gradient(135deg, #b08968, #7a5a3f); }
.gallery-card:not(.is-expanded):nth-child(7n+7) .gallery-card-image { background: linear-gradient(135deg, #555555, #2a2a2a); }

/* === 문서 본문 사진 (figure) === */
.doc-figure {
  margin: 20px 0;
  text-align: center;
}
.doc-figure img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);

  margin: 0 auto;
}
.doc-figure figcaption {
  margin-top: 10px;
  font-size: 13px;
  color: var(--text-secondary, #888);
  font-style: italic;
  line-height: 1.5;
  padding: 0 8px;
}

/* === 본문 작은 안내문 (footnote) === */
.section .footnote {
  margin-top: 8px;

}
@media (max-width: 720px) {

  .doc-figure figcaption { font-size: 12px; }
}

let DOCS = {};

let DOCS_LOAD_ERROR = null;

function showBootMessage(html) {
  const el = document.getElementById('pageContent');
  if (el) el.innerHTML = html;
}

async function loadAllDocs() {
  // 첫 진입 시 로딩 메시지
  showBootMessage(`
    <div style="padding:60px 20px;text-align:center;color:var(--text-secondary,#888);font-size:14px;">
      <div style="font-size:32px;margin-bottom:12px;opacity:.5;">⏳</div>
      <div>문서를 불러오는 중…</div>
    </div>
  `);

  try {
    const indexRes = await fetch('docs/_index.json', { cache: 'no-cache' });
    if (!indexRes.ok) throw new Error('docs/_index.json 로드 실패 (HTTP ' + indexRes.status + ')');
    const { docs: docIds } = await indexRes.json();

    // 모든 문서를 병렬로 로드
    const results = await Promise.all(
      docIds.map(async (id) => {
        try {
          const res = await fetch(`docs/${id}.json`, { cache: 'no-cache' });
          if (!res.ok) {
            console.warn(`docs/${id}.json 로드 실패 (${res.status})`);
            return [id, null];
          }
          const doc = await res.json();
          return [id, doc];
        } catch (e) {
          console.warn(`docs/${id}.json 파싱 실패:`, e);
          return [id, null];
        }
      })
    );

    // 성공한 것만 DOCS에 채움
    for (const [id, doc] of results) {
      if (doc) DOCS[id] = doc;
    }

    DOCS_LOADED = true;
    console.log(`[homiwiki] ${Object.keys(DOCS).length}개 문서 로드 완료`);

    if (Object.keys(DOCS).length === 0) {
      DOCS_LOAD_ERROR = '문서가 하나도 로드되지 않았어요.';
    }
  } catch (err) {
    console.error('[homiwiki] 문서 로드 실패:', err);
    DOCS_LOAD_ERROR = err.message || String(err);
    DOCS_LOADED = true;
  }
}

let _toastTimer = null;
function showToast(message, options) {
  options = options || {};
  const duration = typeof options.duration === 'number' ? options.duration : 1800;
  let toast = document.getElementById('appToast');
  if (!toast) {
    toast = document.createElement('div');

    toast.className = 'app-toast';
    toast.setAttribute('role', 'status');
    toast.setAttribute('aria-live', 'polite');
    document.body.appendChild(toast);
  }

  requestAnimationFrame(() => toast.classList.add('is-show'));

}

const searchInput = document.getElementById('searchInput');
const searchSuggestions = document.getElementById('searchSuggestions');

function normalizeSearch(query) {
  return query.trim().toLowerCase().replace(/\s+/g, ' ');
}

function resolveDocId(query) {
  const normalized = normalizeSearch(query);
  if (REDIRECT_MAP[query]) return REDIRECT_MAP[query];
  if (REDIRECT_MAP[query.trim()]) return REDIRECT_MAP[query.trim()];
  const noSpace = query.replace(/\s/g, '');
  if (REDIRECT_MAP[noSpace]) return REDIRECT_MAP[noSpace];
  for (const key in REDIRECT_MAP) {
    if (normalizeSearch(key) === normalized) return REDIRECT_MAP[key];
  }
  if (DOCS[normalized]) return normalized;
  if (DOCS[query]) return query;
  return null;
}

function getSuggestions(query) {
  if (!query.trim()) return [];
  const normalized = normalizeSearch(query);
  if (normalized.length < 2) return [];
  const results = new Set();

  for (const key in REDIRECT_MAP) {
    if (normalizeSearch(key).includes(normalized) && DOCS[REDIRECT_MAP[key]]) {
      results.add(REDIRECT_MAP[key]);
    }
  }
  for (const docId in DOCS) {
    const doc = DOCS[docId];
    if (docId.toLowerCase().includes(normalized) ||
        doc.title.toLowerCase().includes(normalized) ||
        (doc.subtitle && doc.subtitle.toLowerCase().includes(normalized))) {
      results.add(docId);
    }
  }
  return Array.from(results).slice(0, 30);
}

function renderSuggestions(query) {
  const suggestions = getSuggestions(query);
  if (suggestions.length === 0) {
    searchSuggestions.classList.remove('active');
    return;
  }
  searchSuggestions.innerHTML = suggestions.map(docId => {
    const doc = DOCS[docId];
    const sub = doc.subtitle ? `<span class="sub">${doc.subtitle}</span>` : '';
    const adTag = doc.type === 'sponsored' ? `<span class="ad-tag" aria-label="광고 문서">AD</span>` : '';
    return `<div class="suggestion-item" onclick="selectSuggestion('${docId}')">${doc.title}${sub}${adTag}</div>`;
  }).join('');
  searchSuggestions.classList.add('active');
}

window.selectSuggestion = function(docId) {

  navigateTo('doc', docId);
};

let searchDebounceTimer = null;
searchInput.addEventListener('input', (e) => {
  const val = e.target.value;
  if (!val.trim()) {
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = null;
    }
    searchSuggestions.classList.remove('active');
    return;
  }
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    renderSuggestions(val);
    searchDebounceTimer = null;
  }, 150);
});

searchInput.addEventListener('focus', (e) => {

});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchSuggestions.classList.remove('active'), 200);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = null;
    }
    const query = e.target.value.trim();
    if (!query) return;
    const docId = resolveDocId(query);
    if (docId && DOCS[docId]) {
      searchInput.value = '';
      searchSuggestions.classList.remove('active');
      navigateTo('doc', docId);
    } else {
      searchInput.value = '';
      searchSuggestions.classList.remove('active');
      renderNotFound(query);
    }
  }
});

function stateToHash(page, docId) {
  if (page === 'doc' && docId) return '#/doc/' + encodeURIComponent(docId);
  return '#/' + page;
}
function stateToHashContrib(step) {
  if (!step || step <= 1) return '#/contribute';
  return '#/contribute/' + step;
}
function hashToState(hash) {
  if (!hash || hash === '#' || hash === '#/') return { page: 'home', docId: null };
  const clean = hash.replace(/^#\/?/, '');
  const parts = clean.split('/');
  const page = parts[0] || 'home';
  const validPages = ['home', 'timeline', 'topics', 'gallery', 'settings', 'contribute', 'doc'];
  if (!validPages.includes(page)) return { page: 'home', docId: null };
  if (page === 'doc') {
    const docId = parts[1] ? decodeURIComponent(parts[1]) : null;
    if (!docId || !DOCS[docId]) return { page: 'home', docId: null };
    return { page: 'doc', docId };
  }
  if (page === 'contribute') {
    const n = parseInt(parts[1], 10);
    const step = (n >= 2 && n <= 5) ? n : 1;
    return { page: 'contribute', docId: null, contribStep: step };
  }
  return { page, docId: null };
}

window.navigateTo = function(page, docId = null, originalQuery = null, opts = {}) {
  const sameDest = state.currentPage &&
    (page === state.currentPage) &&
    (page !== 'doc' || docId === state.currentDocId);

  if (!opts.fromBack && !opts.fromTab && state.currentPage && !sameDest) {
    state.navStack.push({
      page: state.currentPage,
      docId: state.currentDocId || null
    });
    if (state.navStack.length > 50) state.navStack.shift();
  }

  state.currentPage = page;
  if (docId) state.currentDocId = docId;

  if (page === 'gallery') {
    state.gallerySort = 'recent';
    state.galleryPage = 1;
    state.expandedGalleryId = null;
  }
  if (page === 'timeline') {
    timelineState.currentCategory = 'all';
  }

  document.documentElement.setAttribute('data-page', page);

  if (!opts.fromBack && !sameDest) {
    const newHash = stateToHash(page, docId);
    try {
      history.pushState({ page, docId: docId || null }, '', newHash);
    } catch (e) {
      try { location.hash = newHash; } catch(_) {}
    }
  }

  closeAllDockPopups();

  document.querySelectorAll('.toolbar-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === page);
  });
  if (page === 'doc') {
    document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
    const wikiBtn = document.querySelector('.toolbar-btn[data-tab="wiki"]');
    if (wikiBtn) wikiBtn.classList.add('active');
  }

  window.scrollTo({ top: 0, left: 0, behavior: 'instant' });

  switch(page) {
    case 'home': renderHome(); break;
    case 'timeline': renderTimeline(); break;
    case 'topics': renderTopics({ highlightRank: opts.highlightRank }); break;
    case 'gallery': renderGallery(); break;
    case 'settings': renderSettings(); break;
    case 'contribute': renderContribute(); break;
    case 'doc': renderDoc(docId, originalQuery); break;
  }

  updateFloatingDock();
};

window.addEventListener('popstate', (e) => {
  let target;
  if (e.state && e.state.page) {
    target = {
      page: e.state.page,
      docId: e.state.docId || null,
      contribStep: e.state.contribStep || null
    };
  } else {
    target = hashToState(location.hash);
  }

  if (state.currentPage === 'contribute' && target.page === 'contribute') {
    const targetStep = target.contribStep || 1;

    if (contribState.submitted) {
      const returnTo = contribState.returnTo || 'gallery';
      state.currentPage = returnTo;
      state.currentDocId = null;
      try {
        history.replaceState(
          { page: returnTo, docId: null },
          '',
          stateToHash(returnTo, null)
        );
      } catch(_) {}
      navigateTo(returnTo, null, null, { fromBack: true });
      return;
    }

    if (targetStep !== contribState.step) {
      contribState.prevStep = contribState.step;
      contribState.step = targetStep;
      renderContribute();
    }
    return;
  }

  if (target.page === 'contribute' && contribState.submitted) {
    history.back();
    return;
  }

  if (state.navStack.length > 0) {
    state.navStack.pop();
  }

  const sameDest = (target.page === state.currentPage) &&
    (target.page !== 'doc' || target.docId === state.currentDocId);
  if (sameDest) return;

  navigateTo(target.page, target.docId, null, { fromBack: true });
});

function formatRelativeTime(dateStr) {
  if (!dateStr) return '';
  const target = new Date(dateStr.replace(' ', 'T'));
  if (isNaN(target.getTime())) return '';
  const diff = (Date.now() - target.getTime()) / 1000;
  if (diff < 60)         return '방금 전';
  if (diff < 3600)       return `${Math.floor(diff / 60)}분 전`;
  if (diff < 86400)      return `${Math.floor(diff / 3600)}시간 전`;
  if (diff < 604800)     return `${Math.floor(diff / 86400)}일 전`;
  if (diff < 2592000)    return `${Math.floor(diff / 604800)}주 전`;
  if (diff < 31536000)   return `${Math.floor(diff / 2592000)}개월 전`;
  return `${Math.floor(diff / 31536000)}년 전`;
}

let __searchDemoTimers = [];
let __searchDemoRunId = 0;
let __searchDemoCurrentDocId = 'cheongnacanalway';

function clearSearchDemoTimers() {
  __searchDemoTimers.forEach(t => clearTimeout(t));
  __searchDemoTimers = [];
}

function searchDemoWait(ms) {
  return new Promise(resolve => {
    const t = setTimeout(resolve, ms);
    __searchDemoTimers.push(t);
  });
}

const SEARCH_DEMO_SCENARIOS = [
  { typed: '청라 커낼', docId: 'cheongnacanalway' },
  { typed: '온라인 환불',   docId: 'online-refund' }
];

function startSearchDemo() {
  clearSearchDemoTimers();
  __searchDemoRunId++;
  const myRunId = __searchDemoRunId;

  const stage = document.getElementById('searchDemoStage');
  if (!stage) return;

  (async function loop() {
    let i = 0;
    while (true) {
      if (myRunId !== __searchDemoRunId) return;
      if (!document.getElementById('searchDemoStage')) return;

      const scenario = SEARCH_DEMO_SCENARIOS[i % SEARCH_DEMO_SCENARIOS.length];
      const skipToResult = (i === 0);
      await runOneSearchDemo(scenario, myRunId, skipToResult);
      i++;
    }
  })();
}

async function runOneSearchDemo(scenario, myRunId, skipToResult) {
  const { typed, docId } = scenario;
  const doc = DOCS[docId];
  if (!doc) return;

  const stage      = document.getElementById('searchDemoStage');
  const textEl     = document.getElementById('searchDemoText');
  const acBox      = document.getElementById('searchDemoAutocomplete');
  const acTitle    = document.getElementById('searchDemoAcTitle');
  const acSub      = document.getElementById('searchDemoAcSub');
  const cursor     = document.getElementById('searchDemoCursor');
  const result     = document.getElementById('searchDemoResult');
  const resTitle   = document.getElementById('searchDemoResultTitle');
  const resSub     = document.getElementById('searchDemoResultSub');
  const resMeta    = document.getElementById('searchDemoResultMeta');
  const resTags    = document.getElementById('searchDemoResultTags');
  const resBody    = document.getElementById('searchDemoResultBody');

  if (!stage || !textEl || !acBox || !cursor || !result) return;

  if (skipToResult) {
    textEl.textContent = typed;
    acBox.classList.remove('is-open');
    cursor.classList.remove('is-visible', 'is-tapping');
    cursor.style.left = '50%';
    cursor.style.top  = '340px';
    acTitle.textContent = doc.title;
    acSub.textContent   = doc.subtitle || '';
    __searchDemoCurrentDocId = docId;

    resTitle.textContent = doc.title;
    resSub.textContent   = doc.subtitle || '';
    resMeta.textContent  = '최근 수정: ' + (doc.updated || '―');
    resTags.innerHTML = (doc.categories || []).slice(0, 3).map(c => {
      const tmp = document.createElement('div');
      tmp.innerHTML = c.text;
      return `<span class="search-demo-result-tag">${tmp.textContent}</span>`;
    }).join('');
    const tmpDiv = document.createElement('div');
    tmpDiv.innerHTML = doc.content || '';
    const firstP = tmpDiv.querySelector('p');
    let preview = firstP ? firstP.textContent.trim() : (doc.subtitle || '');
    if (preview.length > 220) preview = preview.slice(0, 220) + '…';
    resBody.textContent = preview;

    result.classList.add('is-shown');

    await searchDemoWait(300);
    return;
  }

  acBox.classList.remove('is-open');
  cursor.classList.remove('is-visible', 'is-tapping');
  cursor.style.left = '50%';
  cursor.style.top  = '340px';

  acTitle.textContent = doc.title;
  acSub.textContent   = doc.subtitle || '';

  await searchDemoWait(385);
  if (myRunId !== __searchDemoRunId) return;
  result.classList.remove('is-shown');
  await searchDemoWait(385);
  if (myRunId !== __searchDemoRunId) return;

  textEl.textContent = '';

  __searchDemoCurrentDocId = docId;

  const chars = Array.from(typed);
  for (let k = 0; k < chars.length; k++) {
    if (myRunId !== __searchDemoRunId) return;
    textEl.textContent += chars[k];
    await searchDemoWait(145);
  }

  await searchDemoWait(495);
  if (myRunId !== __searchDemoRunId) return;

  acBox.classList.add('is-open');
  await searchDemoWait(605);
  if (myRunId !== __searchDemoRunId) return;

  cursor.classList.add('is-visible');
  await searchDemoWait(66);
  cursor.style.left = '50%';
  cursor.style.top  = '150px';
  await searchDemoWait(880);

  if (myRunId !== __searchDemoRunId) return;
  cursor.classList.add('is-tapping');
  await searchDemoWait(198);
  cursor.classList.remove('is-tapping');
  await searchDemoWait(132);

  acBox.classList.remove('is-open');
  cursor.classList.remove('is-visible');
  await searchDemoWait(300);
  if (myRunId !== __searchDemoRunId) return;

  resTitle.textContent = doc.title;
  resSub.textContent   = doc.subtitle || '';
  resMeta.textContent  = '최근 수정: ' + (doc.updated || '―');
  resTags.innerHTML = (doc.categories || []).slice(0, 3).map(c => {
    const tmp = document.createElement('div');
    tmp.innerHTML = c.text;
    return `<span class="search-demo-result-tag">${tmp.textContent}</span>`;
  }).join('');

  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = doc.content || '';
  const firstP = tmpDiv.querySelector('p');
  let preview = firstP ? firstP.textContent.trim() : (doc.subtitle || '');
  if (preview.length > 220) preview = preview.slice(0, 220) + '…';
  resBody.textContent = preview;

  result.classList.add('is-shown');
  await searchDemoWait(165);

  await searchDemoWait(2640);
}

const TIMELINE_CATEGORIES = [
  { id: 'all',    label: '전체'    },
