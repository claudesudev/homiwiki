  { id: 'system', label: '시스템'  }

function renderTimeline() {
  const content = document.getElementById('pageContent');
  content.innerHTML = '<h1 class="sr-only">타임라인</h1><div id="timelineArea"></div>';
  renderTimelineArea();
}

function renderTimelineArea() {
  const area = document.getElementById('timelineArea');
  if (!area) return;

  const cur = timelineState.currentCategory || 'all';

  const headHtml = `
    <div class="tl-head" role="tablist" aria-label="타임라인 카테고리">
      <h2 class="tl-title">타임라인</h2>
      <div class="tl-filters">
        ${TIMELINE_CATEGORIES.map(c => `
          <button class="tl-filter${cur === c.id ? ' is-active' : ''}"
                  role="tab"
                  aria-selected="${cur === c.id}"
                  onclick="setTimelineCategory('${c.id}')">${c.label}</button>
        `).join('')}
      </div>
    </div>`;

  const filtered = TIMELINE.filter(ev => cur === 'all' || ev.cat === cur);

  if (filtered.length === 0) {
    area.innerHTML = headHtml + '<div class="tl-empty">이 카테고리에는 아직 등록된 항목이 없어요</div>';
    return;
  }

  const sorted = filtered.slice().sort((a, b) => b.date.localeCompare(a.date));

  const byYear = {};
  const yearOrder = [];
  sorted.forEach(ev => {
    const year = ev.date.slice(0, 4);
    if (!byYear[year]) {
      byYear[year] = [];
      yearOrder.push(year);
    }
    byYear[year].push(ev);
  });

  const pulseSet = new Set();
  if (cur === 'all') {
    sorted.slice(0, 3).forEach((ev, i) => {
      pulseSet.add(`${ev.date}__${i}`);
    });
  }
  const sortedIdxMap = new Map();
  sorted.forEach((ev, i) => {
    sortedIdxMap.set(ev, i);
  });

  let bodyHtml = '<div class="tl-rail">';
  yearOrder.forEach(year => {
    bodyHtml += `<h3 class="tl-year">${year}년</h3>`;
    bodyHtml += '<div class="tl-track">';
    byYear[year].forEach(ev => {
      const sortedIdx = sortedIdxMap.get(ev);
      const pulseRank = (cur === 'all' && sortedIdx < 3) ? (sortedIdx + 1) : 0;
      bodyHtml += renderTimelineRow(ev, pulseRank);
    });
    bodyHtml += '</div>';
  });
  bodyHtml += '</div>';

  area.innerHTML = headHtml + bodyHtml;
}

function renderTimelineRow(ev, pulseRank) {
  const dateLabel = formatTimelineDate(ev.date);
  const textHtml = renderTimelineText(ev.text);
  const pulseCls = pulseRank ? ` is-pulse is-pulse-${pulseRank}` : '';
  const catBadge = ev.cat === 'system'
    ? `<span class="tl-cat cat-system">시스템</span>`
    : '';

  return `
    <div class="tl-row cat-${ev.cat}${pulseCls}">
      ${catBadge}
      <span class="tl-text">${textHtml}<span class="tl-date">${escapeHtml(dateLabel)}</span></span>
    </div>`;
}

function formatTimelineDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return `${m}월 ${d}일`;
}

function renderTimelineText(text) {
  if (!text) return '';
  const pattern = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  let result = '';
  let lastIndex = 0;
  let match;

  while ((match = pattern.exec(text)) !== null) {
    if (match.index > lastIndex) {
      result += escapeHtml(text.slice(lastIndex, match.index));
    }
    let docRef = match[1].trim();
    const label = (match[2] || docRef).trim();
    const docId = docRef.split('#')[0];
    const exists = (typeof DOCS !== 'undefined') && DOCS && DOCS[docId];

    if (exists) {
      result += `<span class="tl-wlink" data-doc-id="${escapeHtml(docId)}" onclick="navigateFromTimeline(event, '${escapeHtml(docId)}')">${escapeHtml(label)}</span>`;
    } else {
      result += `<span class="tl-wlink-dead" title="문서 없음">${escapeHtml(label)}</span>`;
    }
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    result += escapeHtml(text.slice(lastIndex));
  }
  return result;
}

window.navigateFromTimeline = function(event, docId) {
  if (event) {
    event.stopPropagation();
    event.preventDefault();
  }
  const el = event && event.currentTarget ? event.currentTarget : null;
  if (el && el.classList && !el.classList.contains('is-clicking')) {
    el.classList.add('is-clicking');
    setTimeout(() => {
      el.classList.remove('is-clicking');
      navigateTo('doc', docId);
    }, 180);
  } else {
    navigateTo('doc', docId);
  }
};

window.setTimelineCategory = function(catId) {
  if (!TIMELINE_CATEGORIES.some(c => c.id === catId)) return;
  timelineState.currentCategory = catId;
  renderTimelineArea();
  window.scrollTo({ top: 0, behavior: 'instant' });
};

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

  try {
    const res = await fetch('gallery/index.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('gallery/index.json 로드 실패 (HTTP ' + res.status + ')');
    const data = await res.json();
    GALLERY = Array.isArray(data.items) ? data.items : [];
    GALLERY_LOADED = true;
    console.log(`[homiwiki] 갤러리 ${GALLERY.length}개 항목 로드 완료`);
  } catch (err) {
    console.warn('[homiwiki] 갤러리 로드 실패:', err);
    GALLERY = [];
    GALLERY_LOADED = true;
  }
}

function renderGalleryContent() {
  const sort = state.gallerySort || 'recent';

  const sorted = GALLERY.slice().sort((a, b) => {
    if (sort === 'likes') {
      const al = (a.likes || 0) + getUserLikeDelta(a.id);
      const bl = (b.likes || 0) + getUserLikeDelta(b.id);
      if (bl !== al) return bl - al;
      return new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0);
    }
    return new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0);
  });

  const filtered = sorted;

  const totalPages = Math.max(1, Math.ceil(filtered.length / GALLERY_PAGE_SIZE));
  if (state.galleryPage > totalPages) state.galleryPage = totalPages;
  if (state.galleryPage < 1) state.galleryPage = 1;
  const startIdx = (state.galleryPage - 1) * GALLERY_PAGE_SIZE;
  const pageItems = filtered.slice(startIdx, startIdx + GALLERY_PAGE_SIZE);

  document.querySelectorAll('.gallery-tabs .tl-filter[data-sort]').forEach(btn => {
    const isActive = btn.getAttribute('data-sort') === sort;
    btn.classList.toggle('is-active', isActive);

const LIKE_STORAGE_KEY = 'homi:galleryLikes';

function getUserLikedSet() {
  try {
    const raw = localStorage.getItem(LIKE_STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === 'object') ? parsed : {};
  } catch (e) {
    return {};
  }
}

function isUserLiked(id) {
  const set = getUserLikedSet();
  return set[id] === true;
}

function getUserLikeDelta(id) {
  return isUserLiked(id) ? 1 : 0;
}

window.toggleGalleryLike = function(id) {
  const set = getUserLikedSet();
  if (set[id]) {
    delete set[id];
  } else {
    set[id] = true;
  }
  try {
    localStorage.setItem(LIKE_STORAGE_KEY, JSON.stringify(set));
  } catch (e) { }

  const item = GALLERY.find(g => g.id === id);
  if (!item) return;
  const totalLikes = (item.likes || 0) + getUserLikeDelta(id);
  const liked = isUserLiked(id);

  document.querySelectorAll(`.gallery-card[data-id="${id}"] .gallery-like-mini, .gallery-card[data-id="${id}"] .gallery-like-pill`).forEach(btn => {
    btn.classList.toggle('is-liked', liked);
    const svg = btn.querySelector('svg');
    if (svg) {
      svg.setAttribute('fill', liked ? '#ff3b5c' : 'none');
      svg.setAttribute('stroke', liked ? '#ff3b5c' : 'currentColor');
    }
    const span = btn.querySelector('span');
    if (span) span.textContent = totalLikes;
    btn.setAttribute('aria-label', '좋아요 ' + totalLikes);
  });
};

function renderGalleryPagination(current, total) {
  const maxButtons = 5;
  let start = Math.max(1, current - 2);
  let end = Math.min(total, start + maxButtons - 1);
  if (end - start < maxButtons - 1) {
    start = Math.max(1, end - maxButtons + 1);
  }

  let buttons = '';
  if (current > 1) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${current - 1})" aria-label="이전">&lsaquo;</button>`;
  }
  if (start > 1) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(1)">1</button>`;
    if (start > 2) buttons += `<span class="gallery-page-ellipsis">…</span>`;
  }
  for (let p = start; p <= end; p++) {
    const activeCls = p === current ? ' active' : '';
    buttons += `<button class="gallery-page-btn${activeCls}" onclick="goGalleryPage(${p})">${p}</button>`;
  }
  if (end < total) {
    if (end < total - 1) buttons += `<span class="gallery-page-ellipsis">…</span>`;
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${total})">${total}</button>`;
  }
  if (current < total) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${current + 1})" aria-label="다음">&rsaquo;</button>`;
  }

  return `<div class="gallery-pagination">${buttons}</div>`;
}

window.downloadGalleryImage = function(id) {
  const item = GALLERY.find(g => g.id === id);
  if (!item) return;
  const src = item.imageData || item.imageUrl;
  if (!src || src === 'placeholder') {
    showToast('이미지가 아직 준비 중이에요');
    return;
  }
  // 확장자 결정: imageUrl이면 경로에서 추출, imageData(data URI)면 mime에서 추출
  let ext = 'png';
  if (src.startsWith('data:')) {
    if (src.startsWith('data:image/jpeg')) ext = 'jpg';
    else if (src.startsWith('data:image/webp')) ext = 'webp';
    else if (src.startsWith('data:image/png')) ext = 'png';
  } else {
    const m = src.match(/\.([a-zA-Z0-9]+)(?:\?|$)/);
    if (m) ext = m[1].toLowerCase();
  }
  const a = document.createElement('a');
  a.href = src;
  a.download = item.id + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

window.toggleSettingsRow = function(key) {
  const row = document.getElementById('settingsRow-' + key);
  const exp = document.getElementById('settingsExpand-' + key);
  if (!row || !exp) return;

  const isOpen = row.classList.contains('is-open');

  document.querySelectorAll('.settings-row.is-open').forEach(function(r) {
    if (r !== row) {
      r.classList.remove('is-open');
      r.setAttribute('aria-expanded', 'false');
    }
  });
  document.querySelectorAll('.settings-expand.is-open').forEach(function(e) {
    if (e !== exp) e.classList.remove('is-open');
  });

  if (isOpen) {
    row.classList.remove('is-open');
    exp.classList.remove('is-open');
    row.setAttribute('aria-expanded', 'false');
  } else {
    row.classList.add('is-open');
    exp.classList.add('is-open');
    row.setAttribute('aria-expanded', 'true');
  }
};

function generateCaptcha() {
  const pool = 'abcdefghjkmnpqrstuvwxyz23456789';
  const chars = [];
  for (let i = 0; i < 6; i++) {
    chars.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  const indices = [];
  while (indices.length < 3) {
    const r = Math.floor(Math.random() * 6);
    if (!indices.includes(r)) indices.push(r);
  }
  indices.sort((a, b) => a - b);
  return { chars, picks: indices };
}

function getCaptchaExpected() {
  if (!contribState.captchaSet) return '';
  return contribState.captchaSet.picks
    .map(i => contribState.captchaSet.chars[i])
    .join('');
}

let _contribSliding = false;

window.contribGoTo = function(step, opts = {}) {
  if (_contribSliding) return;

  const prevStep = contribState.step;
  contribState.prevStep = prevStep;
  contribState.step = step;

  if (!opts.fromBack) {
    const newHash = stateToHashContrib(step);
    try {
      history.pushState(
        { page: 'contribute', docId: null, contribStep: step },
        '',
        newHash
      );
    } catch(e) {
      try { location.hash = newHash; } catch(_) {}
    }
  }

  const shouldSlide = (
    !opts.fromBack &&
    prevStep > 0 &&
    step > prevStep
  );

  if (shouldSlide && _canSlide()) {
    _slideToNextStep(step);
  } else {
    renderContribute();
  }
};

function _canSlide() {
  try {
    return !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  } catch(_) {
    return true;
  }
}

function _slideToNextStep(targetStep) {
  const page = document.querySelector('.contrib-page');
  const oldCard = page ? page.querySelector('.contrib-card') : null;
  if (!page || !oldCard) {
    renderContribute();
    return;
  }

  _contribSliding = true;

  let inner;
  switch (targetStep) {
    case 1: inner = renderContribStep1(); break;
    case 2: inner = renderContribStep2(); break;
    case 3: inner = renderContribStep3(); break;
    case 4: inner = renderContribStep4(); break;
    case 5: inner = renderContribStep5(); break;
    default: inner = renderContribStep1();
  }
  const newCardHtml = `<div class="contrib-card slide-enter">${renderContribHeader()}${inner}</div>`;

  page.classList.add('is-sliding');
  oldCard.classList.add('slide-exit');
  oldCard.insertAdjacentHTML('afterend', newCardHtml);
  const newCard = page.querySelector('.contrib-card.slide-enter');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (newCard) newCard.classList.add('slide-enter-active');
      oldCard.classList.add('slide-exit-active');
    });
  });

  setTimeout(() => {
    if (oldCard && oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
    if (newCard) {
      newCard.classList.remove('slide-enter', 'slide-enter-active');
    }
    page.classList.remove('is-sliding');
    _contribSliding = false;

    window.scrollTo({ top: 0, left: 0, behavior: 'instant' });

    if (contribState.step === 5 && contribState.captchaInput) {
      const inp = document.getElementById('contribCaptchaInput');
      if (inp) contribOnCaptchaInput({ target: inp });
    }
  }, 240);
}

function escapeHtmlContrib(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/\n/g, '<br>');
}

function isValidContribEmail(s) {
  if (typeof s !== 'string') return false;
  const v = s.trim();
  if (!v) return false;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

function contribIsStep2EmailOk() {
  const cat = contribState.category;
  if (!cat || !cat.collectsEmail) return true;
  const v = (contribState.email || '').trim();
  if (!v) return true;
  return isValidContribEmail(v);
}

function contribUpdateStep2NextBtn() {
  const btn = document.getElementById('contribContentNext');
  if (!btn) return;
  const contentOk = contribState.content.trim().length >= 10;
  const consentOk = contribState.consentChecked === true;
  const emailOk = contribIsStep2EmailOk();
  btn.disabled = !(contentOk && consentOk && emailOk);
}

window.contribOnEmailInput = function(e) {
  contribState.email = e.target.value;

  contribUpdateStep2NextBtn();

window.contribOnEmailBlur = function(e) {
  const v = (e.target.value || '').trim();
  if (!v) {
    contribState.emailError = false;
    e.target.classList.remove('has-error');
  } else if (isValidContribEmail(v)) {
    contribState.emailError = false;
    e.target.classList.remove('has-error');

};

  const block = document.getElementById('contribConsentBlock');
  const row   = document.getElementById('contribConsentRow');
  if (block) block.classList.toggle('is-checked', contribState.consentChecked);
  if (row)   row.setAttribute('aria-checked', contribState.consentChecked ? 'true' : 'false');
  contribUpdateStep2NextBtn();
};

window.contribToggleConsentDetail = function(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  contribState.consentExpanded = !contribState.consentExpanded;
  const block = document.getElementById('contribConsentBlock');
  if (block) block.classList.toggle('is-expanded', contribState.consentExpanded);
  const toggle = block && block.querySelector('.contrib-consent-toggle');
  if (toggle) toggle.setAttribute('aria-expanded', contribState.consentExpanded ? 'true' : 'false');
};

window.contribSelectDisplay = function(mode) {
  contribState.displayMode = mode;
  document.querySelectorAll('[data-display-mode]').forEach(el => {
    const isActive = el.dataset.displayMode === mode;
    el.classList.toggle('dim', !isActive);
    const radio = el.querySelector('.contrib-radio');
    if (radio) radio.classList.toggle('checked', isActive);
  });
  if (mode === 'nick') {
    setTimeout(() => {
      const inp = document.getElementById('contribNickInput');
      if (inp) inp.focus();
    }, 50);
  }
  updateContribDisplayNextBtn();
};

window.contribOnNickInput = function(e) {
  _updateNickVisualState(e.target, !e.isComposing);
};

window.contribOnNickCompositionEnd = function(e) {
  _updateNickVisualState(e.target, true);
};

function _updateNickVisualState(input, allowMutate) {
  if (!input) return;
  let raw = input.value;

  if (allowMutate && raw.length > 20) {
    raw = raw.slice(0, 20);
    input.value = raw;
  }

  const hasInvalid = raw.length > 0 && !/^[a-zA-Z]*$/.test(raw);

  if (hasInvalid) {
    contribState.nickname = '';
    _setNickError(input, true);
  } else {
    let valid = raw;
    if (allowMutate && valid.length > 10) {
      valid = valid.slice(0, 10);
      input.value = valid;
    }
    contribState.nickname = valid;
    _setNickError(input, false);

    if (valid.length > 0 && contribState.displayMode !== 'nick') {
      contribSelectDisplay('nick');
    }
  }

  updateContribDisplayNextBtn();
}

function _setNickError(input, isError) {
  if (!input) return;
  input.classList.toggle('has-error', isError);
  const hint = document.getElementById('contribNickHint');
  if (!hint) return;
  const textEl = hint.querySelector('.contrib-hint-text');
  if (isError) {
    hint.classList.add('is-error');
    if (textEl) textEl.textContent = '한글은 입력할 수 없어요';
  } else {
    hint.classList.remove('is-error');
    if (textEl) textEl.textContent = '영문 2~10자, 등록 후 수정 불가';
  }
}

function updateContribDisplayNextBtn() {
  const btn = document.getElementById('contribDisplayNext');
  if (!btn) return;
  let ok = false;
  if (contribState.displayMode === 'anon') ok = true;
  else if (contribState.displayMode === 'nick' && contribState.nickname.length >= 2) ok = true;
  btn.disabled = !ok;
}

window.contribSelectRewardStyle = function(styleId) {
  contribState.rewardStyle = styleId;
  document.querySelectorAll('[data-style]').forEach(el => {
    const isActive = el.dataset.style === styleId;
    el.classList.toggle('dim', !isActive);
    const radio = el.querySelector('.contrib-radio');
    if (radio) radio.classList.toggle('checked', isActive);
  });
};

window.contribOnRewardInput = function(e) {
  const v = e.target.value.slice(0, 300);
  if (v !== e.target.value) e.target.value = v;
  contribState.rewardPrompt = v;
  const cnt = document.getElementById('contribRewardCount');
  if (cnt) {
    cnt.textContent = `${v.length} / 300`;
    cnt.classList.toggle('over', v.length >= 300);
  }
};

window.contribOnCaptchaInput = function(e) {
  const v = e.target.value.slice(0, 3).toLowerCase();
  if (v !== e.target.value) e.target.value = v;
  contribState.captchaInput = v;

  const expected = getCaptchaExpected();
  const inp = document.getElementById('contribCaptchaInput');
  const fb = document.getElementById('contribCaptchaFeedback');

  if (inp) {
    inp.classList.remove('error', 'success');
    if (v.length === 3) {
      inp.classList.add(v === expected ? 'success' : 'error');
    }
  }

  if (fb) {
    fb.classList.remove('success', 'error');
    fb.innerHTML = '';
    if (v.length === 3) {
      if (v === expected) {
        fb.classList.add('success');
        fb.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span class="text">코드 입력 성공!</span>';
      } else {
        fb.classList.add('error');
        fb.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="text">코드가 일치하지 않아요</span>';
      }
    }
  }

  updateContribSubmitState();
};

function updateContribSubmitState() {
  const btn = document.getElementById('contribSubmitBtn');
  if (!btn) return;
  btn.disabled = (contribState.captchaInput !== getCaptchaExpected());
}

window.contribSubmit = function() {
  if (contribState.captchaInput !== getCaptchaExpected()) return;

  contribState.submitted = true;
  openContribDoneModal();
};

function openContribDoneModal() {
  const modal = document.getElementById('contribDoneModal');
  if (!modal) return;

  const subEl = document.getElementById('contribDoneSubtitle');
  if (subEl) {
    const displayLabel = contribState.displayMode === 'nick' && contribState.nickname
      ? `@${escapeHtmlContrib(contribState.nickname)}`
      : '익명 기여자';
    subEl.innerHTML = `${displayLabel}님의 기여 · 잠시 후 검토 시작`;
  }

  modal.setAttribute('aria-hidden', 'false');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeContribDoneModal() {
  const modal = document.getElementById('contribDoneModal');
  if (!modal) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function renderContribHeader() {

  return `

      <div class="contrib-progress" role="progressbar" aria-valuemin="1" aria-valuemax="5" aria-valuenow="${cur}">

}

window.copyDocUrl = function(btn) {
  const url = window.location.href;
  const textEl = btn.querySelector('.doc-copy-url-btn-text');
  if (!textEl) return;

  const originalText = textEl.textContent;

  const showCopied = () => {
    textEl.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      textEl.textContent = originalText;
      btn.classList.remove('copied');
    }, 1500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(showCopied).catch(() => {
      fallbackCopy(url, showCopied);
    });
  } else {
    fallbackCopy(url, showCopied);
  }
};

function fallbackCopy(text, onSuccess) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.top = '-1000px';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (err) {
    showToast('복사에 실패했어요. 주소창에서 직접 복사해주세요', { duration: 2800 });
  }
  document.body.removeChild(textarea);
}

window.openContributeForDoc = function(docId) {
  openContribute(docId);
};

window.shareDoc = function(docId) {
  const url = window.location.href;
  const showCopied = () => showToast('문서 주소가 복사되었어요');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(showCopied).catch(() => {
      fallbackCopy(url, showCopied);
    });
  } else {
    fallbackCopy(url, showCopied);
  }
};

window.showContributorsPopup = function(docId) {
  const doc = DOCS[docId];
  if (!doc) return;

  const list = (doc.contributors || []).slice()
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const MAX = 10;
  const visible = list.slice(0, MAX);
  const moreCount = list.length - visible.length;

  let bodyHtml = '';
  if (visible.length === 0) {
    bodyHtml = `<div class="contrib-popup-empty">아직 기여 이력이 없어요.</div>`;
  } else {
    bodyHtml = visible.map(c => {
      const dateShort = formatContribDate(c.date);
      return `
        <div class="contrib-popup-item">
          <span class="contrib-popup-nick">${escapeHtmlContrib(c.nick)}</span>
          <span class="contrib-popup-role">${escapeHtmlContrib(c.role)}${dateShort ? ' · ' + dateShort : ''}</span>
        </div>
      `;
    }).join('');
    if (moreCount > 0) {
      bodyHtml += `<div class="contrib-popup-more">외 ${moreCount}명</div>`;
    }
  }

  let modal = document.getElementById('contribPopupModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'contribPopupModal';
    modal.className = 'contrib-popup-modal';
    modal.innerHTML = `
      <div class="contrib-popup-backdrop" onclick="hideContributorsPopup()"></div>
      <div class="contrib-popup-box" role="dialog" aria-modal="true" aria-labelledby="contribPopupTitle">

        </div>
        <div class="contrib-popup-body" id="contribPopupBody"></div>
      </div>

};

window.hideContributorsPopup = function() {
  const modal = document.getElementById('contribPopupModal');
  if (modal) modal.classList.remove('is-show');
};

function formatContribDate(dateStr) {
  if (!dateStr) return '';
  const m = dateStr.match(/^\d{4}-(\d{2})-(\d{2})/);
  if (!m) return dateStr;
  return `${parseInt(m[1], 10)}.${parseInt(m[2], 10)}`;
}

function renderInfobox(info) {
  const escapeAttr = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const hasPhoto = !!info.image;
  const imageBlock = hasPhoto
    ? `<div class="infobox-image has-photo"><div class="infobox-image-photo"><img src="${escapeAttr(info.image)}" alt="${escapeAttr(info.imageAlt || info.title || '')}" loading="lazy"></div></div>`
    : `<div class="infobox-image">
        ${info.imageEmoji ? `<div class="infobox-image-emoji">${info.imageEmoji}</div>` : ''}
        ${info.imageText ? `<div class="infobox-image-text">${info.imageText}</div>` : ''}
      </div>`;
  return `
    <div class="infobox">
      <div class="infobox-header">${info.title}</div>
      ${info.subtitle ? `<div class="infobox-subheader">${info.subtitle}</div>` : ''}
      ${imageBlock}
      <table class="infobox-table">
        <tbody>
          ${info.rows.map(([k, v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

window.navigateWithFeedback = function(el, page, docId, delayMs, originalText) {
  if (!el || el.classList.contains('is-clicking')) return;
  if (typeof delayMs !== 'number') delayMs = 150;
  el.classList.add('is-clicking');
  setTimeout(() => {
    el.classList.remove('is-clicking');
    navigateTo(page, docId || null, originalText || null);
  }, delayMs);
};

function bindWikiLinks() {
  document.querySelectorAll('.wiki-link').forEach(link => {
    const targetId = link.dataset.link;
    const originalText = link.textContent.trim();
    if (!targetId) return;

    if (!DOCS[targetId]) {
      link.classList.add('redlink');
      link.title = '아직 작성되지 않은 문서';
    }

    link.addEventListener('click', (e) => {
      e.preventDefault();
      if (link.classList.contains('is-clicking')) return;
      link.classList.add('is-clicking');

      setTimeout(() => {
        link.classList.remove('is-clicking');
        if (DOCS[targetId]) {
          const isRedirected = normalizeSearch(originalText) !== normalizeSearch(DOCS[targetId].title);
          navigateTo('doc', targetId, isRedirected ? originalText : null);
        } else {
          renderNotFound(originalText);
        }
      }, 180);
    });
  });
}

const PAGES_WITH_DOCK = ['doc', 'gallery'];

function updateFloatingDock() {
  const dock = document.getElementById('floatingDock');
  const tocBtn = document.getElementById('dockTocBtn');
  const topBtn = document.getElementById('dockTopBtn');
  const followBtn = document.getElementById('dockFollowBtn');

  if (!PAGES_WITH_DOCK.includes(state.currentPage)) {
    dock.style.display = 'none';
    return;
  }
  dock.style.display = 'flex';

  tocBtn.classList.remove('disabled', 'inactive');
  topBtn.classList.remove('disabled', 'inactive');
  followBtn.classList.remove('disabled', 'inactive');

  if (state.currentPage === 'doc') {
    const doc = DOCS[state.currentDocId];

    const l1Count = doc && doc.toc ? doc.toc.filter(it => it.level === 1).length : 0;
    const hasRelated = !!(doc && doc.related && doc.related.length > 0);
    const effectiveTocCount = l1Count + (hasRelated ? 1 : 0);
    if (!doc || effectiveTocCount <= 1) {
      tocBtn.classList.add('disabled');
    }

    if (!doc || !doc.related || doc.related.length === 0) {
      followBtn.classList.add('disabled');
    }
  } else if (state.currentPage === 'gallery') {
    const target = EDITOR_CONFIG.fallbackFollowTarget;
    if (!target || !DOCS[target]) {
      followBtn.classList.add('disabled');
    }
  }
}

window.scrollToTop = function() {
  if (state.openPanel) closeAllDockPopups();
  window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
};

function getFirstValidRelated(doc) {
  if (!doc || !doc.related || doc.related.length === 0) return null;
  const related = doc.related.filter(r => DOCS[r.id]);
  if (related.length === 0) return null;
  return related[0];
}

window.toggleDockPopup = function(type) {
  if (state.openPanel === type) {
    closeAllDockPopups();
    return;
  }
  closeAllDockPopups();

  if (type === 'toc') {
    renderTocPopup();
    document.getElementById('tocPopup').classList.add('open');
    document.getElementById('dockTocBtn').classList.add('active');
  } else if (type === 'follow') {
    renderFollowPopup();
    document.getElementById('followPopup').classList.add('open');
    document.getElementById('dockFollowBtn').classList.add('active');
  }
  state.openPanel = type;

  positionDockPopup();
};

function positionDockPopup() {
  if (!state.openPanel) return;
  const dock = document.getElementById('floatingDock');
  if (!dock) return;

  const popupId = state.openPanel === 'toc' ? 'tocPopup'
                : state.openPanel === 'follow' ? 'followPopup'
                : null;
  const triggerBtnId = state.openPanel === 'toc' ? 'dockTocBtn'
                     : state.openPanel === 'follow' ? 'dockFollowBtn'
                     : null;
  if (!popupId || !triggerBtnId) return;
  const popup = document.getElementById(popupId);
  const btn = document.getElementById(triggerBtnId);
  if (!popup || !btn) return;

  const dockRect = dock.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  const rightFromViewport = window.innerWidth - dockRect.left + 8;
  popup.style.right = rightFromViewport + 'px';

  const safety = 16;
  const spaceAbove = btnRect.bottom - safety;
  const spaceBelow = window.innerHeight - btnRect.top - safety;

  const isToc = (state.openPanel === 'toc');
  const cap = isToc ? 280 : Infinity;

  if (spaceBelow >= spaceAbove) {
    popup.style.top = btnRect.top + 'px';
    popup.style.bottom = 'auto';
    popup.style.maxHeight = Math.min(cap, Math.max(120, spaceBelow)) + 'px';
  } else {
    const bottomFromViewport = window.innerHeight - btnRect.bottom;
    popup.style.bottom = bottomFromViewport + 'px';
    popup.style.top = 'auto';
    popup.style.maxHeight = Math.min(cap, Math.max(120, spaceAbove)) + 'px';
  }
}

window.addEventListener('resize', positionDockPopup);
window.addEventListener('orientationchange', positionDockPopup);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', positionDockPopup);
  window.visualViewport.addEventListener('scroll', positionDockPopup);
}

function closeAllDockPopups() {
  const tocPop = document.getElementById('tocPopup');
  const followPop = document.getElementById('followPopup');
  if (tocPop) tocPop.classList.remove('open');
  if (followPop) followPop.classList.remove('open');
  const tocBtn = document.getElementById('dockTocBtn');
  const followBtn = document.getElementById('dockFollowBtn');
  if (tocBtn) tocBtn.classList.remove('active');
  if (followBtn) followBtn.classList.remove('active');
  state.openPanel = null;
}

window.goContribute = function() {
  closeAllDockPopups();
  if (typeof openContribute === 'function') {
    openContribute();
  }
};

function renderTocPopup() {
  const container = document.getElementById('tocPopupList');
  const popup = document.getElementById('tocPopup');

  if (state.currentPage === 'gallery') {
    popup.classList.remove('empty-state');

    const filtered = GALLERY;
    const totalPages = Math.max(1, Math.ceil(filtered.length / GALLERY_PAGE_SIZE));

    if (totalPages <= 1) {
      popup.classList.add('empty-state');
      container.innerHTML = `
        <div class="toc-empty-notice">페이지 1개</div>
        <div class="toc-empty-notice-sub">아직 한 페이지로 충분해요</div>
      `;
      return;
    }

    let html = '';
    for (let p = 1; p <= totalPages; p++) {
      const isActive = (p === state.galleryPage);
      html += `
        <div class="toc-l1${isActive ? ' is-active' : ''}">
          <a onclick="tocJumpGalleryPage(${p})">${p}페이지</a>
        </div>
      `;
    }
    container.innerHTML = html;

    requestAnimationFrame(() => {
      const active = container.querySelector('.toc-l1.is-active');
      if (active) active.scrollIntoView({ block: 'center', behavior: 'instant' });
    });
    return;
  }

  if (state.currentPage !== 'doc') {
    popup.classList.add('empty-state');
    const targetId = EDITOR_CONFIG.fallbackFollowTarget;
    const targetDoc = DOCS[targetId];
    if (!targetDoc) {
      container.innerHTML = `
        <div class="toc-empty-notice">목차 없음</div>
        <div class="toc-empty-notice-sub">이 페이지엔 목차가 없어요</div>
      `;
      return;
    }
    container.innerHTML = `
      <div class="follow-popup-clickable" onclick="followGo('${targetId}')" role="link" tabindex="0"
           aria-label="${targetDoc.title} 문서로 이동"
           onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();followGo('${targetId}')}">
        <div class="toc-empty-notice">목차 없음</div>
        <div class="toc-empty-notice-sub">목차가 있는 문서로 이동합니다</div>
        <div class="toc-empty-divider"></div>
        <div class="toc-empty-link">
          <a><span>${targetDoc.title}</span></a>
        </div>
      </div>
    `;
    return;
  }

  popup.classList.remove('empty-state');
  const doc = DOCS[state.currentDocId];
  if (!doc || !doc.toc) { container.innerHTML = ''; return; }
  const l1Items = doc.toc.filter(item => item.level === 1);
  const tocItems = [...l1Items];
  if (doc.related && doc.related.length > 0) {
    const maxNum = l1Items.length
      ? Math.max(...l1Items.map(it => parseInt(it.num, 10)).filter(n => !isNaN(n)))
      : 0;
    tocItems.push({
      num: maxNum > 0 ? String(maxNum + 1) : '',
      text: '관련 문서',
      id: 's-related',
      level: 1
    });
  }
  if (tocItems.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = tocItems.map(item => `
    <div class="toc-l1">
      <a onclick="tocJump('${item.id}')">
        ${item.num ? `<span class="toc-num">${item.num}.</span>` : ''}${item.text}
      </a>
    </div>
  `).join('');
}

window.tocJumpGalleryPage = function(page) {
  goGalleryPage(page);
  closeAllDockPopups();
};

window.tocJump = function(sectionId) {
  const el = document.getElementById(sectionId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  closeAllDockPopups();
};

function renderFollowPopup() {
  const container = document.getElementById('followPopupContent');

  const renderList = (targetId, targetTitle, subText) => `
    <div class="follow-popup-clickable" onclick="followGo('${targetId}')" role="link" tabindex="0"
         aria-label="${targetTitle} 문서로 이동"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();followGo('${targetId}')}">
      <div class="follow-popup-notice">다른 사용자들이 이 다음에 본 문서</div>
      <div class="follow-popup-divider"></div>
      <div class="follow-popup-link">
        <a><span>${targetTitle}</span></a>
      </div>
      ${subText ? `<div class="follow-popup-sub">${subText}</div>` : ''}
    </div>
  `;

  if (state.currentPage !== 'doc') {
    const targetId = EDITOR_CONFIG.fallbackFollowTarget;
    const targetDoc = DOCS[targetId];
    if (!targetDoc) {
      container.innerHTML = '<div class="follow-popup-empty">추천 문서를 불러올 수 없습니다.</div>';
      return;
    }
    container.innerHTML = renderList(targetId, targetDoc.title, targetDoc.subtitle || '');
    return;
  }

  const doc = DOCS[state.currentDocId];
  const next = getFirstValidRelated(doc);
  if (!next) {
    container.innerHTML = '<div class="follow-popup-empty">연관 문서가 없습니다.</div>';
    return;
  }
  const nextDoc = DOCS[next.id];
  container.innerHTML = renderList(next.id, nextDoc.title, next.desc || '');
}

window.followGo = function(docId) {
  closeAllDockPopups();
  navigateTo('doc', docId);
};

document.addEventListener('click', (e) => {
  if (state.openPanel === null) return;
  if (e.target.closest('.floating-dock') || e.target.closest('.dock-popup')) return;
  closeAllDockPopups();
});

// DOCS 로드 후 현재 페이지 다시 렌더 (loadAllDocs에서 호출)
function reRenderAfterDocsLoaded() {
  // 현재 라우트 다시 적용 - 이미 보고 있는 페이지를 새로 받은 데이터로 다시 그림
  const current = hashToState(location.hash);
  if (current.page === 'contribute') return; // 기여 페이지는 DOCS 의존 적음
  navigateTo(current.page, current.docId, null, { fromBack: true });
}

async function bootstrapRoute() {
  // 먼저 DOCS와 갤러리 로드 (병렬)
  await Promise.all([loadAllDocs(), loadGallery()]);

  // 로드 실패 시 에러 화면 띄우고 라우팅 중단
  if (DOCS_LOAD_ERROR || Object.keys(DOCS).length === 0) {
    showLoadErrorScreen();
    return;
  }

  const initial = hashToState(location.hash);

  if (initial.page === 'contribute') {
    contribState.returnTo = 'gallery';
    contribState.step = 1;
    contribState.prevStep = 0;
    contribState.category = null;
    contribState.content = '';
    contribState.displayMode = 'nick';
    contribState.nickname = '';
    contribState.rewardStyle = null;
    contribState.rewardPrompt = '';
    contribState.captchaSet = generateCaptcha();
    contribState.captchaInput = '';
    contribState.submitted = false;
    try {
      history.replaceState(
        { page: 'contribute', docId: null, contribStep: 1 },
        '',
        '#/contribute'
      );
    } catch(_) {}
    navigateTo('contribute', null, null, { fromBack: true });
    return;
  }

  try {
    history.replaceState(
      { page: initial.page, docId: initial.docId || null },
      '',
      stateToHash(initial.page, initial.docId)
    );
  } catch(_) {}
  navigateTo(initial.page, initial.docId, null, { fromBack: true });
}

// 즉시 실행
bootstrapRoute();

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) {
    searchSuggestions.classList.remove('active');
  }
});
</script>
