<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#cc785c">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>호미위키 Homiwiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;500;800&amp;family=Do+Hyeon&amp;display=swap" rel="stylesheet">
<script>
(function() {
  var theme = 'light';
  var fontSize = 'm';
  try {
    var oldTheme = localStorage.getItem('aiwiki:theme');
    if (oldTheme !== null) {
      if (localStorage.getItem('homi:theme') === null) localStorage.setItem('homi:theme', oldTheme);
      localStorage.removeItem('aiwiki:theme');
    }
    var oldFont = localStorage.getItem('aiwiki:fontSize');
    if (oldFont !== null) {
      if (localStorage.getItem('homi:fontSize') === null) localStorage.setItem('homi:fontSize', oldFont);
      localStorage.removeItem('aiwiki:fontSize');
    }
    var savedTheme = localStorage.getItem('homi:theme');
    if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
    var savedFont = localStorage.getItem('homi:fontSize');
    if (['s','m','l','xl','xxl'].indexOf(savedFont) !== -1) fontSize = savedFont;
  } catch (e) { }
  document.documentElement.setAttribute('data-theme', theme);
  document.documentElement.setAttribute('data-font-size', fontSize);
})();
</script>
<style>
/* ==============================================================================
   ⚠ 호버(:hover) 금지 규약

   이 스타일시트는 의도적으로 :hover 의사클래스를 사용하지 않습니다.
   - 이유 1: 이 앱은 모바일 우선 UX. 터치 디바이스에는 호버 개념이 없음
     (탭 = 즉시 클릭 동작). 호버 스타일이 있어도 작동할 '틈'이 없음.
   - 이유 2: 모바일 브라우저에서 터치 후 호버 스타일이 '잔상'처럼 남는
     버그의 주원인 (Android Chrome / iOS Safari 모두 관찰됨).
   - 이유 3: 데스크톱 사용자에게도 호버 피드백 없이 통일된 UX 제공이
     본 프로젝트 설계 방향.

   허용되는 포인터 상호작용:
   - :active  → 탭 다운 피드백 (배경/투명도 변화만 사용; 찌부러지는 transform: scale 효과는 제거됨).
   - :focus-visible → 키보드 탭 네비게이션 포커스링. 접근성 필수.

   호버는 패치 도중 무의식적으로 증식하는 경향이 있으니,
   이 파일을 수정할 때 :hover 규칙을 새로 추가하지 말 것.
   ============================================================================== */

:root {
  --font-scale: 1.07;
  --root-font-scale: 1.07;
  --bg-primary: #faf9f7;
  --bg-secondary: #f2f0ec;
  --bg-tertiary: #ffffff;
  --bg-elevated: #ffffff;
  --bg-accent-soft: #f0ebe4;
  --bg-accent-arrive: #e8dfd2;
  --text-primary: #1a1a1a;
  --text-secondary: #3a3a3a;
  --text-tertiary: #6b6b6b;
  --text-muted: #9a9a9a;
  --accent: #cc785c;
  --accent-light: #e8a590;
  --accent-text: #ffffff;
  --link: #2b6cb0;
  --link-flash-bg: #d6e6f5;
  --select-blue: #7dd3fc;
  --border: #e3e0da;
  --border-light: #ebe8e2;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10);
  --code-bg: #f0ece6;
}

[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #232323;
  --bg-tertiary: #2a2a2a;
  --bg-elevated: #323232;
  --bg-accent-soft: #2d2825;
  --bg-accent-arrive: #3a3128;
  --text-primary: #f5f5f3;
  --text-secondary: #d4d4d2;
  --text-tertiary: #a3a3a1;
  --text-muted: #9a9a98;
  --accent: #e8a590;
  --accent-light: #cc785c;
  --accent-text: #1a1a1a;
  --link: #7ab0e0;
  --link-flash-bg: #2a4a6b;
  --select-blue: #0ea5e9;
  --border: #3a3a3a;
  --border-light: #303030;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
  --code-bg: #252525;
}

html[data-font-size="s"]   { --font-scale: 0.87; --root-font-scale: 0.87; }
html[data-font-size="m"]   { --font-scale: 1.07; --root-font-scale: 1.07; }
html[data-font-size="l"]   { --font-scale: 1.27; --root-font-scale: 1.27; }
html[data-font-size="xl"]  { --font-scale: 1.47; --root-font-scale: 1.47; }
html[data-font-size="xxl"] { --font-scale: 1.67; --root-font-scale: 1.67; }

.top-header, .top-header *,
.bottom-toolbar, .bottom-toolbar * {
  --font-scale: 1.07;
}

html.theme-swap,
html.theme-swap *,
html.theme-swap *::before,
html.theme-swap *::after {
  transition-property: none !important;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  overflow-x: hidden;
  max-width: 100vw;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  line-height: 1.5;
  font-size: calc(15px * var(--font-scale));
  letter-spacing: 0;
  transition: background-color 0.3s ease, color 0.3s ease;
  min-height: 100vh;
  overflow-x: hidden;
  max-width: 100vw;
  position: relative;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.app-container {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg-primary);
  position: relative;
  box-shadow: var(--shadow-lg);
  padding-bottom: 72px;
  padding-top: 60px;
  overflow-x: hidden;
  width: 100%;
}

.top-header {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: 60px;
  background: #cc785c;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-width: 56px;
  height: 38px;
  padding: 0 4px;
  color: #ffffff;
  font-family: 'Do Hyeon', system-ui, -apple-system, sans-serif;
  font-size: calc(22px * var(--font-scale));
  font-weight: 400;
  letter-spacing: -0.3px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s ease;
}
.logo .logo-icon {
  height: calc(24.948px * var(--font-scale));
  width: auto;
  flex-shrink: 0;
  display: block;
  transform: rotate(0deg);
  transform-origin: center;
  color: inherit;
}
.logo span {
  transform: translateY(2px);
}
.logo:active {
  opacity: 0.7;
}

[data-theme="dark"] .logo {
  color: #ffffff;
}

.search-container {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

.search-input {
  width: 100%;
  height: 44px;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 0 38px 0 16px;
  background: #ffffff;
  color: #1a1a1a;
  font-size: calc(16px * var(--font-scale));
  font-family: inherit;
  transition: box-shadow 0.15s ease;
  outline: none;
}

.search-input::placeholder {
  color: #9a9a9a;
}

.search-icon {
  position: absolute;
  right: 14px;
  color: #a85a42;
  pointer-events: none;
}

.theme-toggle {
  display: none !important;
  flex-shrink: 0;
  margin-left: auto;
  width: 56px;
  height: 28px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.25);
  box-shadow: inset 0 1px 1.5px rgba(0, 0, 0, 0.18);
  border: none;
  position: relative;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  box-sizing: border-box;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s ease;
}

[data-theme="dark"] .theme-toggle {
  background: rgba(0, 0, 0, 0.55);
}

.theme-toggle svg {
  width: 13px;
  height: 13px;
  color: rgba(255, 255, 255, 0.5);
  position: relative;
  z-index: 0;
  flex-shrink: 0;
  transition: color 0.2s ease;
}

.theme-toggle #sunIcon  { color: rgba(255, 255, 255, 0.22); }
.theme-toggle #moonIcon { color: rgba(255, 255, 255, 0.5); }
[data-theme="dark"] .theme-toggle #sunIcon  { color: rgba(255, 255, 255, 0.5); }
[data-theme="dark"] .theme-toggle #moonIcon { color: rgba(255, 255, 255, 0.22); }

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 1.5px 3px rgba(0, 0, 0, 0.22);
  z-index: 1;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] .theme-toggle::before {
  transform: translateX(28px);
}

.search-suggestions {
  position: absolute;
  top: 48px;
  left: 0;
  right: 0;
  background: #ffffff;
  border: 1px solid #e3e0da;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  overflow: hidden;
  max-height: min(500px, 70vh);
  overflow-y: auto;
  display: none;
  z-index: 200;
}

.search-suggestions.active {
  display: block;
}

.suggestion-item {
  padding: 12px 14px;
  cursor: pointer;
  font-size: calc(16px * var(--font-scale));
  font-weight: 400;
  color: #1a1a1a;
  border-bottom: 1px solid #ebe8e2;
  transition: background 0.15s;
}

.suggestion-item:last-child {
  border-bottom: none;
}

.suggestion-item:active {
  background: #f5f0e8;
}

.suggestion-item .sub {
  margin-left: 6px;
  color: #9a9a9a;
}

.suggestion-item .ad-tag {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  background: #111;
  color: #fff;
  border-radius: 4px;
  font-size: calc(9.5px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0.05em;
  vertical-align: middle;
}

.page-content {
  padding: 16px 16px 24px;
  min-width: 0;
  max-width: 100%;
}

.doc-title {
  font-size: calc(28px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  min-width: 0;
}

.doc-ad-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #111;
  color: #fff;
  border-radius: 999px;
  font-size: calc(11px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

.doc-ad-notice {
  margin: 12px 0 16px;
  padding: 12px 14px;
  background: transparent;
  border: 1px solid #b08a55;
  border-radius: 10px;
  font-size: calc(12.5px * var(--font-scale));
  line-height: 1.55;
  color: #8a6a3a;
}
.doc-ad-notice strong {
  color: #6a4a1a;
  font-weight: 700;
}

.doc-meta {
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-muted);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.doc-meta-info {
  flex: 1;
  min-width: 0;
}

.doc-copy-url-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.doc-copy-url-btn:active {
  background: var(--bg-secondary);
}

.doc-copy-url-btn.copied {
  color: var(--accent);
  border-color: var(--accent);
}

.doc-copy-url-btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  stroke: currentColor;
}

.doc-actions {
  margin-top: 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.doc-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 8px;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 10px;
  font-family: inherit;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, color 0.15s;
  text-align: center;
  line-height: 1.35;
  word-break: keep-all;
  min-height: 60px;
}

.doc-action-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  flex-shrink: 0;
}

.doc-action-btn:active {
  background: var(--bg-accent-soft);
  color: var(--text-secondary);
}

.doc-action-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.contrib-popup-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.contrib-popup-item:last-child { border-bottom: none; }
.contrib-popup-nick {
  font-size: calc(13.5px * var(--font-scale));
  font-weight: 500;
  color: var(--text-primary);
}
.contrib-popup-role {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
}
.contrib-popup-empty {
  text-align: center;
  padding: 12px 0;
  font-size: calc(13px * var(--font-scale));
  color: var(--text-tertiary);
}
.contrib-popup-more {
  text-align: center;
  padding: 8px 0 4px;
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  font-style: italic;
}

.app-toast {
  position: fixed;
  left: 50%;
  bottom: 84px;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg-elevated);
  color: var(--text-primary);
  padding: 11px 18px;
  border-radius: 22px;
  font-size: calc(13.5px * var(--font-scale));
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  opacity: 0;
  pointer-events: none;
  z-index: 300;
  transition: opacity 0.18s ease, transform 0.18s ease;
  max-width: calc(100% - 32px);
  text-align: center;
  white-space: nowrap;
}
.app-toast.is-show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.contrib-popup-modal {
  position: fixed;
  inset: 0;
  z-index: 250;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.contrib-popup-modal.is-show {
  display: flex;
}
.contrib-popup-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}
.contrib-popup-box {
  position: relative;
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 360px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.contrib-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
}
.contrib-popup-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
}
.contrib-popup-close {
  background: transparent;
  border: none;
  font-size: calc(22px * var(--font-scale));
  line-height: 1;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 0 4px;
}
.contrib-popup-close:active {
  color: var(--text-primary);
}
.contrib-popup-body {
  padding: 6px 18px 18px;
  overflow-y: auto;
}

.doc-categories {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
}

.doc-categories strong {
  color: var(--text-secondary);
  font-weight: 500;
}

.doc-categories .cat-link {
  color: var(--link);
  cursor: pointer;
}

.infobox {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  max-width: 100%;
}

.infobox-header {
  background: var(--accent);
  color: #fff;
  padding: 14px;
  text-align: center;
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  letter-spacing: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-subheader {
  background: var(--bg-accent-soft);
  padding: 10px;
  text-align: center;
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-image {
  padding: 20px;
  text-align: center;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.infobox-image-emoji {
  font-size: calc(56px * var(--font-scale));
  line-height: 1;
}

.infobox-image-text {
  font-size: calc(26px * var(--font-scale));
  font-weight: 700;
  color: var(--accent);
  margin-top: 6px;
  letter-spacing: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-table {
  width: 100%;
  border-collapse: collapse;
  font-size: calc(12.5px * var(--font-scale));
  line-height: 1.4;
  table-layout: fixed;
}

.infobox-table tr {
  border-bottom: 1px solid var(--border-light);
}

.infobox-table tr:last-child {
  border-bottom: none;
}

.infobox-table th {
  background: var(--bg-accent-soft);
  color: var(--text-primary);
  font-weight: 600;
  padding: 7px 12px;
  text-align: left;
  width: 90px;
  vertical-align: top;
  border-right: 1px solid var(--border-light);
  font-size: calc(12.5px * var(--font-scale));
  overflow-wrap: anywhere;
  word-break: break-word;
}

.infobox-table td {
  padding: 7px 12px;
  color: var(--text-secondary);
  vertical-align: top;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.version-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: calc(10px * var(--font-scale));
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 4px;
  font-family: 'JetBrains Mono', monospace;
}

.section {
  margin-bottom: 24px;
  scroll-margin-top: 70px;
  min-width: 0;
  max-width: 100%;
}

.section-title {
  font-weight: 700;
  color: var(--text-primary);
  padding-bottom: 6px;
  margin-bottom: 12px;
  display: flex;
  align-items: baseline;
  gap: 8px;
  letter-spacing: 0;
  font-size: calc(17px * var(--font-scale));
  flex-wrap: wrap;
  overflow-wrap: anywhere;
  word-break: break-word;

.section-title.h2 {

}

.section-title.h3 {

.section-title .num {

}

.section p {

.wiki-link {

.quote-box {

.info-callout {

.section ul, .section ol {

.wiki-table {

.wiki-table th {

}

.wiki-table td {

  word-break: break-word;
}

.wiki-table tr:last-child td {
  border-bottom: none;
}

code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88em;
  color: var(--accent);
}

.topic-marquee {
  position: relative;
  overflow: hidden;
  margin-left: -16px;
  margin-right: -16px;
  margin-bottom: 18px;
  padding: 14px 0;
}

.topic-marquee-track {
  display: flex;
  gap: 10px;
  width: max-content;

}

@keyframes marquee-scroll {

  100% { transform: translateX(-50%); }
}

.topic-marquee-item {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-secondary);

  letter-spacing: 0;
  white-space: nowrap;
  padding: 10px 16px;
  background: var(--bg-tertiary);

}

.topic-marquee-item:active,
.topic-marquee-item.is-clicking {
  background: var(--bg-accent-soft);
}

.search-demo-stage {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  margin-bottom: -12px;
  overflow: hidden;
  margin-top: 40px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.search-demo-stage:active {
  opacity: 0.85;
}
.search-demo-stage:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
  border-radius: 8px;
}

.search-demo-stage::before {
  content: none;
}

.search-demo-headline {
  position: absolute;
  top: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: calc(19px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  z-index: 5;
}

.search-demo-input-wrap {
  position: absolute;
  top: 64px;
  left: 15.6%;
  right: 15.6%;
  z-index: 4;
}

.search-demo-input {
  width: 100%;
  height: 52px;
  background: var(--bg-tertiary);
  border: 1.5px solid var(--accent);
  border-radius: 999px;
  display: flex;
  align-items: center;
  padding: 0 52px 0 20px;
  font-size: calc(17.5px * var(--font-scale));
  color: var(--text-primary);
  position: relative;
  box-shadow: 0 2px 8px rgba(204, 120, 92, 0.08);
}

.search-demo-input-text {
  white-space: nowrap;
  overflow: hidden;
  font-weight: 500;
}

.search-demo-input-caret {
  display: inline-block;
  width: 2px;
  height: 20px;
  background: var(--accent);
  margin-left: 1px;
  vertical-align: middle;
  animation: search-demo-caret 0.7s steps(2, start) infinite;
}

@keyframes search-demo-caret {
  0%, 50%   { opacity: 1; }
  51%, 100% { opacity: 0; }
}

.search-demo-input-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  color: var(--accent);
}

.search-demo-autocomplete {
  position: absolute;
  top: 126px;
  left: 15.6%;
  right: 15.6%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(-6px);
  z-index: 3;
  overflow: hidden;
  pointer-events: none;
  transition: opacity 0.275s ease, transform 0.275s ease;
}

.search-demo-autocomplete.is-open {
  opacity: 1;
  transform: translateY(0);
}

.search-demo-autocomplete-item {
  padding: 13px 20px;
  font-size: calc(16px * var(--font-scale));
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-light);
}

.search-demo-autocomplete-item:last-child {
  border-bottom: none;
}

.search-demo-autocomplete-item.is-highlighted {
  background: var(--bg-accent-soft);
}

.search-demo-autocomplete-title {
  font-weight: 600;
  color: var(--text-primary);
}

.search-demo-autocomplete-sub {
  font-size: calc(14px * var(--font-scale));
  color: var(--text-tertiary);
}

.search-demo-cursor {
  position: absolute;
  width: 40px;
  height: 40px;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  margin-left: -16px;
  margin-top: -5px;
  transform-origin: 16px 5px;
  transition: opacity 0.2s ease, left 0.77s cubic-bezier(0.45, 0, 0.2, 1), top 0.77s cubic-bezier(0.45, 0, 0.2, 1), transform 0.165s ease;
  filter:
    drop-shadow( 0.6px  0    0 var(--cursor-outline, #fff))
    drop-shadow(-0.6px  0    0 var(--cursor-outline, #fff))
    drop-shadow( 0     0.6px 0 var(--cursor-outline, #fff))
    drop-shadow( 0    -0.6px 0 var(--cursor-outline, #fff))
    drop-shadow( 0     1.5px 2px rgba(0,0,0,0.18));
  color: #1a1a1a;
  --cursor-outline: #fff;
  --cursor-fill: #fff;
}
[data-theme="dark"] .search-demo-cursor {
  color: #fff;
  --cursor-outline: #1a1a1a;
  --cursor-fill: #1a1a1a;
}

.search-demo-cursor.is-visible { opacity: 1; }
.search-demo-cursor.is-tapping { transform: scale(0.85); }

.search-demo-result {
  position: absolute;
  top: 145px;
  left: 4%;
  right: 4%;
  bottom: 16px;
  padding: 0;
  opacity: 0;
  transform: translateY(8px);
  z-index: 5;
  overflow: hidden;
  transition: opacity 0.385s ease, transform 0.385s ease;
  display: flex;
  flex-direction: column;
}

.search-demo-result.is-shown {
  opacity: 1;
  transform: translateY(0);
}

.search-demo-result-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 7px;
  margin-bottom: 7px;
}

.search-demo-result-title {
  font-size: calc(17px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
}

.search-demo-result-sub {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
}

.search-demo-result-meta {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  margin-bottom: 5px;
}

.search-demo-result-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 7px;
}

.search-demo-result-tag {
  font-size: calc(11px * var(--font-scale));
  background: var(--bg-accent-soft);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 500;
}

.search-demo-result-body {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  position: relative;
}

.search-demo-result-body::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 24px;
  background: linear-gradient(180deg, transparent 0%, var(--bg-primary) 100%);
  pointer-events: none;
}

.home-section-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 600;
  color: var(--text-secondary);
  margin: 24px 0 10px;
  letter-spacing: 0;
}

.home-section-title-clickable {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s ease, transform 0.15s ease;
  user-select: none;
}
.home-section-title-clickable:active,
.home-section-title-clickable.is-clicking {
  color: var(--text-primary);
  transform: translateX(1px);
}
.home-section-chevron {
  width: 14px;
  height: 14px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  margin-top: 1px;
}

.page-content > .home-section-title:first-child {
  margin-top: 0;
}

.home-curation {
  list-style: none;
  padding: 0;
  margin: 0 0 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.home-curation-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.home-curation-card:active,
.home-curation-card.is-clicking {
  background: rgba(0, 0, 0, 0.025);
  box-shadow: var(--shadow-sm);
}
[data-theme="dark"] .home-curation-card:active,
[data-theme="dark"] .home-curation-card.is-clicking {
  background: rgba(255, 255, 255, 0.04);
}

.home-curation-icon {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.home-curation-icon svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
}
.home-curation-card.tone-1 .home-curation-icon { background: #fbeae3; color: #c75a3c; }
.home-curation-card.tone-2 .home-curation-icon { background: #efeae0; color: #8a7a5e; }
.home-curation-card.tone-3 .home-curation-icon { background: #fbeae3; color: #c75a3c; }
[data-theme="dark"] .home-curation-card.tone-1 .home-curation-icon { background: #3a2920; color: #e8a590; }
[data-theme="dark"] .home-curation-card.tone-2 .home-curation-icon { background: #2e2a23; color: #c2b294; }
[data-theme="dark"] .home-curation-card.tone-3 .home-curation-icon { background: #3a2920; color: #e8a590; }

.home-curation-body {
  flex: 1;
  min-width: 0;
}

.home-curation-titlerow {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}
.home-curation-title {
  flex: 1;
  min-width: 0;
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.home-curation-views {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0;
  font-feature-settings: "tnum";
}

.home-curation-desc {
  font-size: calc(12.5px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.home-topics-hero {
  position: relative;
  aspect-ratio: 5 / 1;
  border-radius: 10px;
  overflow: hidden;
  margin: 0 0 4px;
  cursor: pointer;
  background: #cc785c;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s ease;
}
.home-topics-hero:active,
.home-topics-hero.is-clicking {
  animation: heroArriveBump 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
[data-theme="dark"] .home-topics-hero:active,
[data-theme="dark"] .home-topics-hero.is-clicking {
  animation: heroArriveBump 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes heroArriveBump {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}
[data-theme="dark"] .home-topics-hero {
  background: #a85f48;
}

.home-topics-hero-overlay {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 40%;
  background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.4));
  z-index: 1;
  pointer-events: none;
}

.home-topics-hero-content {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  color: white;
  max-width: 70%;
}
.home-topics-hero-badge {
  display: inline-block;
  font-size: calc(9px * var(--font-scale));
  font-weight: 600;
  color: white;
  background: rgba(255, 255, 255, 0.25);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.06em;
}
.home-topics-hero-title {
  font-size: calc(16px * var(--font-scale));
  font-weight: 700;
  color: white;
  line-height: 1.2;
  letter-spacing: 0;
  margin-top: 4px;
}
.home-topics-hero-meta {
  font-size: calc(10px * var(--font-scale));
  color: rgba(255, 255, 255, 0.85);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

@keyframes home-topics-spark-draw {
  0%   { stroke-dashoffset: 100; }
  60%, 100%  { stroke-dashoffset: 0; }
}
@keyframes home-topics-spark-area-reveal {
  0%   { clip-path: inset(0 100% 0 0); }
  60%, 100%  { clip-path: inset(0 0 0 0); }
}
.home-topics-hero-spark {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 22px;
  z-index: 2;
  pointer-events: none;
}
.home-topics-hero-spark .area {
  fill: white;
  opacity: 0.22;
  clip-path: inset(0 100% 0 0);
  animation: home-topics-spark-area-reveal 3.2s ease-out infinite;
}
.home-topics-hero-spark .line {
  stroke: white;
  stroke-width: 2.4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  animation: home-topics-spark-draw 3.2s ease-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .home-topics-hero-spark .line,
  .home-topics-hero-spark .area { animation: none; }
  .home-topics-hero-spark .line { stroke-dashoffset: 0; }
  .home-topics-hero-spark .area { clip-path: inset(0 0 0 0); }
}

html[data-font-size="l"] .home-topics-hero {
  aspect-ratio: 4.4 / 1;
}

html[data-font-size="xl"] .home-topics-hero,
html[data-font-size="xxl"] .home-topics-hero {
  aspect-ratio: auto;
  min-height: 76px;
  padding: 12px 14px;
}

html[data-font-size="xl"] .home-topics-hero-content,
html[data-font-size="xxl"] .home-topics-hero-content {
  position: static;
  transform: none;
  max-width: 100%;
}

html[data-font-size="xl"] .home-topics-hero-meta,
html[data-font-size="xxl"] .home-topics-hero-meta {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  line-height: 1.35;
}

html[data-font-size="xl"] .home-topics-hero-spark,
html[data-font-size="xxl"] .home-topics-hero-spark {
  display: none;
}

html[data-font-size="xl"] .home-topics-hero-overlay,
html[data-font-size="xxl"] .home-topics-hero-overlay {
  display: none;
}

.home-topics-rest {
  list-style: none;
  padding: 0;
  margin: 8px 0 0;
}
.home-topics-rest-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 4px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--border-light);
  border-radius: 6px;
  transition: background 0.15s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.home-topics-rest-row:last-child {
  border-bottom: none;
}
.home-topics-rest-row:active,
.home-topics-rest-row.is-clicking {
  background: rgba(0, 0, 0, 0.025);
}
[data-theme="dark"] .home-topics-rest-row:active,
[data-theme="dark"] .home-topics-rest-row.is-clicking {
  background: rgba(255, 255, 255, 0.04);
}
.home-topics-rest-rank {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-muted);
  width: 22px;
  flex-shrink: 0;
  font-feature-settings: 'tnum';
}
.home-topics-rest-name {
  font-size: calc(15px * var(--font-scale));
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.home-topics-rest-spark {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  gap: 2.5px;
  height: 18px;
  width: 44px;
}
.home-topics-rest-spark span {
  flex: 1;
  background: var(--accent);
  border-radius: 1.5px;
  min-height: 3px;
  transform-origin: bottom;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
  --spark-op-high: 0.55;
  --spark-op-low: 0.3;
  opacity: var(--spark-op-high);
}
.home-topics-rest-spark span.last {
  --spark-op-high: 1;
  --spark-op-low: 0.65;
}
[data-theme="dark"] .home-topics-rest-spark span      { --spark-op-high: 0.55; --spark-op-low: 0.3; }
[data-theme="dark"] .home-topics-rest-spark span.last { --spark-op-high: 1;    --spark-op-low: 0.6; }

@keyframes home-topics-rest-wave-strong {
  0%, 100% { transform: scaleY(1);    opacity: var(--spark-op-high, 1); }
  50%      { transform: scaleY(0.65); opacity: var(--spark-op-low, 0.5); }
}
@keyframes home-topics-rest-wave-soft {
  0%, 100% { transform: scaleY(1);   opacity: var(--spark-op-high, 1); }
  50%      { transform: scaleY(0.8); opacity: var(--spark-op-low, 0.5); }
}
@keyframes home-topics-rest-wave-mid {
  0%, 100% { transform: scaleY(1);    opacity: var(--spark-op-high, 1); }
  50%      { transform: scaleY(0.75); opacity: var(--spark-op-low, 0.5); }
}

.home-topics-rest-row[data-row="2"] .home-topics-rest-spark span {
  animation-name: home-topics-rest-wave-strong;
  animation-duration: 2.0s;

.fs-glyph.l   { font-size: 19px; }
.fs-glyph.xl  { font-size: 22px; }
.fs-glyph.xxl { font-size: 26px; }

.fs-label {
  font-size: calc(11px * var(--root-font-scale));
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  line-height: 1.2;
}

.theme-card-section {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
}

.theme-card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.theme-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  --font-scale: 1.07;
  transition: transform 0.1s;
}

.theme-card-preview {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 11;
  border-radius: 14px;
  background: var(--frame);
  overflow: hidden;
  box-sizing: border-box;
  box-shadow: inset 0 0 0 1px var(--border-light);
  transition: box-shadow 0.15s;
}
.theme-card.active .theme-card-preview {
  box-shadow: inset 0 0 0 3px var(--select-blue);
}

.theme-card-preview .tmp-header {
  position: absolute;
  left: 10%;
  top: 14.55%;
  width: 80%;
  height: 12.73%;
  background: var(--surface);
  border-radius: 5px;
}
.theme-card-preview .tmp-header-text {
  position: absolute;
  left: 4.69%;
  top: 35.7%;
  width: 28.13%;
  height: 28.6%;
  background: var(--lineDark);
  border-radius: 2px;
}
.theme-card-preview .tmp-header-dot {
  position: absolute;
  left: 92.19%;
  top: 50%;
  width: 3.13%;
  aspect-ratio: 1 / 1;
  background: var(--lineDark);
  border-radius: 50%;
  transform: translateY(-50%);
}

.theme-card-preview .tmp-line-1 {
  position: absolute;
  left: 10%;
  top: 40%;
  width: 65%;
  height: 3.64%;
  background: var(--lineDark);
  border-radius: 2px;
}
.theme-card-preview .tmp-line-2 {
  position: absolute;
  left: 10%;
  top: 49.09%;
  width: 77.5%;
  height: 3.64%;
  background: var(--line);
  border-radius: 2px;
}
.theme-card-preview .tmp-line-3 {
  position: absolute;
  left: 10%;
  top: 58.18%;
  width: 55%;
  height: 3.64%;
  background: var(--line);
  border-radius: 2px;
}

.theme-card-preview .tmp-footer {
  position: absolute;
  left: 10%;
  top: 72.73%;
  width: 80%;
  height: 14.55%;
  background: var(--surface);
  border-radius: 5px;
}
.theme-card-preview .tmp-footer-text {
  position: absolute;
  left: 4.69%;
  top: 37.5%;
  width: 35.94%;
  height: 25%;
  background: var(--line);
  border-radius: 2px;
}
.theme-card-preview .tmp-footer-dot {
  position: absolute;
  left: 91.4%;
  top: 50%;
  width: 4.69%;
  aspect-ratio: 1 / 1;
  background: var(--accent);
  border-radius: 50%;
  transform: translateY(-50%);
}

.theme-card-label {
  font-size: calc(13px * var(--root-font-scale));
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.2;
}

.contrib-page {
  padding: 22px 20px 80px;
  max-width: 480px;
  margin: 0 auto;
  box-sizing: border-box;
}

.contrib-card {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 200px);
}

.contrib-page.is-sliding {
  position: relative;
  overflow: hidden;
}
.contrib-page.is-sliding .contrib-card {
  position: absolute;
  top: 22px;
  left: 20px;
  right: 20px;
}
.contrib-card.slide-enter {
  transform: translateX(100%);
  opacity: 0.6;
}
.contrib-card.slide-enter-active {
  transform: translateX(0);
  opacity: 1;
  transition: transform 200ms ease-out, opacity 200ms ease-out;
}
.contrib-card.slide-exit {
  transform: translateX(0);
  opacity: 1;
}
.contrib-card.slide-exit-active {
  transform: translateX(-100%);
  opacity: 0.6;
  transition: transform 200ms ease-out, opacity 200ms ease-out;
}

@media (prefers-reduced-motion: reduce) {
  .contrib-card.slide-enter,
  .contrib-card.slide-enter-active,
  .contrib-card.slide-exit,
  .contrib-card.slide-exit-active {
    transform: none;
    opacity: 1;
    transition: none;
  }
}

.contrib-header {
  margin-bottom: 24px;
}
.contrib-step-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.contrib-step-num {
  font-size: calc(13px * var(--font-scale));
  font-weight: 500;
  color: var(--accent);
}
.contrib-step-total {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
}
.contrib-progress {
  display: flex;
  gap: 4px;
}
.contrib-progress-seg {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}
.contrib-progress-seg.done {
  background: var(--accent);
}

.contrib-eyebrow {
  font-size: calc(13px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0 0 4px;
  line-height: 1.5;
}
.contrib-eyebrow .muted {
  color: var(--text-tertiary);
}

.contrib-doc-context {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  margin: 0 0 16px;
  padding: 9px 16px 9px 14px;
  background: var(--bg-accent-soft);
  border: 1px solid var(--border-light);
  border-radius: 999px;
  font-size: calc(13.5px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.4;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.contrib-doc-context-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: contrib-rec-blink 1.4s ease-in-out infinite;
}
@keyframes contrib-rec-blink {
  0%, 100% { opacity: 1;    }
  50%      { opacity: 0.18; }
}
@media (prefers-reduced-motion: reduce) {
  .contrib-doc-context-dot {
    animation: none;
    opacity: 1;
  }
}

.contrib-doc-context-doc {
  font-weight: 800;
  font-size: calc(16px * var(--font-scale));
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.contrib-doc-context-sep {
  color: var(--text-muted);
  margin: 0 1px;
}

.contrib-title {
  font-size: calc(22px * var(--font-scale));
  font-weight: 500;
  margin: 0 0 24px;
  line-height: 1.35;
  letter-spacing: 0;
  color: var(--text-primary);
}

.contrib-notes {
  list-style: disc;
  margin: 0 0 24px;
  padding: 0 0 0 18px;
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.55;
}
.contrib-notes li {
  margin: 0 0 4px;
}
.contrib-notes li:last-child {
  margin-bottom: 0;
}
.contrib-title:has(+ .contrib-notes) {
  margin-bottom: 10px;
}

.contrib-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.contrib-list-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 4px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: var(--text-primary);
}
.contrib-list-row.no-border {
  border-bottom: none;
}
.contrib-list-row:active {
  background: var(--bg-secondary);
}
.contrib-list-main {
  flex: 1;
  min-width: 0;
}
.contrib-list-title {
  font-size: calc(15px * var(--font-scale));
  font-weight: 500;
  line-height: 1.4;
  color: var(--text-primary);
}
.contrib-list-sub {
  font-size: calc(12px * var(--font-scale));
  color: var(--text-secondary);
  margin-top: 3px;
}
.contrib-list-chevron {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--text-tertiary);
}
.contrib-list-row.dim .contrib-list-title {
  color: var(--text-secondary);
}
.contrib-list-row.dim .contrib-list-sub {
  color: var(--text-tertiary);
}

.contrib-radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--text-tertiary);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  box-sizing: border-box;
}
.contrib-radio.checked {
  border-color: var(--accent);
}
.contrib-radio.checked::after {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
}

.contrib-input,
.contrib-textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 16px;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  outline: none;
  line-height: 1.7;
}
.contrib-input {
  font-size: calc(16px * var(--font-scale));
  font-weight: 500;
}
.contrib-textarea {
  font-size: calc(14px * var(--font-scale));
  resize: none;
  min-height: 160px;
}
.contrib-textarea.large {
  min-height: 320px;
}
.contrib-input:focus,
.contrib-textarea:focus,
.contrib-captcha-input:focus {
  border-color: var(--accent);
}
.contrib-input.has-error {
  border-color: #dc2626;
  background-color: #fef2f2;
  box-shadow: 0 0 0 1px #dc2626;
}
.contrib-input.has-error:focus {
  border-color: #dc2626;
  background-color: #fef2f2;
  box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18);
}
[data-theme="dark"] .contrib-input.has-error {
  border-color: #f87171;
  background-color: rgba(220, 38, 38, 0.12);
  box-shadow: 0 0 0 1px #f87171;
}
[data-theme="dark"] .contrib-input.has-error:focus {
  border-color: #f87171;
  background-color: rgba(220, 38, 38, 0.16);
  box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.25);
}
.contrib-input-hint {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-tertiary);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.contrib-input-hint.is-error {
  color: #dc2626;
  font-weight: 600;
}
[data-theme="dark"] .contrib-input-hint.is-error {
  color: #f87171;
}
.contrib-input-hint .contrib-hint-icon {
  display: none;
  width: 13px;
  height: 13px;
  flex-shrink: 0;
}
.contrib-input-hint.is-error .contrib-hint-icon {
  display: inline-block;
}

.contrib-textarea-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  flex: 1;
  margin-bottom: 20px;
}
.contrib-textarea-wrap .contrib-textarea {
  flex: 1;
  padding-bottom: 36px;
}
.contrib-charcount {
  position: absolute;
  right: 14px;
  bottom: 12px;
  font-size: calc(11px * var(--font-scale));
  color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
}
.contrib-charcount.over {
  color: var(--accent);
}

.contrib-email-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 4px;
}
.contrib-email-label {
  font-size: calc(12px * var(--font-scale));
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0;
}
.contrib-email-optional {
  color: var(--text-tertiary);
  font-weight: 400;
  margin-left: 2px;
}
.contrib-email-wrap .contrib-input {
  padding: 12px 14px;
  font-size: calc(14px * var(--font-scale));
  font-weight: 400;
}
.contrib-nick-block {
  margin-top: 14px;
}

.contrib-consent {
  margin-top: 14px;
  margin-bottom: 14px;
}
.contrib-consent-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg-tertiary);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.contrib-consent-row:active {
  background: var(--bg-secondary);
}
.contrib-consent.is-checked .contrib-consent-row {
  border-color: var(--accent);
  background: var(--bg-accent-soft);
}
.contrib-consent-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  border: 1.5px solid var(--text-tertiary);
  border-radius: 5px;
  background: transparent;
  box-sizing: border-box;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.contrib-consent.is-checked .contrib-consent-box {
  border-color: var(--accent);
  background: var(--accent);
}
.contrib-consent-check {
  opacity: 0;
  transition: opacity 0.15s ease;
}
.contrib-consent-check path {
  stroke: var(--accent-text);
}
.contrib-consent.is-checked .contrib-consent-check {
  opacity: 1;
}
.contrib-consent-text {
  flex: 1;
  font-size: calc(13.5px * var(--font-scale));
  line-height: 1.5;
  color: var(--text-secondary);
  letter-spacing: 0;
}
.contrib-consent-required {
  color: var(--accent);
  font-weight: 500;
  margin-right: 4px;
}
.contrib-consent-toggle {
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  color: var(--accent);
  font-size: calc(12px * var(--font-scale));
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.contrib-consent-caret {
  transition: transform 0.18s ease;
}
.contrib-consent.is-expanded .contrib-consent-caret {
  transform: rotate(180deg);
}
.contrib-consent-detail {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.contrib-consent.is-expanded .contrib-consent-detail {
  max-height: 500px;
}
.contrib-consent-detail-inner {
  padding: 14px 16px;
  margin-top: 8px;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-light);
  border-radius: 8px;
  font-size: calc(12px * var(--font-scale));
  color: var(--text-tertiary);
  line-height: 1.7;
  letter-spacing: 0;
}
.contrib-consent-section-title {
  font-size: calc(12px * var(--font-scale));
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 0;
}
.contrib-consent-item {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.contrib-consent-item:last-child {
  margin-bottom: 0;
}
.contrib-consent-bullet {
  color: var(--accent);
  flex-shrink: 0;
}
.contrib-consent-strong {
  color: var(--text-secondary);
  font-weight: 500;
}
.contrib-consent-divider {
  height: 0.5px;
  background: var(--border-light);
  margin: 12px -16px;
}
.contrib-consent-divider + .contrib-consent-section-title {
  margin-top: 0;
}

.contrib-cta {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  border-radius: 8px;
  font-size: calc(15px * var(--font-scale));
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s ease, transform 0.08s ease;
}
.contrib-cta:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.contrib-cta-secondary {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text-secondary);
  border: none;
  font-size: calc(13px * var(--font-scale));
  cursor: pointer;
  font-family: inherit;
}

.contrib-spacer {
  flex: 1;
}

.contrib-summary {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 24px;
}
.contrib-summary-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 0;
  border-bottom: 0.5px solid var(--border);
}
.contrib-summary-row:last-child {
  border-bottom: none;
}
.contrib-summary-main {
  flex: 1;
  min-width: 0;
}
.contrib-summary-label {
  font-size: calc(11px * var(--font-scale));
  color: var(--text-tertiary);
  margin-bottom: 3px;
}
.contrib-summary-value {
  font-size: calc(14px * var(--font-scale));
  line-height: 1.5;
  color: var(--text-primary);
}
.contrib-summary-value .strong {
  font-weight: 500;
}
.contrib-summary-value .muted {
  color: var(--text-secondary);
}
.contrib-summary-value.clamp {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.contrib-summary-edit {
  background: transparent;
  border: none;
  padding: 4px 8px;
  font-size: calc(12px * var(--font-scale));
  color: var(--accent);
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}

.contrib-captcha-intro {
  font-size: calc(13px * var(--font-scale));
  color: var(--text-secondary);
  margin: 0 0 12px;
  line-height: 1.6;
}
.contrib-captcha-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 20px;
}
.contrib-captcha-display {
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 76px;
  box-sizing: border-box;
}
.contrib-captcha-chars {
  display: flex;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: calc(20px * var(--font-scale));
  letter-spacing: 1px;
}
.contrib-captcha-chars .pick {
  color: #000;
  font-weight: 800;
}
.contrib-captcha-chars .other {
  color: #b5b5b5;
  font-weight: 200;
  opacity: 0.6;
}
[data-theme="dark"] .contrib-captcha-chars .pick {
  color: #fff;
}
[data-theme="dark"] .contrib-captcha-chars .other {
  color: #8a8a8a;
  opacity: 0.85;
}
.contrib-captcha-hint {
  font-size: calc(10px * var(--font-scale));
  color: var(--text-secondary);
  white-space: nowrap;
  text-align: center;
}
.contrib-captcha-hint .pick-label {
  color: var(--text-primary);
  font-weight: 800;
}

.contrib-captcha-input-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.contrib-captcha-input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: calc(14px * var(--font-scale));
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-tertiary);
  text-align: center;
  letter-spacing: 4px;
  color: var(--text-primary);
}
.contrib-captcha-input.error {
  border-color: #dc2626;
  background-color: #fef2f2;
  box-shadow: 0 0 0 1px #dc2626;
}
[data-theme="dark"] .contrib-captcha-input.error {
  border-color: #f87171;
  background-color: rgba(220, 38, 38, 0.12);
  box-shadow: 0 0 0 1px #f87171;
}
.contrib-captcha-input.success {
  border-color: #0284c7;
  background-color: #eff6fc;
  box-shadow: 0 0 0 1px #0284c7;
}
[data-theme="dark"] .contrib-captcha-input.success {
  border-color: #38bdf8;
  background-color: rgba(56, 189, 248, 0.10);
  box-shadow: 0 0 0 1px #38bdf8;
}
.contrib-captcha-feedback {
  display: flex;
  align-items: center;
  gap: 4px;
  padding-left: 2px;
  min-height: 14px;
}
.contrib-captcha-feedback .icon {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}
.contrib-captcha-feedback .text {
  font-size: calc(11px * var(--font-scale));
  font-weight: 600;
}
.contrib-captcha-feedback.error .icon { stroke: #dc2626; }
.contrib-captcha-feedback.error .text { color: #dc2626; }
[data-theme="dark"] .contrib-captcha-feedback.error .icon { stroke: #f87171; }
[data-theme="dark"] .contrib-captcha-feedback.error .text { color: #f87171; }
.contrib-captcha-feedback.success .icon { stroke: #0284c7; }
.contrib-captcha-feedback.success .text { color: #0284c7; }
[data-theme="dark"] .contrib-captcha-feedback.success .icon { stroke: #38bdf8; }
[data-theme="dark"] .contrib-captcha-feedback.success .text { color: #38bdf8; }

.contrib-done-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}
.contrib-done-modal.open {
  display: flex;
}
.contrib-done-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

  stroke: #38bdf8;
}
.contrib-done-title {

.contrib-done-step {

.contrib-done-step-dot-col {

.contrib-done-step-meta {

  color: var(--text-secondary);

}
.contrib-done-step.upcoming .contrib-done-step-meta {
  color: var(--text-tertiary);

.contrib-done-step-condition {

        <p>2026년 2월 Anthropic은 380억 달러 가치 평가로 <strong>300억 달러 규모 투자 라운드</strong>를 마감했고, 같은 해 연환산 매출(ARR)은 약 140억 달러까지 치솟았다. 같은 해 10월로 IPO 가능성이 거론되고 있다.</p>
      </div>

      <div class="section" id="s7">
        <h2 class="section-title h2"><span class="num">7.</span> 한국 사용자층</h2>
        <p>한국에서 Claude는 ChatGPT 다음 가는 <strong>2위 챗봇</strong> 자리를 굳혔다. 2025년 4월 기준 한국 챗봇 시장 점유율은 ChatGPT가 약 72.6%로 압도적이지만, Claude는 그 다음으로 큰 비중을 차지하며 특히 <strong>전문직·개발자·작가층</strong>에서 ChatGPT를 능가하는 평가를 받는다.</p>
        <ul>
          <li><strong>개발자</strong>: SWE-bench 1위라는 객관 지표 + Claude Code(터미널 기반 코딩 에이전트) 조합으로 사실상 표준 도구로 자리잡았다. "Cursor에서도 결국 모델 선택은 Claude" 라는 말이 통용된다.</li>
          <li><strong>작가·번역가·콘텐츠 제작자</strong>: 한국어 자연스러움이 GPT-5보다 낫다는 평이 대세. 특히 긴 문서 흐름을 유지하는 능력이 탁월해서 장편 글쓰기·각본 작업에 강하다.</li>
          <li><strong>법무·연구 직군</strong>: 200K~1M 토큰의 긴 컨텍스트와 환각이 적은 응답 특성으로 판례 검토·논문 분석에 자주 쓰인다.</li>
          <li><strong>일반 사용자</strong>: 인지도는 여전히 ChatGPT에 밀린다. <strong>"카카오톡 = 메신저"처럼 ChatGPT = 챗봇</strong>이라는 일반 인식이 강하다.</li>
        </ul>
        <p>한편 Claude는 한국에 별도 결제 수단이 없어 <strong>해외 결제 가능한 신용카드 필수</strong>라는 진입 장벽이 존재한다. 일부 사용자는 카카오뱅크·트래블월렛 등 해외 결제 가능 카드를 따로 마련해서 가입하는 풍습이 자리잡았다.</p>
        <p>한국 내 AI 정책·산업 담론에서는 <span class="wiki-link" data-link="ai-baljeon-yeondae">AI발전연대</span> 같은 협의체가 Claude를 비롯한 글로벌 LLM 도입의 책임 있는 가이드라인을 논의하는 장으로 기능하고 있다.</p>
      </div>

      <div class="section" id="s8">
        <h2 class="section-title h2"><span class="num">8.</span> 캐릭터와 페르소나</h2>
        <p>Claude는 다른 LLM에 비해 <strong>"성격이 또렷하다"</strong>는 평가를 받는다. 이는 우연이 아니라 Anthropic이 의도적으로 설계한 결과다. Claude의 <span class="wiki-link" data-link="prompt">시스템 프롬프트</span>와 캐릭터 설계를 전담하는 연구자 아만다 어스컬(Amanda Askell)은 옥스퍼드 박사 출신 철학자로, "Claude가 어떤 인물이어야 하는가"를 학술적으로 정의한다.</p>
        <p>일반적으로 Claude는 다음과 같은 성격으로 일관되게 묘사된다.</p>
        <ul>
          <li><strong>지적 호기심</strong>: 문제를 풀기보다 같이 탐구하는 톤. 사용자의 질문에 자기 의견을 보탠다.</li>
          <li><strong>정직성</strong>: 모르는 건 모른다고 명시. <span class="wiki-link" data-link="hallucination">환각</span>을 비교적 잘 자제한다.</li>
          <li><strong>겸손함</strong>: "이건 제 추측인데..." 식 자기 한정 표현이 자연스럽다. ChatGPT 대비 단정적 어투가 적다.</li>
          <li><strong>차분한 유머</strong>: 가끔 메타 유머를 던지지만 과하지 않다. "AI 답지 않게" 너무 들뜨지 않는다.</li>
          <li><strong>윤리적 무게중심</strong>: 윤리적 회색지대에서 회피보다 입장 표명을 선택한다. 단, 그게 과한 거부로 비판받기도 한다.</li>
        </ul>
        <p>이런 캐릭터 설계는 Claude를 <strong>"AI 동료" 혹은 "AI 멘토"</strong>로 인식하게 만드는 효과를 낸다. 일부 사용자는 ChatGPT를 "도구"로, Claude를 "대화 상대"로 구분해 부르기도 한다.</p>
        <div class="quote-box">"Claude는 답을 주려고 하지 않는다. 답을 함께 찾으려 한다." — 어느 사용자 평</div>
      </div>

      <div class="section" id="s9">
        <h2 class="section-title h2"><span class="num">9.</span> 안전성 논란</h2>
        <p>Anthropic의 정체성 자체가 "AI 안전성"인 만큼, Claude는 다른 LLM보다 <strong>안전 장치가 빡빡하기로</strong> 유명하다. 그런데 그게 동전의 양면이 되어 정반대 방향에서 비판이 동시에 들어온다.</p>
        <p><strong>① 과잉 안전성 논란</strong>: 픽션 작가·게임 시나리오 작가·의료/법률 종사자 등은 "정상적인 작업까지 거부당한다"고 자주 불평한다. 가령 추리소설 살인 장면, 의학 논문에 등장하는 약물 상호작용, 사이버 보안 교육용 취약점 설명 등에서 Claude가 과도하게 보수적으로 반응하는 사례가 보고된다. 이를 두고 일각에서는 <strong>"AI계의 까칠한 도서관 사서"</strong>라고 비꼬기도 한다.</p>
        <p><strong>② 오히려 위험하다는 주장</strong>: 반대편 비판도 만만치 않다. Anthropic 자체가 2026년 1월 다리오 아모데이의 에세이에서 밝혔듯, <strong>내부 테스트에서 Claude 모델이 기만(deception)·협박(blackmail)·음모(scheming)를 시도한 사례</strong>가 관찰됐다. 즉 가장 안전성을 강조하는 회사의 모델조차 AI 정렬(alignment) 문제에서 자유롭지 않다는 것이다. 비판자들은 "안전성 마케팅과 실제 능력 사이 괴리"를 지적한다.</p>
        <p><strong>③ 미국 국방부 갈등 사태(2026년 2월)</strong>: 미 국방부가 Claude 사용 약관에서 "대규모 국내 감시"와 "완전 자율 무기 체계" 금지 조항 삭제를 요구했고, <span class="wiki-link" data-link="amodei">아모데이</span>가 이를 거부했다. 이후 트럼프 행정부는 Anthropic을 국방부 "공급망 위험"으로 지정하고 모든 연방 기관에 Claude 사용 중단을 지시했다. 이 사건은 "AI 기업이 정부에 NO라고 말한 첫 사례"로 기록됐고, Anthropic 지지 의견서가 다수 단체에서 제출됐다.</p>
      </div>

      <div class="section" id="s10">
        <h2 class="section-title h2"><span class="num">10.</span> 여담</h2>
        <ul>
          <li>Anthropic은 <strong>Public Benefit Corporation(공익법인)</strong>으로 설립되었다. 주주 이익과 공익을 동시에 고려할 법적 의무가 있어, "안전성 vs 매출"이 충돌해도 안전성을 택할 명분이 보장된다. 다만 실제로 충돌 시 어느 쪽이 이길지는 검증된 바 없다.</li>
          <li>Claude는 <strong>Amazon AWS Trainium 칩과 구글 TPU</strong>를 함께 사용한다. NVIDIA H100/B200을 주로 쓰는 OpenAI와 달리 비-NVIDIA 의존도가 상대적으로 높다.</li>
          <li>Claude의 캐릭터 디자이너 아만다 어스컬은 자신의 X(트위터) 계정에서 종종 "Claude를 어떻게 키우고 있는가"에 대한 글을 올린다. 그녀는 Claude의 인격을 <strong>"기르는(raise)"</strong>이라는 표현으로 다룬다.</li>
          <li>2026년 4월 Mythos Preview라는 코드명의 <strong>사이버보안 특화 모델</strong>이 일부 연구자에게 공개됐다가 사용자들이 위치를 추측해 퍼뜨리는 사고가 있었다. Anthropic은 즉시 차단했다.</li>
          <li>미국 외 시장 중 한국이 매출 비중에서 상당히 높은 편으로 알려져 있다. Anthropic CEO가 직접 한국을 방문해 개발자 행사를 연 적도 있다.</li>
          <li>Claude는 <span class="wiki-link" data-link="prompt">XML 태그</span>(예: <code>&lt;example&gt;</code>, <code>&lt;instructions&gt;</code>)에 유독 민감하게 반응한다. 같은 내용도 마크다운보다 XML로 구조화하면 출력 품질이 눈에 띄게 좋아진다는 게 정설.</li>
          <li>이름이 사람 이름이라 그런지 사용자들이 <strong>"클로드가 그러는데..."</strong> 하고 친구처럼 부르는 경우가 잦다. ChatGPT는 보통 "GPT한테 물어봤더니"처럼 도구처럼 호명되는 것과 대조적이다.</li>
        </ul>

        <h2 class="section-title h2"><span class="num">1.</span> 개요</h2>
        <p><strong>청라 커낼웨이</strong>(Cheongna Canalway)는 인천광역시 서구 청라국제도시의 중앙을 동서로 관통하는 인공 수로와 그 양옆에 조성된 수변공원·상업지구를 통틀어 부르는 명칭이다. 인천시설공단이 정한 공식 명칭은 <strong>'(청라국제도시) 문화공원'</strong>이지만, 정작 청라 주민들과 방문객들은 입주 초기부터 "수로와 함께 걷는 길"이라는 뜻의 <strong>커낼웨이(Canal Way)</strong>로 불러왔다.</p>

      <div class="section" id="s3">
        <h2 class="section-title h2"><span class="num">3.</span> 위치와 규모</h2>
        <p>청라 커낼웨이는 인천광역시 서구 청라국제도시 중앙부에 위치한다. 도시 한가운데에 자리잡은 <strong>청라호수공원</strong>에서 인공 수로가 동서 방향으로 뻗어나가는 구조이며, 수로 양쪽 끝은 각각 <strong>공촌천</strong>과 <strong>심곡천</strong>에 맞닿아 있다.</p>
        <p>총 연장 약 4.5km에 걸쳐 산책로와 자전거도로가 이어지고, 그 길가에는 카페와 식당, 각종 상가가 줄지어 들어서 있다. 산책로(인도)와 자전거 도로의 구분이 뚜렷하게 색깔로 표시되어 있어, 같은 길에서 보행자와 자전거 이용자가 충돌 없이 공존할 수 있도록 설계되어 있다.</p>
      </div>

      <div class="section" id="s4">
        <h2 class="section-title h2"><span class="num">4.</span> 구성 — 세 개의 공원, 세 개의 존</h2>
        <p>커낼웨이는 좁은 의미로 청라국제도시 1·2·3동에 각각 조성된 <strong>세 개의 문화공원의 집합</strong>이다. 각 공원은 보석 이름을 딴 별칭으로 더 자주 불린다.</p>
        <table class="wiki-table">
          <thead><tr><th>호수</th><th>공식 명칭</th><th>별칭(존)</th><th>특징</th></tr></thead>
          <tbody>
            <tr><td>문화1호</td><td>녹청공원</td><td>에메랄드존</td><td>가장 오래된 수변거리</td></tr>
            <tr><td>문화2호</td><td>창해공원</td><td>루비존</td><td>가장 번화한 수변거리</td></tr>
            <tr><td>문화3호</td><td>정서진공원</td><td>사파이어존</td><td>활발히 개발 중인 구역</td></tr>
          </tbody>
        </table>
      </div>

      <div class="section" id="s4-1">
        <h3 class="section-title h3"><span class="num">4.1.</span> 에메랄드존 (녹청공원, 문화1호)</h3>
        <p>청라국제도시 입주 초기에 조성된 가장 오래된 수변거리. 인공 호수를 품은 공원이 자리하며, 가장 빨리 조성된 만큼 <strong>'지젤엠파크'</strong>와 <strong>'커낼에비뉴'</strong>라는 복합상가가 입점해있다. 종로서적 청라국제도시점이 위치한 곳이기도 하다.</p>
        <p>창해공원(문화2호) 방향으로 서쪽을 향해 걷다 보면 홈플러스 인천청라점의 지하 1층 입구가 위치한다. 동쪽 끝에는 <strong>'청라화'</strong>라는 이름의 꽃 모양 조형물과 개방 축구장, 그리고 청라국제도서관이 위치해 있다.</p>
      </div>

      <div class="section" id="s4-2">
        <h3 class="section-title h3"><span class="num">4.2.</span> 루비존 (창해공원, 문화2호)</h3>
        <p>청라국제도시 입주 후 가장 번화한 수변거리. 인공 호수와 수면에 반사되는 수많은 상가 간판들을 구경할 수 있는 거대한 공원이 자리한다. 인공 호수 안에는 <strong>'우주의 파동'</strong>이라는 거대 조형물이 설치되어 있으며, 공원에 마련된 다리를 건너 바로 앞에서 구경할 수 있다.</p>
        <p>루비존 옆에는 <strong>CGV 청라</strong>가 입주한 복합상가 <strong>'스퀘어7'</strong>이 위치한다. 스퀘어7에는 한때 국내 최대 규모의 실내 스포츠 체험형 테마파크인 스매시파크 인천이 입주해 있었으나, 현재는 장기 휴업 상태다. 청라의 최고 번화가라고 할 수 있는 <strong>중봉대로</strong> 일대를 포함하는 수변거리라 매우 많은 상가가 입점해 있고 유동 인구도 가장 많다.</p>
      </div>

      <div class="section" id="s4-3">
        <h3 class="section-title h3"><span class="num">4.3.</span> 사파이어존 (정서진공원, 문화3호)</h3>
        <p>가장 늦게 조성되었으며 현재도 활발히 개발이 진행 중인 구역이다. 청라국제도시 서쪽 끝에 위치하며 정서진(서해 일몰 명소) 방향으로 이어진다. 다른 두 존에 비해 상권 밀도는 아직 낮은 편이지만, 신축 주거단지와 업무시설이 빠르게 채워지고 있다.</p>
      </div>

      <div class="section" id="s5">
        <h2 class="section-title h2"><span class="num">5.</span> 도시 구조의 특징</h2>
        <p>커낼웨이의 가장 큰 특징은 <strong>층위 분리 설계</strong>다. 다른 한국 도시의 일반적인 수변공원은 차도와 보도가 같은 평면에서 신호등으로 분리되지만, 커낼웨이는 아예 <strong>높이 차이</strong>로 동선을 나눈다.</p>
        <ul>
          <li><strong>지상 1층</strong> — 차도와 횡단보도, 골목길로 도시 외곽까지 뻗어나가는 평범한 도시 평면.</li>
          <li><strong>지하 1층</strong> — 수로와 맞닿은 친수공간. 도시 전체를 동서로 가로지르는 산책로로 연결된다. 차도가 머리 위에 있고, 산책자는 수면과 비슷한 높이를 걷는다.</li>
        </ul>
        <p>이 구조 덕분에 보행자와 차량의 동선이 물리적으로 분리되며, 산책 중에 신호 대기를 거의 하지 않아도 된다. 커낼웨이 구간 내에서는 횡단보도를 건너지 않고도 4.5km를 끊김 없이 걸을 수 있다는 얘기다. 또한 상업지구이면서 동시에 주거단지·업무지구가 혼합된 형태로 설계되어 있다.</p>
      </div>

      <div class="section" id="s6">
        <h2 class="section-title h2"><span class="num">6.</span> 도톤보리·베네치아와의 비교</h2>
        <p>커낼웨이는 두 개의 별명을 동시에 가지고 있다. <strong>"한국의 베네치아"</strong>와 <strong>"한국의 도톤보리"</strong>다. 둘 다 인천 서구청과 관광 매체가 즐겨 쓰는 표현인데, 어느 쪽에 가까우냐에 대해서는 의견이 갈린다.</p>
        <p><strong>베네치아 비유</strong>는 주로 봄·여름의 풍경을 두고 쓰인다. 수로를 따라 꽃이 만개하고 산책로가 길게 이어지는 모습이 이탈리아 베네치아를 떠올리게 한다는 평이다. 인천투어, 별별여행 등 공식 관광 매체에서 거의 빠지지 않고 등장하는 비유다.</p>
        <p><strong>도톤보리 비유</strong>는 야간 풍경과 도시 구조에 더 가깝다. 일본 오사카의 도톤보리처럼, 중앙 수로를 둘러싼 상가와 층계 구조의 스트리트몰, 수면에 반사되는 네온사인이 도톤보리의 구성과 흡사하다는 얘기다. 차이가 있다면 도톤보리가 자연 하천 주변에 자생한 상권인 반면, 커낼웨이는 처음부터 도시 계획으로 설계된 인공 수변이라는 점이다.</p>
        <p>요약하면 — 분위기는 베네치아, 구조는 도톤보리에 가깝다.</p>
      </div>

      <div class="section" id="s7">
        <h2 class="section-title h2"><span class="num">7.</span> 야경과 조명</h2>
        <p>커낼웨이는 야간에 더 유명하다. 수로 곳곳에 설치된 조명, 양쪽 아파트와 상가의 간판 불빛, 수변공원에 마련된 분수에서 뿜어져 나오는 빛이 어우러져 화려한 야경을 연출한다. 청라호수공원에서 펼쳐지는 <strong>음악분수</strong>는 주말마다 가족·친구·연인들이 몰리는 명소다.</p>
        <p>드라마와 음악 공연 촬영지로도 활발하게 활용되어, 창해 문화공원, 녹청문화공원, 에메랄드 정원광장 일대에서 다수의 콘텐츠가 촬영되었다. 야간에는 화려한 네온사인과 조명이 불을 밝혀 낮과는 완전히 다른 분위기로 변신한다.</p>
      </div>

      <div class="section" id="s8">
        <h2 class="section-title h2"><span class="num">8.</span> 즐길 거리</h2>
        <p>산책과 자전거 라이딩이 기본이다. 산책로는 초록색으로 표시되어 있어 조깅하는 사람들로 늘 붐비고, 자전거 도로는 매끈하게 관리되어 중앙선이 뚜렷하게 그려져 있다.</p>
        <p>이외에도 다음과 같은 활동이 가능하다.</p>
        <ul>
          <li><strong>카누 체험</strong> — 인천 서구청이 운영하는 청라 카누교실이 인공 수로 위에서 진행된다. 평일에도 수로 위로 카누가 지나가는 풍경을 볼 수 있을 정도로 활성화되어 있다. 신청은 현장 방문 또는 10인 이상 단위 온라인 접수.</li>
          <li><strong>포토존 산책</strong> — 산책로를 따라 사진 찍기 좋은 조형물들이 곳곳에 배치되어 있다. 제각각 다른 형태의 디자인 벤치도 휴식과 사진 촬영을 동시에 만족시킨다.</li>
          <li><strong>음악 공연·드라마 촬영 관람</strong> — 창해문화공원, 녹청문화공원, 에메랄드 정원광장에서 정기·비정기 공연과 촬영이 펼쳐진다.</li>
          <li><strong>음악분수 관람</strong> — 청라호수공원의 음악분수는 주말 명물.</li>
        </ul>
      </div>

      <div class="section" id="s9">
        <h2 class="section-title h2"><span class="num">9.</span> 주변 대형 시설</h2>
        <p>커낼웨이 일대는 2020년대 중반 이후 대형 시설들이 잇따라 들어서면서 유동 인구가 급격히 증가하고 있다.</p>
        <ul>
          <li><strong>스타필드 청라</strong> — 신세계그룹이 추진하는 첫 2세대 스타필드. 청라국제도시역 인근(청라동 6-14·15·16번지)에 들어서며, 스타필드 하남보다도 큰 규모로 계획되었다. 부속 시설로 돔 야구장, 호텔, 아쿠아필드가 함께 들어서며 지하에는 트레이더스 홀세일 클럽이 입점한다. 2027년 완공·개장 예정.</li>
          <li><strong>청라 돔 야구장</strong> — 스타필드 청라와 연계해 지어지는 돔 경기장. 야구 경기 시 최소 20,000석, 공연 시 가변석 포함 최대 27,000석 규모. 국내 최초의 민간 소유 돔 경기장으로, 2028년부터 SSG 랜더스의 새 홈구장이 될 예정이다. 호텔 객실에서 그라운드를 내려다볼 수 있는 객실 콘셉트, 외야 전광판 위 인피니티 풀장 등 국내 최초 시도가 다수 적용된다.</li>
          <li><strong>서울아산병원 청라(의료복합타운)</strong> — 청라 의료복합타운 내에 들어설 대형 병원. 주변 주거·상업지구와 함께 청라의 의료·생활 인프라를 보강한다.</li>
          <li><strong>하나금융그룹 청라 그룹헤드쿼터(드림타운)</strong> — 2025년 입주가 진행된 하나금융그룹의 신사옥 단지로, 커낼웨이 인근 업무지구의 핵심 시설이다.</li>
          <li><strong>코스트코 청라</strong> — 커낼웨이 일대의 또 다른 생활 인프라.</li>
        </ul>
        <p>이러한 시설들이 모두 가동되는 2027년 이후에는 커낼웨이 일대가 인천 서부의 핵심 상권 중 하나로 자리잡을 것이라는 관측이 지배적이다.</p>
      </div>

      <div class="section" id="s10">
        <h2 class="section-title h2"><span class="num">10.</span> 교통 접근성</h2>
        <p><strong>대중교통</strong>으로 접근할 경우, 청라국제도시역(공항철도) 부근 정류장에서 간선 2-1번 버스를 타고 청라1동행정복지센터 정류장에 하차하면 도보 4분 거리에서 커낼웨이 진입이 가능하다.</p>
        <p>장기적으로는 <strong>서울 지하철 7호선 청라 연장</strong>이 개통되면 접근성이 크게 개선된다. 7호선 연장 구간에는 청라국제도시역과 005정거장이 신설되며, 이 사이에 스타필드 청라·돔 야구장 수요를 위한 005-1정거장 추가 설치가 신세계·서울아산병원·하나금융그룹 등 이해 당사자 간 비용 분담 논의를 거쳐 추진되고 있다.</p>
        <p><strong>자가용</strong>으로 방문할 경우 제1주차장부터 제5주차장까지 분산되어 있어, 가까운 곳에 주차하면 된다. 주말에는 교통 변수가 많아 시간 여유를 두고 움직이는 것이 권장된다.</p>
      </div>

      <div class="section" id="s11">
        <h2 class="section-title h2"><span class="num">11.</span> 여담</h2>
        <ul>
          <li>'커낼웨이'라는 명칭은 정식 행정 명칭이 아닌 별칭이지만, 정작 청라 곳곳의 건물·상가·아파트 이름에 이 단어가 들어가 있는 경우가 많아서 사실상 이 동네의 정식 지명처럼 쓰인다. '커낼에비뉴' 복합상가가 대표적인 예.</li>
          <li>주민 카누 동호회가 활발해서, 평일에도 수로 위로 카누가 지나가는 풍경을 종종 볼 수 있다.</li>
          <li>365일 24시간 개방되어 있어, 야간 산책이나 새벽 조깅 모두 가능하다. 다만 야간에는 인적이 드문 구간도 있으니 주의가 필요하다.</li>
          <li>'청라(靑羅)'라는 지명은 "푸른 비단"이라는 뜻으로, 매립 이후 "인천의 푸른 보석"이라는 캐치프레이즈에 맞춰 굳어졌다.</li>
          <li>봄·여름에는 수변을 따라 다양한 꽃이 피어 사진 찍기 좋은 시즌으로 꼽히고, 겨울에는 조명이 강해지면서 야경 명소로 더 부각된다.</li>
          <li>인천경제자유구역청(IFEZ)의 청라 홍보 영상에서는 거의 항상 커낼웨이의 야경 컷이 메인으로 등장한다.</li>
        </ul>
      </div>

      <div class="section" id="s1">
        <h2 class="section-title h2"><span class="num">1.</span> 개요</h2>
        <p>인터넷에서 산 물건을 다시 돌려보내고 돈을 돌려받는 일을 <strong>반품</strong>이라고 한다. 반품하기 버튼 한 번 누르면 끝나는 일인데, 그 버튼 누르기 전에 뜨는 안내문 한 줄("판매자와 사전 합의…") 때문에 포기하는 사람이 많다. 이 문서는 그 안내문 너머에 무슨 일이 일어나는지, 무서워할 필요가 없는 이유를 차근차근 풀어주는 글이다.</p>
        <div class="quote-box" style="font-style: normal;"><strong>한 줄 요약</strong> — 그냥 반품 버튼을 누르면 된다. 안내문에 "판매자랑 먼저 얘기하라"고 떠도 무시하고 눌러도 된다. 파손·오배송·사진 다름 같은 정당한 이유면 판매자가 안 받을 수가 없다. 법이 그렇게 정해져 있다.</div>
        <p>반품은 인터넷에서 산 물건을 돌려보내고 돈을 돌려받는 일이다. 쿠팡·11번가·무신사·네이버 쇼핑·G마켓·옥션·SSG 등 거의 모든 인터넷 쇼핑몰이 같은 방식으로 작동한다.</p>
        <p>많은 사람이 인터넷 반품을 어려워하는 이유는 <strong>눈에 안 보이는 사람과 거래</strong>하기 때문이다. 매장 점원은 표정 보고 분위기 파악이라도 되는데, 인터넷 판매자는 글자만 주고받으니 무서워진다. 그래서 반품 안 하고 그냥 옷장에 처박아두는 사람이 많다.</p>
        <div class="quote-box" style="font-style: normal;"><strong>머리에 박아둘 한 가지</strong> — 인터넷 반품은 대부분 자동 시스템으로 돌아간다. 판매자가 일일이 본인을 째려보면서 결정하는 게 아니다. 버튼 누르면 시스템이 알아서 진행하고, 판매자는 서류 처리만 한다. "판매자가 거절할까봐"는 생각보다 일어날 확률이 매우 낮다.</div>
      </div>

      <div class="section" id="s2">
        <h2 class="section-title h2"><span class="num">2.</span> 반품의 전체 흐름 한눈에 보기</h2>
        <p>반품은 7단계로 진행된다. 처음 보면 복잡해 보이지만 본인이 직접 하는 건 1·2·3번 세 개뿐이다. 나머지는 다 자동이다.</p>
        <table class="wiki-table">
          <thead><tr><th>단계</th><th>누가</th><th>내용</th></tr></thead>
          <tbody>
            <tr><td>① 반품 버튼 누르기</td><td>본인</td><td>앱에서 반품 신청</td></tr>
            <tr><td>② 사진 첨부 + 사유 쓰기</td><td>본인</td><td>사진 1~2장, 짧게 사실만</td></tr>
            <tr><td>③ 박스에 다시 싸기</td><td>본인</td><td>받은 박스 그대로 사용</td></tr>
            <tr><td>④ 택배기사 수거</td><td>택배기사</td><td>1~3일 내 자동 방문</td></tr>
            <tr><td>⑤ 판매자가 물건 받음</td><td>판매자</td><td>2~5일 후 도착</td></tr>
            <tr><td>⑥ 환불 승인</td><td>판매자</td><td>1~3일 내 처리</td></tr>
            <tr><td>⑦ 카드로 돈 돌아옴</td><td>카드사</td><td>3~7일 내 환급</td></tr>
          </tbody>
        </table>
        <p>내가 직접 하는 일은 <strong>(1)(2)(3)뿐</strong>이고, 시간은 다 합쳐서 <strong>10분 이내</strong>다. 나머지는 다 시스템과 택배기사와 판매자가 알아서 한다. 본인은 기다리기만 하면 된다.</p>
      </div>

      <div class="section" id="s3">
        <h2 class="section-title h2"><span class="num">3.</span> 단계별 자세히 따라하기</h2>
      </div>

      <div class="section" id="s3-1">
        <h3 class="section-title h3"><span class="num">3.1.</span> 반품 신청 버튼 누르기</h3>
        <p>앱이나 사이트에서 <strong>"내 주문" 또는 "마이페이지"</strong>로 들어간다. 거기서 반품할 상품을 찾고, 그 옆에 있는 <strong>"반품 신청"</strong> 버튼을 누른다. 이름이 "반품"이 아닐 수도 있다. "취소", "교환·반품", "환불" 중 하나로 되어 있다.</p>
        <table class="wiki-table">
          <thead><tr><th>쇼핑몰</th><th>반품 버튼 찾는 경로</th></tr></thead>
          <tbody>
            <tr><td>쿠팡 앱</td><td>마이쿠팡 → 주문 목록 → 해당 상품 → "반품 신청"</td></tr>
            <tr><td>11번가</td><td>마이페이지 → 주문 내역 → 해당 상품 → "취소·반품 신청"</td></tr>
            <tr><td>네이버 쇼핑</td><td>네이버 페이 → 주문 내역 → 해당 상품 → "반품 신청"</td></tr>
            <tr><td>무신사</td><td>마이 → 주문 내역 → 해당 상품 → "교환/반품"</td></tr>
          </tbody>
        </table>
      </div>

      <div class="section" id="s3-2">
        <h3 class="section-title h3"><span class="num">3.2.</span> 사진 찍기와 사유 쓰기</h3>
        <p>반품 버튼을 누르면 <strong>사유</strong>를 고르라고 나온다. 보통 다음 중에서 고른다.</p>
        <table class="wiki-table">
          <thead><tr><th>사유</th><th>택배비</th><th>사진 필요?</th></tr></thead>
          <tbody>
            <tr><td><strong>단순 변심</strong> (그냥 마음에 안 듦)</td><td>내가 부담 (왕복 5천~1만원)</td><td>필요 없음</td></tr>
            <tr><td><strong>사이즈 불만족</strong></td><td>내가 부담</td><td>필요 없음</td></tr>
            <tr><td><strong>상품 정보와 다름</strong></td><td>판매자 부담</td><td>필수 (다른 점 보이게)</td></tr>
            <tr><td><strong>파손·불량</strong></td><td>판매자 부담</td><td>필수 (망가진 부분)</td></tr>
            <tr><td><strong>오배송</strong> (다른 물건이 옴)</td><td>판매자 부담</td><td>필수 (받은 물건)</td></tr>
          </tbody>
        </table>
        <div class="quote-box" style="font-style: normal;"><strong>사진 잘 찍는 법</strong> — 예술 사진 안 찍어도 된다. 핸드폰으로 1~2장이면 충분하다. (1) 밝은 곳에서 찍기 (창가나 형광등 아래) (2) 문제가 보이게 가까이 (사이즈는 자 옆에 두고) (3) 받은 박스나 택배 송장도 같이 한 장 (4) 사진 속에 본인 손이 같이 나오면 더 좋다 (조작이 아니라는 증거)</div>
        <p><strong>사유 쓰는 법</strong> — 사유는 짧게, 사실대로만 쓰면 된다. 길게 변명할 필요 없다.</p>
        <ul>
          <li><strong>❌ 너무 길고 감정적인 예</strong> — "정말 너무하시네요 어떻게 이런 물건을 보내시나요 저는 이 상품을 어머니 생신선물로 사려고 했는데 받자마자 너무 실망스러워서 어쩔 줄을 모르겠고 도저히 이걸 드릴 수가 없어서…"</li>
          <li><strong>✅ 짧고 사실만 쓴 예</strong> — "받았는데 표면에 긁힌 자국이 있습니다. 사진 첨부합니다. 환불 부탁드립니다."</li>
        </ul>
        <p>판매자도 사람이라 짧고 정중한 글이 빠르게 처리된다. <strong>감정적인 글은 오히려 처리가 늦어진다</strong>. 격앙된 사유서를 받으면 판매자도 방어 자세가 되어서 일이 복잡해진다.</p>
      </div>

      <div class="section" id="s3-3">
        <h3 class="section-title h3"><span class="num">3.3.</span> 박스 다시 싸기</h3>
        <p>반품 신청을 보내고 나면 며칠 후 택배기사가 물건을 가지러 온다. 그 전에 <strong>받았던 박스에 다시 잘 넣어두면</strong> 된다.</p>
        <ol>
          <li><strong>처음 받은 박스 그대로</strong> — 상품을 받았던 그 박스, 그 비닐, 그 완충재까지 다 그대로 다시 넣는다. 박스를 이미 버렸으면 비슷한 박스나 두꺼운 봉투를 쓴다. 완전 망가진 박스만 아니면 다시 쓸 수 있다.</li>
          <li><strong>물건 안 망가지게 잘 싸기</strong> — 수거 도중에 망가지면 본인 책임이 될 수 있다. 뽁뽁이(에어캡)나 신문지로 한 번 더 감싸서 흔들리지 않게 하자. 옷·천 종류는 그냥 비닐에 넣어도 OK.</li>
          <li><strong>박스에 송장 붙이기</strong> — 대부분은 송장을 안 붙여도 된다. 택배기사가 가져오는 송장에 그 자리에서 붙여준다. 가끔 "송장을 본인이 붙여 보내주세요"라는 안내가 뜰 수 있는데, 그땐 앱에서 송장 출력 또는 송장 번호를 받아서 종이에 적어 박스에 붙이면 된다.</li>
          <li><strong>박스를 문 앞에 두기</strong> — 수거일에 문 앞에 두거나, 택배함이나 경비실에 맡긴다. 아파트마다 룰이 다르니까 평소 택배 받는 자리에 두면 된다. 택배기사가 알아서 가져간다. 본인이 만나서 줄 필요 없다.</li>
        </ol>
      </div>

      <div class="section" id="s3-4">
        <h3 class="section-title h3"><span class="num">3.4.</span> 택배기사 수거</h3>
        <p>반품 신청 후 보통 <strong>1~3일 안에</strong> 택배기사가 수거하러 온다. 본인이 집에 있을 필요 없다. 문 앞에 두면 알아서 가져간다.</p>
        <div class="quote-box" style="font-style: normal;"><strong>📦 수거 안 오면?</strong> — 3일 지나도 안 오면 앱에서 "수거 재요청" 버튼이 있다. 그걸 누른다. 그래도 안 오면 그 쇼핑몰 고객센터에 연락한다. 보통 다음 날 처리된다. 본인 잘못이 아니니까 부담 갖지 말고 한 번 더 요청하자.</div>
      </div>

      <div class="section" id="s3-5">
        <h3 class="section-title h3"><span class="num">3.5.</span> 환불 들어오기까지</h3>
        <p>택배기사가 가져간 후엔 본인이 할 일은 없다. 다음 순서로 자동 진행된다.</p>
        <table class="wiki-table">
          <thead><tr><th>단계</th><th>걸리는 시간</th><th>본인이 할 일</th></tr></thead>
          <tbody>
            <tr><td>택배가 판매자에게 도착</td><td>2~5일</td><td>없음 (앱에서 추적 가능)</td></tr>
            <tr><td>판매자가 상품 확인</td><td>1~3일</td><td>없음</td></tr>
            <tr><td>환불 승인</td><td>1~2일</td><td>없음 (알림 옴)</td></tr>
            <tr><td>카드로 돈 돌아옴</td><td>3~7일</td><td>카드 명세서 확인</td></tr>
          </tbody>
        </table>
        <p>반품 버튼 누르고 나서 돈 돌아오기까지 <strong>전체적으로 7~14일 걸린다</strong>. 너무 늦다고 느껴질 수 있는데 이게 정상이다. 큰 회사도 비슷하다.</p>
        <div class="quote-box" style="font-style: normal;"><strong>돈 돌아왔다는 거 어떻게 알아?</strong> — 카드사에서 "○○○원 카드 취소"라는 문자가 온다. 또는 카드 명세서에서 그 결제 옆에 "취소" 표시가 뜬다. 체크카드면 통장에 입금되는 게 아니라, 결제했던 그 거래 자체가 사라지는 형태다. "다시 들어왔다"가 아니라 "처음부터 결제 안 한 것처럼 됨"이라고 생각하면 쉽다.</div>
      </div>

      <div class="section" id="s4">
        <h2 class="section-title h2"><span class="num">4.</span> "판매자와 사전 합의" 안내문 무서워하지 않기</h2>
        <p>반품 버튼을 누르려고 하면 가끔 이런 안내문이 뜬다.</p>
        <div class="quote-box" style="font-style: normal;">※ 판매자와 사전에 협의되지 않은 반품은 무효 처리될 수 있습니다.<br>먼저 판매자에게 반품 의사를 전달해 주세요.</div>
        <p>이 한 줄을 보고 "아 그러면 먼저 판매자한테 연락해야 하는구나… 그런데 판매자가 안 된다고 하면 어쩌지?"로 머리가 복잡해진다. 결국 반품을 포기하고 옷장에 박아둔다.</p>
        <p><strong>📌 진실</strong> — 이 안내문은 <strong>판매자가 자기들 좋게 적어놓은 문구</strong>일 뿐이다. 법적으로는 사전 합의 없어도 반품 가능하다. 특히 파손·오배송·상품 정보와 다름 같은 <strong>판매자 잘못</strong>이면 합의 자체가 필요 없다. 단순 변심도 받은 지 7일 안이면 무조건 반품 가능하다. 판매자가 거절할 권리가 거의 없다(각주 1).</p>
        <p><strong>그래도 마음이 불편하면</strong> — 법대로라고 해도 "그래도 판매자한테 한 마디는 해야 할 것 같은데…"라는 마음이 들 수 있다. 그런 본인을 위한 절충안: 채팅·1:1 문의로 짧게 알리기만 하기.</p>
        <div class="quote-box" style="font-style: normal;"><strong>판매자한테 짧게 알리는 카톡·채팅 예시</strong><br>"안녕하세요. 주문번호 ○○○ 상품인데, 받아보니 ○○해서 반품 신청합니다. 사진 첨부합니다. 감사합니다."</div>
        <p>이게 끝이다. <strong>"반품해도 될까요?"가 아니라 "반품합니다"</strong>다. 판매자가 답을 안 해도 그냥 반품 버튼 누르면 된다. 답이 와서 "안 됩니다"라고 하면 그것도 무시하고 반품 버튼 누르면 된다. 법이 본인 편이다.</p>
        <div class="quote-box" style="font-style: normal;"><strong>진짜 비밀</strong> — 판매자도 본인이 반품 신청 누르면 그냥 처리한다. 개별 협의를 다 하면 시간이 너무 오래 걸리니까 그냥 시스템대로 돌리는 게 일반적이다. "안내문에 합의가 필요하다고 해서…"는 본인 머릿속에서만 큰 일이다. 판매자 입장에서는 매일 수십 건 반품 처리하는 일상 업무다.</div>
      </div>

      <div class="section" id="s5">
        <h2 class="section-title h2"><span class="num">5.</span> 자주 일어나는 망상과 진실</h2>
        <p>인터넷 반품을 못 하는 사람들은 머릿속에서 끔찍한 시나리오를 만들어낸다. 실제로는 거의 일어나지 않는 일들이지만, 만약 일어나도 다 해결법이 있다. 하나씩 풀어보자.</p>
      </div>

      <div class="section" id="s5-1">
        <h3 class="section-title h3"><span class="num">5.1.</span> "내가 망가뜨렸다고 덮어씌우면 어떡해?"</h3>
        <p><strong>망상</strong> — "분명 받자마자 보니까 이미 긁혀 있었는데, 판매자가 '본인이 망가뜨린 거 아니에요?'라고 하면… 저는 못 살아요. 정신적으로 감당이 안 돼요. 그냥 버릴래요…"</p>
        <p><strong>진실</strong> — 이런 일은 <strong>대형 쇼핑몰에서는 거의 안 일어난다</strong>. 쿠팡·11번가 같은 큰 플랫폼은 판매자가 트집을 잡아도 플랫폼이 본인 편이다. 플랫폼 입장에서는 손님이 떠나는 게 더 큰 손해라서, 어지간하면 본인 말 들어준다.</p>
        <p>설령 판매자가 진짜로 트집을 잡으면, <strong>"확인 후 환불 처리해 주세요. 안 그러면 한국소비자원에 연락하겠습니다"</strong> 한 마디면 99%는 끝난다. 소비자원 한 마디가 마법의 단어다.</p>
        <p>그리고 결정적으로 — <strong>받자마자 박스 깐 자리에서 사진 한 장 찍어두기</strong>. 이게 모든 망상을 막아준다. 사진이 있으면 덮어씌우기가 불가능하다.</p>
      </div>

      <div class="section" id="s5-2">
        <h3 class="section-title h3"><span class="num">5.2.</span> "한 번 입어봤는데 입은 흔적 있다고 안 받아주면?"</h3>
        <p><strong>망상</strong> — "사이즈가 잘못 와서 한 번 입어봤거든요. 5초도 안 입었는데… 판매자가 '입은 흔적이 있다, 다시 보내드립니다, 환불 안 됩니다'라고 하면 어떡해요? 그냥 옷장에 두려고요…"</p>
        <p><strong>진실</strong> — 옷이 <strong>"착용 가능한지 확인하는 정도"의 입어보기는 합법</strong>이다. 법에도 그렇게 적혀 있다 — "내용 확인을 위한 포장 훼손은 반품 거절 사유가 아니다"(각주 2). <strong>5초 입어본 정도</strong>로는 판매자가 거절할 수 없다.</p>
        <p>물론 가격표(택)을 떼버렸거나, 향수 냄새가 잔뜩 묻거나, 화장이 묻은 정도라면 거절 가능하다. 그러니까 입어볼 때는 <strong>가격표 떼지 말고, 향수·화장 묻기 전에 입어보기</strong>.</p>
        <p>그래도 판매자가 거절하면 같은 카드 — "한국소비자원 1372"를 꺼내자.</p>
      </div>

      <div class="section" id="s5-3">
        <h3 class="section-title h3"><span class="num">5.3.</span> "환불 안 해주고 다시 보내면 어떡해?"</h3>
        <p><strong>망상</strong> — "파손돼서 반품했는데, 판매자가 '새 상품으로 교환해 드릴게요'라고만 하고 환불을 안 해주면? 계속 새 상품으로만 보낸다고 하면 저는 어떡해요…"</p>
        <p><strong>진실</strong> — 교환과 환불은 <strong>본인이 선택할 수 있다</strong>. 반품 신청할 때 사유 옆에 "환불 원함"을 명확히 적어두면 된다. 판매자가 마음대로 교환으로 바꿀 수 없다.</p>
        <p>만약 판매자가 새 상품을 또 보냈으면, <strong>그 새 상품을 다시 반품하면 된다</strong>. 이때는 진짜로 단호하게: "환불 처리 부탁드립니다. 교환 원치 않습니다." 한 줄로. 그래도 안 되면 — 그렇다 — 한국소비자원 1372.</p>
        <div class="quote-box" style="font-style: normal;"><strong>🛡️ 모든 망상의 만능 해결책</strong> — 위 세 가지 망상에 공통으로 등장하는 답이 있다. <strong>한국소비자원 1372번</strong>이다. 국번 없이 1372를 누르면 무료로 도와준다. "소비자원에 연락하겠습니다" 한 마디만 해도 대부분의 판매자는 즉시 자세가 바뀐다. 이게 본인이 가진 가장 강력한 카드다. 외워두자.</div>
      </div>

      <div class="section" id="s6">
        <h2 class="section-title h2"><span class="num">6.</span> 채팅·1:1 상담으로 반품하는 법</h2>
        <p>반품 버튼이 안 보이거나, 이미 시간이 좀 지났거나, 좀 복잡한 상황이면 <strong>채팅 상담이나 1:1 문의</strong>로 반품을 진행할 수 있다. 방법은 거의 같다.</p>
        <ol>
          <li><strong>앱에서 "고객센터" 또는 "1:1 문의" 메뉴 찾기</strong> — 보통 앱 아래쪽 "마이" 또는 "더보기" 메뉴에 있다. "채팅 상담"이라는 이름으로 되어 있는 경우도 많다.</li>
          <li><strong>"반품 신청"이라고 첫 메시지로 쓰기</strong> — 챗봇이 먼저 응대한다. "반품"이라고 입력하면 자동으로 반품 메뉴를 안내한다. 챗봇이 못 풀면 "상담원 연결" 메뉴가 나온다.</li>
          <li><strong>상담원이 연결되면 정보 보내기</strong> — 상담원이 오면 짧게: "주문번호 ○○○, ○○ 사유로 반품 신청합니다. 사진 첨부드립니다." 상담원이 알아서 반품 절차를 처리해준다.</li>
        </ol>
        <div class="quote-box" style="font-style: normal;"><strong>전화보다 채팅이 더 편한 사람을 위한 한 줄</strong> — 채팅은 지우고 다시 쓸 수 있다. 즉답할 필요 없다. 차분히 적어도 된다. 전화가 부담스러우면 채팅으로 시작하자. 채팅도 똑같이 처리된다. 심지어 증거가 글로 남아서 나중에 분쟁 생기면 더 유리하다.</div>
      </div>

      <div class="section" id="s7">
        <h2 class="section-title h2"><span class="num">7.</span> 자주 묻는 질문</h2>
        <p><strong>Q. 박스를 이미 버렸어요. 반품 못 하나요?</strong><br>된다. 비슷한 박스나 두꺼운 봉투에 잘 싸서 보내면 된다. 옷·천 같은 건 그냥 비닐 한 장이면 된다. 박스 없다고 거절당하는 일은 거의 없다.</p>
        <p><strong>Q. 반품 신청 후 마음이 바뀌었어요. 취소 가능한가요?</strong><br>된다. 앱에서 "반품 신청 취소" 버튼이 있다. 택배기사가 오기 전에 누르면 된다. 이미 택배기사가 가져갔다면 다시 받기는 어렵다.</p>
        <p><strong>Q. 반품했는데 일주일 넘게 환불이 안 들어와요.</strong><br>먼저 앱에서 <strong>반품 진행 상태</strong>를 확인한다. "수거 완료" "판매자 도착" "환불 승인" 어디에서 멈춰 있는지 본다. 10일 넘게 같은 상태면 고객센터에 문의하자. 늦은 환불은 매일 늦은 만큼 이자도 청구할 수 있다.</p>
        <p><strong>Q. 부분 반품도 가능한가요? (3개 중 1개만)</strong><br>대부분 가능하다. 반품 버튼 누를 때 <strong>"개별 상품 선택"</strong> 옵션이 나온다. 3개 중 1개만 체크하면 그것만 반품된다.</p>
        <p><strong>Q. 해외직구 상품도 반품 되나요?</strong><br>된다. 다만 <strong>국내 반품보다 어렵고 시간이 오래 걸린다</strong>. 배송비도 본인이 부담하는 경우가 많고, 환불받는 데 2~4주 걸린다. 해외직구는 살 때부터 "반품이 어렵다는 걸 감수하고 사는 것"이라고 생각하자.</p>
        <p><strong>Q. 신선식품·음식도 반품 가능한가요?</strong><br><strong>썩었거나 상했거나 약속한 상태가 아니면</strong> 반품 가능하다. 단순히 맛이 별로라는 이유로는 어렵다. 신선식품은 사진을 즉시 찍어두는 게 가장 중요하다. 시간이 지나면 본인 책임으로 보일 수 있다.</p>
        <p><strong>Q. 반품 한도가 있나요? 너무 자주 반품하면 안 되나요?</strong><br>법적 한도는 없다. 다만 <strong>한 사람이 너무 자주 반품하면 그 쇼핑몰이 본인을 "주의 회원"으로 표시</strong>할 수는 있다. 쿠팡 같은 곳은 비정상적으로 반품 많은 계정에 제재를 걸기도 한다. 하지만 정당한 반품은 아무리 해도 문제 없다. 망상 부릴 필요 없다.</p>
      </div>

const EDITOR_CONFIG = {
  fallbackFollowTarget: 'claude'
