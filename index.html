let state = {
  currentPage: 'home',
  currentDocId: null,
  navStack: [],
  openPanel: null,
  fontSize: 'm',
  galleryPage: 1,
  galleryCategory: 'all'
};

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme) {
  const root = document.documentElement;
  root.classList.add('theme-swap');
  root.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-card').forEach(card => {
    const isActive = card.dataset.mode === theme;
    card.classList.toggle('active', isActive);
    card.setAttribute('aria-checked', String(isActive));
  });
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      root.classList.remove('theme-swap');
    });
  });
}

window.setTheme = function(theme) {
  applyTheme(theme);
  try { localStorage.setItem('homi:theme', theme); } catch (e) {}
};

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  setTheme(current === 'light' ? 'dark' : 'light');
});

applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

function applyFontSize(size) {
  const valid = ['s', 'm', 'l', 'xl', 'xxl'];
  if (!valid.includes(size)) return;
  state.fontSize = size;
  document.documentElement.setAttribute('data-font-size', size);
  document.querySelectorAll('.fs-option').forEach(tab => {
    const isActive = tab.dataset.size === size;
    tab.classList.toggle('is-active', isActive);
    tab.setAttribute('aria-checked', String(isActive));
  });
}

window.setFontSize = function(size) {
  applyFontSize(size);
  try { localStorage.setItem('homi:fontSize', size); } catch (e) {}
};

applyFontSize(document.documentElement.getAttribute('data-font-size') || 'm');

let _toastTimer = null;
function showToast(message, options) {
  options = options || {};
  const duration = typeof options.duration === 'number' ? options.duration : 1800;
  let toast = document.getElementById('appToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'appToast';
    toast.className = 'app-toast';
    toast.setAttribute('role', 'status');
    toast.setAttribute('aria-live', 'polite');
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  requestAnimationFrame(() => toast.classList.add('is-show'));
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    toast.classList.remove('is-show');
  }, duration);
}

const searchInput = document.getElementById('searchInput');
const searchSuggestions = document.getElementById('searchSuggestions');

function normalizeSearch(query) {
  return query.trim().toLowerCase().replace(/\s+/g, ' ');
}

function resolveDocId(query) {
  const normalized = normalizeSearch(query);
  if (REDIRECT_MAP[query]) return REDIRECT_MAP[query];
  if (REDIRECT_MAP[query.trim()]) return REDIRECT_MAP[query.trim()];
  const noSpace = query.replace(/\s/g, '');
  if (REDIRECT_MAP[noSpace]) return REDIRECT_MAP[noSpace];
  for (const key in REDIRECT_MAP) {
    if (normalizeSearch(key) === normalized) return REDIRECT_MAP[key];
  }
  if (DOCS[normalized]) return normalized;
  if (DOCS[query]) return query;
  return null;
}

function getSuggestions(query) {
  if (!query.trim()) return [];
  const normalized = normalizeSearch(query);
  if (normalized.length < 2) return [];
  const results = new Set();

  for (const key in REDIRECT_MAP) {
    if (normalizeSearch(key).includes(normalized) && DOCS[REDIRECT_MAP[key]]) {
      results.add(REDIRECT_MAP[key]);
    }
  }
  for (const docId in DOCS) {
    const doc = DOCS[docId];
    if (docId.toLowerCase().includes(normalized) ||
        doc.title.toLowerCase().includes(normalized) ||
        (doc.subtitle && doc.subtitle.toLowerCase().includes(normalized))) {
      results.add(docId);
    }
  }
  return Array.from(results).slice(0, 30);
}

function renderSuggestions(query) {
  const suggestions = getSuggestions(query);
  if (suggestions.length === 0) {
    searchSuggestions.classList.remove('active');
    return;
  }
  searchSuggestions.innerHTML = suggestions.map(docId => {
    const doc = DOCS[docId];
    const sub = doc.subtitle ? `<span class="sub">${doc.subtitle}</span>` : '';
    const adTag = doc.type === 'sponsored' ? `<span class="ad-tag" aria-label="광고 문서">AD</span>` : '';
    return `<div class="suggestion-item" onclick="selectSuggestion('${docId}')">${doc.title}${sub}${adTag}</div>`;
  }).join('');
  searchSuggestions.classList.add('active');
}

window.selectSuggestion = function(docId) {
  searchInput.value = '';
  searchSuggestions.classList.remove('active');
  navigateTo('doc', docId);
};

let searchDebounceTimer = null;
searchInput.addEventListener('input', (e) => {
  const val = e.target.value;
  if (!val.trim()) {
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = null;
    }
    searchSuggestions.classList.remove('active');
    return;
  }
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    renderSuggestions(val);
    searchDebounceTimer = null;
  }, 150);
});

searchInput.addEventListener('focus', (e) => {
  if (e.target.value) renderSuggestions(e.target.value);
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchSuggestions.classList.remove('active'), 200);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = null;
    }
    const query = e.target.value.trim();
    if (!query) return;
    const docId = resolveDocId(query);
    if (docId && DOCS[docId]) {
      searchInput.value = '';
      searchSuggestions.classList.remove('active');
      navigateTo('doc', docId);
    } else {
      searchInput.value = '';
      searchSuggestions.classList.remove('active');
      renderNotFound(query);
    }
  }
});

function stateToHash(page, docId) {
  if (page === 'doc' && docId) return '#/doc/' + encodeURIComponent(docId);
  return '#/' + page;
}
function stateToHashContrib(step) {
  if (!step || step <= 1) return '#/contribute';
  return '#/contribute/' + step;
}
function hashToState(hash) {
  if (!hash || hash === '#' || hash === '#/') return { page: 'home', docId: null };
  const clean = hash.replace(/^#\/?/, '');
  const parts = clean.split('/');
  const page = parts[0] || 'home';
  const validPages = ['home', 'timeline', 'topics', 'gallery', 'settings', 'contribute', 'doc'];
  if (!validPages.includes(page)) return { page: 'home', docId: null };
  if (page === 'doc') {
    const docId = parts[1] ? decodeURIComponent(parts[1]) : null;
    if (!docId || !DOCS[docId]) return { page: 'home', docId: null };
    return { page: 'doc', docId };
  }
  if (page === 'contribute') {
    const n = parseInt(parts[1], 10);
    const step = (n >= 2 && n <= 5) ? n : 1;
    return { page: 'contribute', docId: null, contribStep: step };
  }
  return { page, docId: null };
}

window.navigateTo = function(page, docId = null, originalQuery = null, opts = {}) {
  const sameDest = state.currentPage &&
    (page === state.currentPage) &&
    (page !== 'doc' || docId === state.currentDocId);

  if (!opts.fromBack && !opts.fromTab && state.currentPage && !sameDest) {
    state.navStack.push({
      page: state.currentPage,
      docId: state.currentDocId || null
    });
    if (state.navStack.length > 50) state.navStack.shift();
  }

  state.currentPage = page;
  if (docId) state.currentDocId = docId;

  if (page === 'gallery') {
    state.galleryCategory = 'all';
    state.galleryPage = 1;
  }
  if (page === 'timeline') {
    timelineState.currentCategory = 'all';
  }

  document.documentElement.setAttribute('data-page', page);

  if (!opts.fromBack && !sameDest) {
    const newHash = stateToHash(page, docId);
    try {
      history.pushState({ page, docId: docId || null }, '', newHash);
    } catch (e) {
      try { location.hash = newHash; } catch(_) {}
    }
  }

  closeAllDockPopups();

  document.querySelectorAll('.toolbar-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === page);
  });
  if (page === 'doc') {
    document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
    const wikiBtn = document.querySelector('.toolbar-btn[data-tab="wiki"]');
    if (wikiBtn) wikiBtn.classList.add('active');
  }

  window.scrollTo({ top: 0, left: 0, behavior: 'instant' });

  switch(page) {
    case 'home': renderHome(); break;
    case 'timeline': renderTimeline(); break;
    case 'topics': renderTopics({ highlightRank: opts.highlightRank }); break;
    case 'gallery': renderGallery(); break;
    case 'settings': renderSettings(); break;
    case 'contribute': renderContribute(); break;
    case 'doc': renderDoc(docId, originalQuery); break;
  }

  updateFloatingDock();
};

window.addEventListener('popstate', (e) => {
  let target;
  if (e.state && e.state.page) {
    target = {
      page: e.state.page,
      docId: e.state.docId || null,
      contribStep: e.state.contribStep || null
    };
  } else {
    target = hashToState(location.hash);
  }

  if (state.currentPage === 'contribute' && target.page === 'contribute') {
    const targetStep = target.contribStep || 1;

    if (contribState.submitted) {
      const returnTo = contribState.returnTo || 'gallery';
      state.currentPage = returnTo;
      state.currentDocId = null;
      try {
        history.replaceState(
          { page: returnTo, docId: null },
          '',
          stateToHash(returnTo, null)
        );
      } catch(_) {}
      navigateTo(returnTo, null, null, { fromBack: true });
      return;
    }

    if (targetStep !== contribState.step) {
      contribState.prevStep = contribState.step;
      contribState.step = targetStep;
      renderContribute();
    }
    return;
  }

  if (target.page === 'contribute' && contribState.submitted) {
    history.back();
    return;
  }

  if (state.navStack.length > 0) {
    state.navStack.pop();
  }

  const sameDest = (target.page === state.currentPage) &&
    (target.page !== 'doc' || target.docId === state.currentDocId);
  if (sameDest) return;

  navigateTo(target.page, target.docId, null, { fromBack: true });
});

function formatRelativeTime(dateStr) {
  if (!dateStr) return '';
  const target = new Date(dateStr.replace(' ', 'T'));
  if (isNaN(target.getTime())) return '';
  const diff = (Date.now() - target.getTime()) / 1000;
  if (diff < 60)         return '방금 전';
  if (diff < 3600)       return `${Math.floor(diff / 60)}분 전`;
  if (diff < 86400)      return `${Math.floor(diff / 3600)}시간 전`;
  if (diff < 604800)     return `${Math.floor(diff / 86400)}일 전`;
  if (diff < 2592000)    return `${Math.floor(diff / 604800)}주 전`;
  if (diff < 31536000)   return `${Math.floor(diff / 2592000)}개월 전`;
  return `${Math.floor(diff / 31536000)}년 전`;
}

  clearSearchDemoTimers();

  const stage = document.getElementById('searchDemoStage');
  if (!stage) return;

  (async function loop() {
    let i = 0;
    while (true) {
      if (myRunId !== __searchDemoRunId) return;
      if (!document.getElementById('searchDemoStage')) return;

      const scenario = SEARCH_DEMO_SCENARIOS[i % SEARCH_DEMO_SCENARIOS.length];
      const skipToResult = (i === 0);

      i++;

function renderTimelineArea() {
  const area = document.getElementById('timelineArea');
  if (!area) return;

  const cur = timelineState.currentCategory || 'all';

  const headHtml = `
    <div class="tl-head" role="tablist" aria-label="타임라인 카테고리">
      <h2 class="tl-title">타임라인</h2>
      <div class="tl-filters">
        ${TIMELINE_CATEGORIES.map(c => `
          <button class="tl-filter${cur === c.id ? ' is-active' : ''}"
                  role="tab"
                  aria-selected="${cur === c.id}"
                  onclick="setTimelineCategory('${c.id}')">${c.label}</button>
        `).join('')}
      </div>
    </div>`;

  const filtered = TIMELINE.filter(ev => cur === 'all' || ev.cat === cur);

  if (filtered.length === 0) {
    area.innerHTML = headHtml + '<div class="tl-empty">이 카테고리에는 아직 등록된 항목이 없어요</div>';
    return;
  }

  const sorted = filtered.slice().sort((a, b) => b.date.localeCompare(a.date));

  const byYear = {};
  const yearOrder = [];
  sorted.forEach(ev => {
    const year = ev.date.slice(0, 4);
    if (!byYear[year]) {
      byYear[year] = [];
      yearOrder.push(year);
    }
    byYear[year].push(ev);
  });

  const pulseSet = new Set();
  if (cur === 'all') {
    sorted.slice(0, 3).forEach((ev, i) => {
      pulseSet.add(`${ev.date}__${i}`);
    });
  }
  const sortedIdxMap = new Map();
  sorted.forEach((ev, i) => {
    sortedIdxMap.set(ev, i);
  });

  let bodyHtml = '<div class="tl-rail">';
  yearOrder.forEach(year => {
    bodyHtml += `<h3 class="tl-year">${year}년</h3>`;
    bodyHtml += '<div class="tl-track">';
    byYear[year].forEach(ev => {
      const sortedIdx = sortedIdxMap.get(ev);
      const pulseRank = (cur === 'all' && sortedIdx < 3) ? (sortedIdx + 1) : 0;
      bodyHtml += renderTimelineRow(ev, pulseRank);
    });
    bodyHtml += '</div>';
  });
  bodyHtml += '</div>';

  area.innerHTML = headHtml + bodyHtml;
}

function renderTimelineRow(ev, pulseRank) {
  const dateLabel = formatTimelineDate(ev.date);
  const textHtml = renderTimelineText(ev.text);
  const pulseCls = pulseRank ? ` is-pulse is-pulse-${pulseRank}` : '';
  const catBadge = ev.cat === 'system'
    ? `<span class="tl-cat cat-system">시스템</span>`
    : '';

  return `
    <div class="tl-row cat-${ev.cat}${pulseCls}">
      ${catBadge}
      <span class="tl-text">${textHtml}<span class="tl-date">${escapeHtml(dateLabel)}</span></span>
    </div>`;
}

function formatTimelineDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return `${m}월 ${d}일`;
}

function renderTimelineText(text) {
  if (!text) return '';
  const pattern = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  let result = '';
  let lastIndex = 0;
  let match;

  while ((match = pattern.exec(text)) !== null) {
    if (match.index > lastIndex) {
      result += escapeHtml(text.slice(lastIndex, match.index));
    }
    let docRef = match[1].trim();
    const label = (match[2] || docRef).trim();
    const docId = docRef.split('#')[0];
    const exists = (typeof DOCS !== 'undefined') && DOCS && DOCS[docId];

    if (exists) {
      result += `<span class="tl-wlink" data-doc-id="${escapeHtml(docId)}" onclick="navigateFromTimeline(event, '${escapeHtml(docId)}')">${escapeHtml(label)}</span>`;
    } else {
      result += `<span class="tl-wlink-dead" title="문서 없음">${escapeHtml(label)}</span>`;
    }
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    result += escapeHtml(text.slice(lastIndex));
  }
  return result;
}

window.navigateFromTimeline = function(event, docId) {
  if (event) {
    event.stopPropagation();
    event.preventDefault();
  }
  const el = event && event.currentTarget ? event.currentTarget : null;
  if (el && el.classList && !el.classList.contains('is-clicking')) {
    el.classList.add('is-clicking');
    setTimeout(() => {
      el.classList.remove('is-clicking');
      navigateTo('doc', docId);
    }, 180);
  } else {
    navigateTo('doc', docId);
  }
};

window.setTimelineCategory = function(catId) {
  if (!TIMELINE_CATEGORIES.some(c => c.id === catId)) return;
  timelineState.currentCategory = catId;
  renderTimelineArea();
  window.scrollTo({ top: 0, behavior: 'instant' });
};

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderGalleryContent() {
  const cat = state.galleryCategory || 'all';
  const filtered = cat === 'all'
    ? GALLERY.slice()
    : GALLERY.filter(item => item.category === cat);

  const totalPages = Math.max(1, Math.ceil(filtered.length / GALLERY_PAGE_SIZE));
  if (state.galleryPage > totalPages) state.galleryPage = totalPages;
  if (state.galleryPage < 1) state.galleryPage = 1;
  const startIdx = (state.galleryPage - 1) * GALLERY_PAGE_SIZE;
  const pageItems = filtered.slice(startIdx, startIdx + GALLERY_PAGE_SIZE);

  document.querySelectorAll('.gallery-tabs .tl-filter[data-cat]').forEach(btn => {
    const isActive = btn.getAttribute('data-cat') === cat;
    btn.classList.toggle('is-active', isActive);
    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });

  let feedHtml;
  if (filtered.length === 0) {
    feedHtml = `
      <div class="gallery-empty">
        <div class="gallery-empty-icon">🖼️</div>
        <div>해당 카테고리에 등록된 이미지가 아직 없어요.</div>
      </div>
    `;
  } else {
    feedHtml = pageItems.map(item => `
      <div class="gallery-card" data-author="${escapeHtml(item.user)}" data-uploaded-at="${escapeHtml(item.uploadedAt || '')}">
        <div class="gallery-card-image">
          <button class="gallery-download-btn" onclick="downloadGalleryImage('${item.id}')" aria-label="다운로드 (개인용도만 허용)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>개인용도만 허용</span>
          </button>
        </div>
        <div class="gallery-card-caption">
          <div class="gallery-card-meta">
            <span class="gallery-card-user">${escapeHtml(item.user)}</span>
            <span class="gallery-card-meta-sep">·</span>
            <span class="gallery-card-tool">${escapeHtml(item.tool)}</span>
          </div>
          <p class="gallery-card-prompt">"${escapeHtml(item.prompt)}"</p>
        </div>
      </div>
    `).join('');
  }
  const feedSlot = document.querySelector('.gallery-feed-slot');
  if (feedSlot) {
    feedSlot.innerHTML = `<div class="gallery-feed">${feedHtml}</div>`;
  }

  const paginationSlot = document.querySelector('.gallery-pagination-slot');
  if (paginationSlot) {
    paginationSlot.innerHTML = filtered.length > GALLERY_PAGE_SIZE
      ? renderGalleryPagination(state.galleryPage, totalPages)
      : '';
  }
}

function setGalleryCategory(cat) {
  if (state.galleryCategory === cat) return;
  state.galleryCategory = cat;
  state.galleryPage = 1;
  renderGalleryContent();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderGalleryPagination(current, total) {
  const maxButtons = 5;
  let start = Math.max(1, current - 2);
  let end = Math.min(total, start + maxButtons - 1);
  if (end - start < maxButtons - 1) {
    start = Math.max(1, end - maxButtons + 1);
  }

  let buttons = '';
  if (current > 1) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${current - 1})" aria-label="이전">&lsaquo;</button>`;
  }
  if (start > 1) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(1)">1</button>`;
    if (start > 2) buttons += `<span class="gallery-page-ellipsis">…</span>`;
  }
  for (let p = start; p <= end; p++) {
    const activeCls = p === current ? ' active' : '';
    buttons += `<button class="gallery-page-btn${activeCls}" onclick="goGalleryPage(${p})">${p}</button>`;
  }
  if (end < total) {
    if (end < total - 1) buttons += `<span class="gallery-page-ellipsis">…</span>`;
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${total})">${total}</button>`;
  }
  if (current < total) {
    buttons += `<button class="gallery-page-btn" onclick="goGalleryPage(${current + 1})" aria-label="다음">&rsaquo;</button>`;
  }

  return `<div class="gallery-pagination">${buttons}</div>`;
}

window.goGalleryPage = function(page) {
  state.galleryPage = page;
  renderGalleryContent();
  window.scrollTo({ top: 0, behavior: 'instant' });
};

window.downloadGalleryImage = function(id) {
  const item = GALLERY.find(g => g.id === id);
  if (!item) return;
  const src = item.imageData || item.imageUrl;
  if (!src || src === 'placeholder') {
    showToast('이미지가 아직 준비 중이에요');
    return;
  }
  const ext = src.startsWith('data:image/jpeg') ? 'jpg' : 'png';
  const a = document.createElement('a');
  a.href = src;
  a.download = item.id + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

window.toggleSettingsRow = function(key) {
  const row = document.getElementById('settingsRow-' + key);
  const exp = document.getElementById('settingsExpand-' + key);
  if (!row || !exp) return;

  const isOpen = row.classList.contains('is-open');

  document.querySelectorAll('.settings-row.is-open').forEach(function(r) {
    if (r !== row) {
      r.classList.remove('is-open');
      r.setAttribute('aria-expanded', 'false');
    }
  });
  document.querySelectorAll('.settings-expand.is-open').forEach(function(e) {
    if (e !== exp) e.classList.remove('is-open');
  });

  if (isOpen) {
    row.classList.remove('is-open');
    exp.classList.remove('is-open');
    row.setAttribute('aria-expanded', 'false');
  } else {
    row.classList.add('is-open');
    exp.classList.add('is-open');
    row.setAttribute('aria-expanded', 'true');
  }
};

window.updateSettingsRowValue = function(key, label) {
  const el = document.getElementById('settingsValue-' + key);
  if (el) el.textContent = label;
};

  { id: 'suggest',  title: '개선 아이디어가 있어요', sub: '기능·UX 제안',             placeholder: '예: 다크모드에서 본문 인용구 박스 배경색이 너무 진해서 가독성이 떨어져요.' }
];

const CONTRIB_REWARD_STYLES = [
  { id: 'realistic', title: '실사 사진' },
  { id: 'classical', title: '유럽 명화' },
  { id: 'anime',     title: '일본 애니풍' },
  { id: 'free',      title: '아무 그림체 상관없어요' }
];

const contribState = {
  step: 1,
  prevStep: 0,
  category: null,
  content: '',
  email: '',
  emailError: false,
  consentChecked: false,
  consentExpanded: false,
  displayMode: 'nick',
  nickname: '',
  rewardStyle: null,
  rewardPrompt: '',
  captchaSet: null,
  captchaInput: '',
  submitted: false,
  returnTo: null,
  originDocId: null
};

window.openContribute = function(originDocId) {
  if (state.currentPage && state.currentPage !== 'contribute') {
    contribState.returnTo = state.currentPage;
  }
  if (!contribState.returnTo) contribState.returnTo = 'gallery';

  contribState.step = 1;
  contribState.prevStep = 0;
  contribState.category = null;
  contribState.content = '';
  contribState.email = '';
  contribState.emailError = false;
  contribState.consentChecked = false;
  contribState.consentExpanded = false;
  contribState.displayMode = 'nick';
  contribState.nickname = '';
  contribState.rewardStyle = null;
  contribState.rewardPrompt = '';
  contribState.captchaSet = generateCaptcha();
  contribState.captchaInput = '';
  contribState.submitted = false;
  contribState.originDocId = (originDocId && DOCS[originDocId]) ? originDocId : null;
  navigateTo('contribute');
};

function generateCaptcha() {
  const pool = 'abcdefghjkmnpqrstuvwxyz23456789';
  const chars = [];
  for (let i = 0; i < 6; i++) {
    chars.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  const indices = [];
  while (indices.length < 3) {
    const r = Math.floor(Math.random() * 6);
    if (!indices.includes(r)) indices.push(r);
  }
  indices.sort((a, b) => a - b);
  return { chars, picks: indices };
}

function getCaptchaExpected() {
  if (!contribState.captchaSet) return '';
  return contribState.captchaSet.picks
    .map(i => contribState.captchaSet.chars[i])
    .join('');
}

let _contribSliding = false;

window.contribGoTo = function(step, opts = {}) {
  if (_contribSliding) return;

  const prevStep = contribState.step;
  contribState.prevStep = prevStep;
  contribState.step = step;

  if (!opts.fromBack) {
    const newHash = stateToHashContrib(step);
    try {
      history.pushState(
        { page: 'contribute', docId: null, contribStep: step },
        '',
        newHash
      );
    } catch(e) {
      try { location.hash = newHash; } catch(_) {}
    }
  }

  const shouldSlide = (
    !opts.fromBack &&
    prevStep > 0 &&
    step > prevStep
  );

  if (shouldSlide && _canSlide()) {
    _slideToNextStep(step);
  } else {
    renderContribute();
  }
};

function _canSlide() {
  try {
    return !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  } catch(_) {
    return true;
  }
}

function _slideToNextStep(targetStep) {
  const page = document.querySelector('.contrib-page');
  const oldCard = page ? page.querySelector('.contrib-card') : null;
  if (!page || !oldCard) {
    renderContribute();
    return;
  }

  _contribSliding = true;

  let inner;
  switch (targetStep) {
    case 1: inner = renderContribStep1(); break;
    case 2: inner = renderContribStep2(); break;
    case 3: inner = renderContribStep3(); break;
    case 4: inner = renderContribStep4(); break;
    case 5: inner = renderContribStep5(); break;
    default: inner = renderContribStep1();
  }
  const newCardHtml = `<div class="contrib-card slide-enter">${renderContribHeader()}${inner}</div>`;

  page.classList.add('is-sliding');
  oldCard.classList.add('slide-exit');
  oldCard.insertAdjacentHTML('afterend', newCardHtml);
  const newCard = page.querySelector('.contrib-card.slide-enter');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (newCard) newCard.classList.add('slide-enter-active');
      oldCard.classList.add('slide-exit-active');
    });
  });

  setTimeout(() => {
    if (oldCard && oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
    if (newCard) {
      newCard.classList.remove('slide-enter', 'slide-enter-active');
    }
    page.classList.remove('is-sliding');
    _contribSliding = false;

    window.scrollTo({ top: 0, left: 0, behavior: 'instant' });

    if (contribState.step === 5 && contribState.captchaInput) {
      const inp = document.getElementById('contribCaptchaInput');
      if (inp) contribOnCaptchaInput({ target: inp });
    }
  }, 240);
}

window.contribExitToReturn = function(dest) {
  const returnTo = dest || contribState.returnTo || 'gallery';
  closeContribDoneModal();
  navigateTo(returnTo, null, null, { fromTab: true });
};

function escapeHtmlContrib(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/\n/g, '<br>');
}

window.contribSelectCategory = function(catId) {
  const cat = CONTRIB_CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  contribState.category = cat;
  setTimeout(() => contribGoTo(2), 120);
};

window.contribOnContentInput = function(e) {
  const v = e.target.value.slice(0, 300);
  if (v !== e.target.value) e.target.value = v;
  contribState.content = v;
  const cnt = document.getElementById('contribContentCount');
  if (cnt) {
    cnt.textContent = `${v.length} / 300`;
    cnt.classList.toggle('over', v.length >= 300);
  }
  contribUpdateStep2NextBtn();
};
window.contribGoNext2 = function() {
  if (contribState.content.trim().length < 10) return;
  if (!contribState.consentChecked) return;
  if (!contribIsStep2EmailOk()) {
    contribState.emailError = true;
    const inp = document.getElementById('contribEmailInput');
    if (inp) {
      inp.classList.add('has-error');
      inp.focus();
    }
    return;
  }
  contribGoTo(3);
};

function isValidContribEmail(s) {
  if (typeof s !== 'string') return false;
  const v = s.trim();
  if (!v) return false;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

function contribIsStep2EmailOk() {
  const cat = contribState.category;
  if (!cat || !cat.collectsEmail) return true;
  const v = (contribState.email || '').trim();
  if (!v) return true;
  return isValidContribEmail(v);
}

function contribUpdateStep2NextBtn() {
  const btn = document.getElementById('contribContentNext');
  if (!btn) return;
  const contentOk = contribState.content.trim().length >= 10;
  const consentOk = contribState.consentChecked === true;
  const emailOk = contribIsStep2EmailOk();
  btn.disabled = !(contentOk && consentOk && emailOk);
}

window.contribOnEmailInput = function(e) {
  contribState.email = e.target.value;
  if (contribState.emailError) {
    contribState.emailError = false;
    e.target.classList.remove('has-error');
  }
  contribUpdateStep2NextBtn();
};

window.contribOnEmailBlur = function(e) {
  const v = (e.target.value || '').trim();
  if (!v) {
    contribState.emailError = false;
    e.target.classList.remove('has-error');
  } else if (isValidContribEmail(v)) {
    contribState.emailError = false;
    e.target.classList.remove('has-error');
  } else {
    contribState.emailError = true;
    e.target.classList.add('has-error');
  }
  contribUpdateStep2NextBtn();
};

window.contribToggleConsent = function(e) {
  if (e && e.target && e.target.closest && e.target.closest('.contrib-consent-toggle')) return;
  contribState.consentChecked = !contribState.consentChecked;
  const block = document.getElementById('contribConsentBlock');
  const row   = document.getElementById('contribConsentRow');
  if (block) block.classList.toggle('is-checked', contribState.consentChecked);
  if (row)   row.setAttribute('aria-checked', contribState.consentChecked ? 'true' : 'false');
  contribUpdateStep2NextBtn();
};

window.contribToggleConsentDetail = function(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  contribState.consentExpanded = !contribState.consentExpanded;
  const block = document.getElementById('contribConsentBlock');
  if (block) block.classList.toggle('is-expanded', contribState.consentExpanded);
  const toggle = block && block.querySelector('.contrib-consent-toggle');
  if (toggle) toggle.setAttribute('aria-expanded', contribState.consentExpanded ? 'true' : 'false');
};

window.contribSelectDisplay = function(mode) {
  contribState.displayMode = mode;
  document.querySelectorAll('[data-display-mode]').forEach(el => {
    const isActive = el.dataset.displayMode === mode;
    el.classList.toggle('dim', !isActive);
    const radio = el.querySelector('.contrib-radio');
    if (radio) radio.classList.toggle('checked', isActive);
  });
  if (mode === 'nick') {
    setTimeout(() => {
      const inp = document.getElementById('contribNickInput');
      if (inp) inp.focus();
    }, 50);
  }
  updateContribDisplayNextBtn();
};

window.contribOnNickInput = function(e) {
  _updateNickVisualState(e.target, !e.isComposing);
};

window.contribOnNickCompositionEnd = function(e) {
  _updateNickVisualState(e.target, true);
};

function _updateNickVisualState(input, allowMutate) {
  if (!input) return;
  let raw = input.value;

  if (allowMutate && raw.length > 20) {
    raw = raw.slice(0, 20);
    input.value = raw;
  }

  const hasInvalid = raw.length > 0 && !/^[a-zA-Z]*$/.test(raw);

  if (hasInvalid) {
    contribState.nickname = '';
    _setNickError(input, true);
  } else {
    let valid = raw;
    if (allowMutate && valid.length > 10) {
      valid = valid.slice(0, 10);
      input.value = valid;
    }
    contribState.nickname = valid;
    _setNickError(input, false);

    if (valid.length > 0 && contribState.displayMode !== 'nick') {
      contribSelectDisplay('nick');
    }
  }

  updateContribDisplayNextBtn();
}

function _setNickError(input, isError) {
  if (!input) return;
  input.classList.toggle('has-error', isError);
  const hint = document.getElementById('contribNickHint');
  if (!hint) return;
  const textEl = hint.querySelector('.contrib-hint-text');
  if (isError) {
    hint.classList.add('is-error');
    if (textEl) textEl.textContent = '한글은 입력할 수 없어요';
  } else {
    hint.classList.remove('is-error');
    if (textEl) textEl.textContent = '영문 2~10자, 등록 후 수정 불가';
  }
}

function updateContribDisplayNextBtn() {
  const btn = document.getElementById('contribDisplayNext');
  if (!btn) return;
  let ok = false;
  if (contribState.displayMode === 'anon') ok = true;
  else if (contribState.displayMode === 'nick' && contribState.nickname.length >= 2) ok = true;
  btn.disabled = !ok;
}

window.contribSelectRewardStyle = function(styleId) {
  contribState.rewardStyle = styleId;
  document.querySelectorAll('[data-style]').forEach(el => {
    const isActive = el.dataset.style === styleId;
    el.classList.toggle('dim', !isActive);
    const radio = el.querySelector('.contrib-radio');
    if (radio) radio.classList.toggle('checked', isActive);
  });
};

window.contribOnRewardInput = function(e) {
  const v = e.target.value.slice(0, 300);
  if (v !== e.target.value) e.target.value = v;
  contribState.rewardPrompt = v;
  const cnt = document.getElementById('contribRewardCount');
  if (cnt) {
    cnt.textContent = `${v.length} / 300`;
    cnt.classList.toggle('over', v.length >= 300);
  }
};

window.contribOnCaptchaInput = function(e) {
  const v = e.target.value.slice(0, 3).toLowerCase();
  if (v !== e.target.value) e.target.value = v;
  contribState.captchaInput = v;

  const expected = getCaptchaExpected();
  const inp = document.getElementById('contribCaptchaInput');
  const fb = document.getElementById('contribCaptchaFeedback');

  if (inp) {
    inp.classList.remove('error', 'success');
    if (v.length === 3) {
      inp.classList.add(v === expected ? 'success' : 'error');
    }
  }

  if (fb) {
    fb.classList.remove('success', 'error');
    fb.innerHTML = '';
    if (v.length === 3) {
      if (v === expected) {
        fb.classList.add('success');
        fb.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span class="text">코드 입력 성공!</span>';
      } else {
        fb.classList.add('error');
        fb.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="text">코드가 일치하지 않아요</span>';
      }
    }
  }

  updateContribSubmitState();
};

function updateContribSubmitState() {
  const btn = document.getElementById('contribSubmitBtn');
  if (!btn) return;
  btn.disabled = (contribState.captchaInput !== getCaptchaExpected());
}

window.contribSubmit = function() {
  if (contribState.captchaInput !== getCaptchaExpected()) return;

  contribState.submitted = true;
  openContribDoneModal();
};

function openContribDoneModal() {
  const modal = document.getElementById('contribDoneModal');
  if (!modal) return;

  const subEl = document.getElementById('contribDoneSubtitle');
  if (subEl) {
    const displayLabel = contribState.displayMode === 'nick' && contribState.nickname
      ? `@${escapeHtmlContrib(contribState.nickname)}`
      : '익명 기여자';
    subEl.innerHTML = `${displayLabel}님의 기여 · 잠시 후 검토 시작`;
  }

  modal.setAttribute('aria-hidden', 'false');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeContribDoneModal() {
  const modal = document.getElementById('contribDoneModal');
  if (!modal) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function renderContribHeader() {
  const cur = contribState.step;
  const segs = [1,2,3,4,5].map(n =>
    `<div class="contrib-progress-seg${n <= cur ? ' done' : ''}"></div>`
  ).join('');
  return `
    <div class="contrib-header">
      <div class="contrib-step-label">
        <span class="contrib-step-num">${cur}단계</span>
        <span class="contrib-step-total">5단계 중</span>
      </div>
      <div class="contrib-progress" role="progressbar" aria-valuemin="1" aria-valuemax="5" aria-valuenow="${cur}">
        ${segs}
      </div>
    </div>
  `;
}

const CHEV_RIGHT = '<svg class="contrib-list-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

function contribContextChipHtml() {
  const originDoc = contribState.originDocId ? DOCS[contribState.originDocId] : null;
  const inner = originDoc
    ? `<span class="contrib-doc-context-doc">${escapeHtmlContrib(originDoc.title)}</span> <span class="contrib-doc-context-sep">·</span> 문서에 기여 중`
    : `<span class="contrib-doc-context-doc">호미위키</span>에 기여 중`;
  const aria = originDoc ? '기여 대상 문서' : '기여 사이클 진행 중';
  return `
    <div class="contrib-doc-context" role="note" aria-label="${aria}">
      <span class="contrib-doc-context-dot" aria-hidden="true"></span>
      <span>${inner}</span>
    </div>
  `;
}

function renderContribStep1() {
  const originDoc = contribState.originDocId ? DOCS[contribState.originDocId] : null;

  const visibleCategories = originDoc
    ? CONTRIB_CATEGORIES.filter(c => c.id !== 'create')
    : CONTRIB_CATEGORIES;

  const rows = visibleCategories.map(c => `
    <button type="button" class="contrib-list-row" onclick="contribSelectCategory('${c.id}')">
      <div class="contrib-list-main">
        <div class="contrib-list-title">${escapeHtmlContrib(c.title)}</div>
        <div class="contrib-list-sub">${escapeHtmlContrib(c.sub)}</div>
      </div>
      ${CHEV_RIGHT}
    </button>
  `).join('');

  const titleText = originDoc ? '어떤 종류의 기여인가요?' : '기여 카테고리 선택';

  return `
    ${contribContextChipHtml()}
    <h3 class="contrib-title">${titleText}</h3>
    <div class="contrib-list">${rows}</div>
  `;
}

function renderContribStep2() {
  const cat = contribState.category;
  const len = contribState.content.length;
  const overClass = len >= 300 ? ' over' : '';
  const contentOk = contribState.content.trim().length >= 10;
  const consentOk = contribState.consentChecked === true;

  const collectsEmail = !!(cat && cat.collectsEmail);
  const emailRaw = collectsEmail ? (contribState.email || '') : '';
  const emailValidOrEmpty = !emailRaw.trim() || isValidContribEmail(emailRaw);
  const emailErrorClass = (collectsEmail && contribState.emailError) ? ' has-error' : '';

  const nextDisabled = (contentOk && consentOk && emailValidOrEmpty) ? '' : 'disabled';
  const title = (cat && cat.title) ? cat.title : '내용 작성';

  const originDoc = contribState.originDocId ? DOCS[contribState.originDocId] : null;
  let ph = (cat && cat.placeholder) ? cat.placeholder : '';
  if (originDoc && cat) {
    const docTitle = originDoc.title;
    switch (cat.id) {
      case 'edit':
        ph = `예: ${docTitle} 문서의 "역사" 섹션에 최신 내용을 추가하면 좋을 것 같아요...`;
        break;
      case 'bug':
        ph = `예: ${docTitle} 문서 3번째 문단에 "2025년"이 "2024년"으로 잘못 적혀있어요.`;
        break;
      case 'news':
        ph = `예: ${docTitle} 관련해서 최근 새로운 소식이 있어요. ...`;
        break;
      case 'suggest':
        ph = `예: ${docTitle} 문서에 비교표 섹션이 있으면 좋겠어요.`;
        break;
    }
  }

  const notesHtml = (cat && Array.isArray(cat.notes) && cat.notes.length > 0)
    ? `<ul class="contrib-notes">${cat.notes.map(n => `<li>${escapeHtmlContrib(n)}</li>`).join('')}</ul>`
    : '';

  const contextChipHtml = contribContextChipHtml();

  const emailFieldHtml = collectsEmail ? `
    <div class="contrib-email-wrap">
      <label class="contrib-email-label" for="contribEmailInput">
        회신용 이메일 <span class="contrib-email-optional">(선택)</span>
      </label>
      <input
        type="email"
        id="contribEmailInput"
        class="contrib-input${emailErrorClass}"
        placeholder="name@example.com"
        value="${escapeHtmlContrib(emailRaw)}"
        autocomplete="email"
        inputmode="email"
        oninput="contribOnEmailInput(event)"
        onblur="contribOnEmailBlur(event)"
      />
    </div>
  ` : '';

  const checkedClass = consentOk ? ' is-checked' : '';
  const expandedClass = contribState.consentExpanded ? ' is-expanded' : '';

  return `
    ${contextChipHtml}
    <h3 class="contrib-title">${escapeHtmlContrib(title)}</h3>
    ${notesHtml}

    <div class="contrib-textarea-wrap">
      <textarea
        class="contrib-textarea large"
        placeholder="${escapeHtmlContrib(ph)}"
        oninput="contribOnContentInput(event)"
        maxlength="300"
      >${escapeHtmlContrib(contribState.content).replace(/<br>/g, '\n')}</textarea>
      <div class="contrib-charcount${overClass}" id="contribContentCount">${len} / 300</div>
    </div>

    ${emailFieldHtml}
    <div class="contrib-consent${checkedClass}${expandedClass}" id="contribConsentBlock">
      <div class="contrib-consent-row" id="contribConsentRow" role="checkbox" tabindex="0"
           aria-checked="${consentOk}"
           onclick="contribToggleConsent(event)"
           onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();contribToggleConsent(event);}">
        <span class="contrib-consent-box" aria-hidden="true">
          <svg class="contrib-consent-check" width="12" height="12" viewBox="0 0 12 12">
            <path d="M2 6 L5 9 L10 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </span>
        <span class="contrib-consent-text">
          <span class="contrib-consent-required">[필수]</span>
          제출 내용 처리를 위한 사항에 동의합니다
        </span>
        <button type="button" class="contrib-consent-toggle" onclick="contribToggleConsentDetail(event)"
                aria-expanded="${contribState.consentExpanded}">
          자세히
          <svg class="contrib-consent-caret" width="10" height="10" viewBox="0 0 10 10">
            <path d="M2 4 L5 7 L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </button>
      </div>

      <div class="contrib-consent-detail" id="contribConsentDetail">
        <div class="contrib-consent-detail-inner">
          <div class="contrib-consent-section-title">[ 콘텐츠 활용 ]</div>
          <div class="contrib-consent-item">
            <span class="contrib-consent-bullet">·</span>
            <span><span class="contrib-consent-strong">활용 범위</span> — 편집팀이 보내주신 내용을 검토·정제한 뒤 위키 문서에 반영하거나 운영에 활용합니다.</span>
          </div>
          <div class="contrib-consent-item">
            <span class="contrib-consent-bullet">·</span>
            <span><span class="contrib-consent-strong">사실 확인</span> — 제출하신 내용은 사실에 기반하며, 허위·비방 목적이 아닙니다.</span>
          </div>

window.copyDocUrl = function(btn) {
  const url = window.location.href;
  const textEl = btn.querySelector('.doc-copy-url-btn-text');
  if (!textEl) return;

  const originalText = textEl.textContent;

  const showCopied = () => {
    textEl.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      textEl.textContent = originalText;
      btn.classList.remove('copied');
    }, 1500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(showCopied).catch(() => {
      fallbackCopy(url, showCopied);
    });
  } else {
    fallbackCopy(url, showCopied);
  }
};

function fallbackCopy(text, onSuccess) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.top = '-1000px';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (err) {
    showToast('복사에 실패했어요. 주소창에서 직접 복사해주세요', { duration: 2800 });
  }
  document.body.removeChild(textarea);
}

    navigator.clipboard.writeText(url).then(showCopied).catch(() => {
      fallbackCopy(url, showCopied);
    });
  } else {
    fallbackCopy(url, showCopied);
  }
};

window.showContributorsPopup = function(docId) {
  const doc = DOCS[docId];
  if (!doc) return;

  const list = (doc.contributors || []).slice()
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const MAX = 10;
  const visible = list.slice(0, MAX);
  const moreCount = list.length - visible.length;

  let bodyHtml = '';
  if (visible.length === 0) {
    bodyHtml = `<div class="contrib-popup-empty">아직 기여 이력이 없어요.</div>`;
  } else {
    bodyHtml = visible.map(c => {
      const dateShort = formatContribDate(c.date);
      return `
        <div class="contrib-popup-item">
          <span class="contrib-popup-nick">${escapeHtmlContrib(c.nick)}</span>
          <span class="contrib-popup-role">${escapeHtmlContrib(c.role)}${dateShort ? ' · ' + dateShort : ''}</span>
        </div>
      `;
    }).join('');
    if (moreCount > 0) {
      bodyHtml += `<div class="contrib-popup-more">외 ${moreCount}명</div>`;
    }
  }

  let modal = document.getElementById('contribPopupModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'contribPopupModal';
    modal.className = 'contrib-popup-modal';
    modal.innerHTML = `
      <div class="contrib-popup-backdrop" onclick="hideContributorsPopup()"></div>
      <div class="contrib-popup-box" role="dialog" aria-modal="true" aria-labelledby="contribPopupTitle">
        <div class="contrib-popup-header">
          <h3 id="contribPopupTitle" class="contrib-popup-title">문서에 도움주신 분들</h3>
          <button class="contrib-popup-close" onclick="hideContributorsPopup()" aria-label="닫기">×</button>
        </div>
        <div class="contrib-popup-body" id="contribPopupBody"></div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  modal.querySelector('#contribPopupBody').innerHTML = bodyHtml;
  modal.classList.add('is-show');
};

window.hideContributorsPopup = function() {
  const modal = document.getElementById('contribPopupModal');
  if (modal) modal.classList.remove('is-show');
};

function formatContribDate(dateStr) {
  if (!dateStr) return '';
  const m = dateStr.match(/^\d{4}-(\d{2})-(\d{2})/);
  if (!m) return dateStr;
  return `${parseInt(m[1], 10)}.${parseInt(m[2], 10)}`;
}

function renderDoc(docId, originalQuery = null) {
  const doc = DOCS[docId];
  if (!doc) {
    renderNotFound(docId);
    return;
  }

  const content = document.getElementById('pageContent');

  const isSponsored = doc.type === 'sponsored';
  const adBadgeHtml = isSponsored
    ? `<span class="doc-ad-badge" aria-label="광고 문서">AD</span>`
    : '';
  const adNoticeHtml = isSponsored
    ? (() => {
        const sp = doc.sponsorship || {};
        const advertiser = sp.advertiser ? escapeHtmlContrib(sp.advertiser) : '광고주';
        return `<div class="doc-ad-notice" role="note" aria-label="광고 문서 안내">이 페이지는 <strong>${advertiser}</strong>이(가) 비용을 지불하고 게재한 광고 문서입니다. 위키 운영진은 내용의 사실 여부를 검증하지 않습니다.</div>`;
      })()
    : '';

  let redirectHtml = '';
  if (originalQuery && normalizeSearch(originalQuery) !== normalizeSearch(doc.title)) {
    redirectHtml = `
      <div class="redirect-notice">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 10 4 15 9 20"/>
          <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
        </svg>
        <span><strong>"${originalQuery}"</strong>에서 자동 연결됨</span>
      </div>
    `;
  }

  content.innerHTML = `
    ${redirectHtml}

    <h1 class="doc-title"><span>${doc.title}</span>${adBadgeHtml}</h1>
    ${doc.subtitle ? `<div style="color:var(--text-tertiary);font-size:calc(12.5px * var(--font-scale));margin-bottom:4px">${doc.subtitle}</div>` : ''}
    <div class="doc-meta">
      <span class="doc-meta-info">최근 수정 시각: ${doc.updated}</span>
      <button class="doc-copy-url-btn" onclick="copyDocUrl(this)" aria-label="이 문서의 URL 링크 복사">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="doc-copy-url-btn-text">URL 링크 복사하기</span>
      </button>
    </div>

    <div class="doc-categories">
      <strong>분류:</strong>
      ${doc.categories.map(cat =>
        cat.id ? `<span class="cat-link wiki-link" data-link="${cat.id}">${cat.text}</span>` : `<span>${cat.text}</span>`
      ).join(' · ')}
    </div>

    ${doc.infobox ? renderInfobox(doc.infobox) : ''}

    ${adNoticeHtml}

    ${doc.content}

    ${doc.related && doc.related.length > 0 ? (() => {
      let relNum = '';
      if (doc.toc && doc.toc.length) {
        const l1Nums = doc.toc.filter(it => it.level === 1)
                              .map(it => parseInt(it.num, 10))
                              .filter(n => !isNaN(n));
        if (l1Nums.length) relNum = String(Math.max(...l1Nums) + 1);
      }
      const itemsHtml = doc.related.map(item => {
        const id = typeof item === 'string' ? item : item.id;
        const desc = typeof item === 'string' ? '' : (item.desc || '');
        if (!DOCS[id]) return '';
        return `<li><span class="wiki-link" data-link="${id}">${DOCS[id].title}</span>${desc ? ` — ${desc}` : ''}</li>`;
      }).join('');
      return `
        <div class="section" id="s-related">
          <h2 class="section-title h2">${relNum ? `<span class="num">${relNum}.</span> ` : ''}관련 문서</h2>
          <ul>${itemsHtml}</ul>
        </div>
      `;
    })() : ''}

    ${!isSponsored ? `
      <div class="doc-actions" role="group" aria-label="문서 액션">
        <button class="doc-action-btn" onclick="openContributeForDoc('${docId}')" aria-label="이 문서에 기여하기">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <span>이 문서에<br>기여하기</span>
        </button>
        <button class="doc-action-btn" onclick="shareDoc('${docId}')" aria-label="문서 공유하기">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          <span>문서<br>공유하기</span>
        </button>
        <button class="doc-action-btn" onclick="showContributorsPopup('${docId}')" aria-label="문서에 도움주신 분들 보기">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>문서에 도움<br>주신 분들</span>
        </button>
      </div>
    ` : ''}
  `;

  bindWikiLinks();
}

window.navigateWithFeedback = function(el, page, docId, delayMs, originalText) {
  if (!el || el.classList.contains('is-clicking')) return;
  if (typeof delayMs !== 'number') delayMs = 150;
  el.classList.add('is-clicking');
  setTimeout(() => {
    el.classList.remove('is-clicking');
    navigateTo(page, docId || null, originalText || null);
  }, delayMs);
};

function bindWikiLinks() {
  document.querySelectorAll('.wiki-link').forEach(link => {
    const targetId = link.dataset.link;
    const originalText = link.textContent.trim();
    if (!targetId) return;

    if (!DOCS[targetId]) {
      link.classList.add('redlink');
      link.title = '아직 작성되지 않은 문서';
    }

    link.addEventListener('click', (e) => {
      e.preventDefault();
      if (link.classList.contains('is-clicking')) return;
      link.classList.add('is-clicking');

      setTimeout(() => {
        link.classList.remove('is-clicking');
        if (DOCS[targetId]) {
          const isRedirected = normalizeSearch(originalText) !== normalizeSearch(DOCS[targetId].title);
          navigateTo('doc', targetId, isRedirected ? originalText : null);
        } else {
          renderNotFound(originalText);
        }
      }, 180);
    });
  });
}

function renderNotFound(query) {
  const content = document.getElementById('pageContent');

  const suggestions = getSuggestions(query).slice(0, 4);

  content.innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">문서를 찾을 수 없어요</div>
      <div class="not-found-desc">
        <strong>"${query}"</strong>에 해당하는 문서가 아직 없습니다.<br>
        다른 검색어로 시도해보세요.
      </div>

      ${suggestions.length > 0 ? `
        <div style="margin-top:24px;text-align:left">
          <h4 style="font-size:calc(13px * var(--font-scale));color:var(--text-secondary);margin-bottom:10px;font-weight:600">💡 이런 문서는 어때요?</h4>
          ${suggestions.map(id => `
            <div class="list-item" onclick="navigateTo('doc','${id}')">
              <div class="list-item-content" style="padding-left:4px">
                <div class="list-item-title">${DOCS[id].title}</div>
                <div class="list-item-desc">${DOCS[id].subtitle || ''}</div>
              </div>
              <svg class="list-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <button class="btn-primary" style="margin-top:20px" onclick="navigateTo('home')">홈으로 돌아가기</button>
    </div>
  `;
}

const PAGES_WITH_DOCK = ['doc', 'gallery'];

function updateFloatingDock() {
  const dock = document.getElementById('floatingDock');
  const tocBtn = document.getElementById('dockTocBtn');
  const topBtn = document.getElementById('dockTopBtn');
  const followBtn = document.getElementById('dockFollowBtn');

  if (!PAGES_WITH_DOCK.includes(state.currentPage)) {
    dock.style.display = 'none';
    return;
  }
  dock.style.display = 'flex';

  tocBtn.classList.remove('disabled', 'inactive');
  topBtn.classList.remove('disabled', 'inactive');
  followBtn.classList.remove('disabled', 'inactive');

  if (state.currentPage === 'doc') {
    const doc = DOCS[state.currentDocId];

    const l1Count = doc && doc.toc ? doc.toc.filter(it => it.level === 1).length : 0;
    const hasRelated = !!(doc && doc.related && doc.related.length > 0);
    const effectiveTocCount = l1Count + (hasRelated ? 1 : 0);
    if (!doc || effectiveTocCount <= 1) {
      tocBtn.classList.add('disabled');
    }

    if (!doc || !doc.related || doc.related.length === 0) {
      followBtn.classList.add('disabled');
    }
  } else if (state.currentPage === 'gallery') {
    const target = EDITOR_CONFIG.fallbackFollowTarget;
    if (!target || !DOCS[target]) {
      followBtn.classList.add('disabled');
    }
  }
}

window.scrollToTop = function() {
  if (state.openPanel) closeAllDockPopups();
  window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
};

function getFirstValidRelated(doc) {
  if (!doc || !doc.related || doc.related.length === 0) return null;
  const related = doc.related.filter(r => DOCS[r.id]);
  if (related.length === 0) return null;
  return related[0];
}

window.toggleDockPopup = function(type) {
  if (state.openPanel === type) {
    closeAllDockPopups();
    return;
  }
  closeAllDockPopups();

  if (type === 'toc') {
    renderTocPopup();
    document.getElementById('tocPopup').classList.add('open');
    document.getElementById('dockTocBtn').classList.add('active');
  } else if (type === 'follow') {
    renderFollowPopup();
    document.getElementById('followPopup').classList.add('open');
    document.getElementById('dockFollowBtn').classList.add('active');
  }
  state.openPanel = type;

  positionDockPopup();
};

function positionDockPopup() {
  if (!state.openPanel) return;
  const dock = document.getElementById('floatingDock');
  if (!dock) return;

  const popupId = state.openPanel === 'toc' ? 'tocPopup'
                : state.openPanel === 'follow' ? 'followPopup'
                : null;
  const triggerBtnId = state.openPanel === 'toc' ? 'dockTocBtn'
                     : state.openPanel === 'follow' ? 'dockFollowBtn'
                     : null;
  if (!popupId || !triggerBtnId) return;
  const popup = document.getElementById(popupId);
  const btn = document.getElementById(triggerBtnId);
  if (!popup || !btn) return;

  const dockRect = dock.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  const rightFromViewport = window.innerWidth - dockRect.left + 8;
  popup.style.right = rightFromViewport + 'px';

  const safety = 16;
  const spaceAbove = btnRect.bottom - safety;
  const spaceBelow = window.innerHeight - btnRect.top - safety;

  const isToc = (state.openPanel === 'toc');
  const cap = isToc ? 280 : Infinity;

  if (spaceBelow >= spaceAbove) {
    popup.style.top = btnRect.top + 'px';
    popup.style.bottom = 'auto';
    popup.style.maxHeight = Math.min(cap, Math.max(120, spaceBelow)) + 'px';
  } else {
    const bottomFromViewport = window.innerHeight - btnRect.bottom;
    popup.style.bottom = bottomFromViewport + 'px';
    popup.style.top = 'auto';
    popup.style.maxHeight = Math.min(cap, Math.max(120, spaceAbove)) + 'px';
  }
}

window.addEventListener('resize', positionDockPopup);
window.addEventListener('orientationchange', positionDockPopup);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', positionDockPopup);
  window.visualViewport.addEventListener('scroll', positionDockPopup);
}

function closeAllDockPopups() {
  const tocPop = document.getElementById('tocPopup');
  const followPop = document.getElementById('followPopup');
  if (tocPop) tocPop.classList.remove('open');
  if (followPop) followPop.classList.remove('open');
  const tocBtn = document.getElementById('dockTocBtn');
  const followBtn = document.getElementById('dockFollowBtn');
  if (tocBtn) tocBtn.classList.remove('active');
  if (followBtn) followBtn.classList.remove('active');
  state.openPanel = null;
}

window.goContribute = function() {
  closeAllDockPopups();
  if (typeof openContribute === 'function') {
    openContribute();
  }
};

function renderTocPopup() {
  const container = document.getElementById('tocPopupList');
  const popup = document.getElementById('tocPopup');

  if (state.currentPage === 'gallery') {
    popup.classList.remove('empty-state');

    const filtered = (state.galleryCategory === 'all')
      ? GALLERY
      : GALLERY.filter(g => g.category === state.galleryCategory);
    const totalPages = Math.max(1, Math.ceil(filtered.length / GALLERY_PAGE_SIZE));

    if (totalPages <= 1) {
      popup.classList.add('empty-state');
      container.innerHTML = `
        <div class="toc-empty-notice">페이지 1개</div>
        <div class="toc-empty-notice-sub">아직 한 페이지로 충분해요</div>
      `;
      return;
    }

    let html = '';
    for (let p = 1; p <= totalPages; p++) {
      const isActive = (p === state.galleryPage);
      html += `
        <div class="toc-l1${isActive ? ' is-active' : ''}">
          <a onclick="tocJumpGalleryPage(${p})">${p}페이지</a>
        </div>
      `;
    }
    container.innerHTML = html;

    requestAnimationFrame(() => {
      const active = container.querySelector('.toc-l1.is-active');
      if (active) active.scrollIntoView({ block: 'center', behavior: 'instant' });
    });
    return;
  }

  if (state.currentPage !== 'doc') {
    popup.classList.add('empty-state');
    const targetId = EDITOR_CONFIG.fallbackFollowTarget;
    const targetDoc = DOCS[targetId];
    if (!targetDoc) {
      container.innerHTML = `
        <div class="toc-empty-notice">목차 없음</div>
        <div class="toc-empty-notice-sub">이 페이지엔 목차가 없어요</div>
      `;
      return;
    }
    container.innerHTML = `
      <div class="follow-popup-clickable" onclick="followGo('${targetId}')" role="link" tabindex="0"
           aria-label="${targetDoc.title} 문서로 이동"
           onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();followGo('${targetId}')}">
        <div class="toc-empty-notice">목차 없음</div>
        <div class="toc-empty-notice-sub">목차가 있는 문서로 이동합니다</div>
        <div class="toc-empty-divider"></div>
        <div class="toc-empty-link">
          <a><span>${targetDoc.title}</span></a>
        </div>
      </div>
    `;
    return;
  }

  popup.classList.remove('empty-state');
  const doc = DOCS[state.currentDocId];
  if (!doc || !doc.toc) { container.innerHTML = ''; return; }
  const l1Items = doc.toc.filter(item => item.level === 1);
  const tocItems = [...l1Items];
  if (doc.related && doc.related.length > 0) {
    const maxNum = l1Items.length
      ? Math.max(...l1Items.map(it => parseInt(it.num, 10)).filter(n => !isNaN(n)))
      : 0;
    tocItems.push({
      num: maxNum > 0 ? String(maxNum + 1) : '',
      text: '관련 문서',
      id: 's-related',
      level: 1
    });
  }
  if (tocItems.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = tocItems.map(item => `
    <div class="toc-l1">
      <a onclick="tocJump('${item.id}')">
        ${item.num ? `<span class="toc-num">${item.num}.</span>` : ''}${item.text}
      </a>
    </div>
  `).join('');
}

window.tocJumpGalleryPage = function(page) {
  goGalleryPage(page);
  closeAllDockPopups();
};

window.tocJump = function(sectionId) {
  const el = document.getElementById(sectionId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  closeAllDockPopups();
};

function renderFollowPopup() {
  const container = document.getElementById('followPopupContent');

  const renderList = (targetId, targetTitle, subText) => `
    <div class="follow-popup-clickable" onclick="followGo('${targetId}')" role="link" tabindex="0"
         aria-label="${targetTitle} 문서로 이동"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();followGo('${targetId}')}">
      <div class="follow-popup-notice">다른 사용자들이 이 다음에 본 문서</div>
      <div class="follow-popup-divider"></div>
      <div class="follow-popup-link">
        <a><span>${targetTitle}</span></a>
      </div>
      ${subText ? `<div class="follow-popup-sub">${subText}</div>` : ''}
    </div>
  `;

  if (state.currentPage !== 'doc') {
    const targetId = EDITOR_CONFIG.fallbackFollowTarget;
    const targetDoc = DOCS[targetId];
    if (!targetDoc) {
      container.innerHTML = '<div class="follow-popup-empty">추천 문서를 불러올 수 없습니다.</div>';
      return;
    }
    container.innerHTML = renderList(targetId, targetDoc.title, targetDoc.subtitle || '');
    return;
  }

  const doc = DOCS[state.currentDocId];
  const next = getFirstValidRelated(doc);
  if (!next) {
    container.innerHTML = '<div class="follow-popup-empty">연관 문서가 없습니다.</div>';
    return;
  }
  const nextDoc = DOCS[next.id];
  container.innerHTML = renderList(next.id, nextDoc.title, next.desc || '');
}

window.followGo = function(docId) {
  closeAllDockPopups();
  navigateTo('doc', docId);
};

document.addEventListener('click', (e) => {
  if (state.openPanel === null) return;
  if (e.target.closest('.floating-dock') || e.target.closest('.dock-popup')) return;
  closeAllDockPopups();
});

(function bootstrapRoute() {
  const initial = hashToState(location.hash);

  if (initial.page === 'contribute') {
    contribState.returnTo = 'gallery';
    contribState.step = 1;
    contribState.prevStep = 0;
    contribState.category = null;
    contribState.content = '';
    contribState.displayMode = 'nick';
    contribState.nickname = '';
    contribState.rewardStyle = null;
    contribState.rewardPrompt = '';
    contribState.captchaSet = generateCaptcha();
    contribState.captchaInput = '';
    contribState.submitted = false;
    try {
      history.replaceState(
        { page: 'contribute', docId: null, contribStep: 1 },
        '',
        '#/contribute'
      );
    } catch(_) {}
    navigateTo('contribute', null, null, { fromBack: true });
    return;
  }

  try {
    history.replaceState(
      { page: initial.page, docId: initial.docId || null },
      '',
      stateToHash(initial.page, initial.docId)
    );
  } catch(_) {}
  navigateTo(initial.page, initial.docId, null, { fromBack: true });
})();

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) {
    searchSuggestions.classList.remove('active');
  }
});
</script>
